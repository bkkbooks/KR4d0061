body:
  text: 潞公文集卷三宋文彥博撰古詩逰紫雲洞同登青雲梯逺訪紫雲洞黃冠既前導絳韝亦後從幽竒素所希險絶曽無恐况此巖谷逰不知雙舄重攝衣叩洞户肅若心神悚兩崖勢相嶔左右如抱擁萬木傍森羅一水中洶湧信哉天下竒豈適俗間用賞景未盡興向夕遽旋踵飄然御風行恍若逰仙夢異日期再來退間心更勇寄贈華清觀主大師五城三洞朝真客紫房名𨽻神仙籍玉案晨餐沆瀣精椒庭夜飲流霞液姑山綽約氷雪容亭亭霞外脫塵蹤飈馭狂逰紫具闕雲裝醉入白銀宫想陪桂父與金母崑蓬春賞蟠桃紅愚亦放懷隨淡泊採芝茹木希彭朔常祕六泥東竈丹每求五色西山藥紫臺久判浮丘殃錦川繡嶺三千里羽駕鸞驂未載逄經年望斷函關氣彭門賢守器之度支趙鼎記余生日過形善祝并惠黃石茶甌懷素千字文一軸輒成拙詩仰答來意使從徐方來執訊如雙魚遺我黃石器副之懷素書素書與黃石得之宜在徐或在圮橋下或在留城墟因物以逹意思賢而警愚愚今所叨竊何止承明廬位歷二府重年登七旬餘陋軀賁華衮微名得虛譽此二句一本無三朝被寵遇八難慙嘉謨瞻言西洛汭願繼東門迹意者赤松子果是吾之徒寄致政太傅侍中曽魯公近以王屋山所産靈夀杖為獻伏蒙尊恕不責輕浼仍貺雅章并惠古鑑吟繹捧玩不能釋手輒成拙詩一首以答來貺天壇小有洞神仙稱福地草木盡翹秀靈夀持珍異孑立無附枝挺生出羣類既不假矯揉復不煩削治制杖待時用刻鳩循古義獻於君子堂逹此野人意所獻雖已微其意亦有謂願公稍扶持與國同安置匪惟布私誠兹乃出公議豈圖一羽輕復委千鈞賜報之以寶鑑百錬精明致副之以雅章二南風格偹蔀室天光照陋軀華衮賁何以稱尊貺傳家為重器何以繼希聲陳詩言鄙志伏蒙僕射侍中賈寄示遊潩上弊園歸至湖上詩一章研味欽服不能自已輒成拙句仰答來貺修篁小塢潩水湄略有亭觀闕甚微陪京上宰樂幽趣間乘齋舫臨荆扉是時仲夏之晦日日輪停午炎炎時披襟岸幘意自適林下穆若生涼颸子猷愛竹不問主魯侯在泮因成詩妍詞麗句溢纍幅金臺灑墨何淋漓公適東偏訪顔陋愚當北道承蕭規魏人思公過召伯一言一話無所遺疇昔篇章僅三百至今琬琰羅珠璣跨山飛閣常逃暑白醪滿泛黃金巵沉李浮瓜信美矣回船㺯水曽無之遙瞻德星方聚處正與兩兩交光輝頴川異迹冠天下湖上勝景鄰日圍鹿輿桂楫亟遊覽即見零雨東山歸送子駿朝議歸闕鮮于侁時罷西臺纍年分領西臺憲留滯周南人共歎蚤傳文價出坤維為有仙才生閬苑桂籍登科既已久蘭筋飛步終難絆兩持漕節賦均平歷守藩符政寬簡聖皇繼統始謀廟哲輔官材專進善巍巍雲闕此歸覲禁嚴侍從須邦彥離襟欲判重徘徊林下相從池上杯别後思君何處望肩輿頻上紫金臺送乾元寺住持實大師思實座主乾元古道埸宛在香山陽實師應請去無滯於一方飄然振鐶錫殊不事包囊孤風尤可尚靜法固有常真心得正住安重如陵岡况聞師議論慱洽而精詳和會禪與講若登圭峯堂迎知向學衆汲汲趨門墻洪鐘既大叩隨宜為發掦清伊自南來長波極渺茫所謂筏喻者利濟如橋梁某伏蒙宫師相公杜寄示新居詩齋沭捧讀不勝銘歎某謹成拙詩一章上紀盛德粗伸謝意年至即還政賢哉近古稀明哲冠四輔謀猷翊萬微名遂身乃退意確天弗違竒節煥青簡遺法在黃扉仁里開新第德宇翔采翬晏宅儉有制丘墻髙可依雅言重金鼎清音繁玉徽一覽近觀徼三復終研幾私槖永緘祕蔀室增光輝信矣賢人業發於君子機孤生懷絳帳引頸詠緇衣聖神方圖在日異東山歸招劉伯夀祕監君自山中來熟見山中事我亦山中人素懷歸山志切望青牛車細問歸山計題史館兵部傳君草堂欽之羡君濟上墅勝槩不可名泉石與松竹聲影交相清周墻數百堵版築皆親營箕尾出南極直對茅軒明陶廬自愛樂蔣徑堪逄迎但恐赤松子到此難忘情捨却留侯伴從我林下行過燕川渡燕川東北孔山西借車直渡馬頭溪退之逰厲枋口詩云馬頭溪深不可借車載過水入箱農樵引路津不迷行行引上青雲梯回頭下視林木低谷風冷冷山鳥啼巖隈泉甘土仍肥昔人於斯卜幽棲春深芝术生新荑采芝茹术希夷齊諸公共逰不知疲長吟吐氣如虹霓水濱石上寫此詩手拭蒼蘚腳踏泥冒寒履險不憚辭勉欲繼踵前賢題寄題密州超然臺莒侯之燕處層臺逾十尋俯鎮千乘國前瞻九仙岑勿作西州意姑為東武吟名教有靜樂紛華無動心慿髙肆逺目懷往散沖襟琴觴興不淺風月情更深民被袴襦惠境絶枹鼓音欲識超然意鴒原賦擲金樂府十首塞下曲二首老上焚庭後昆邪右衽時休開小月陳罷禱拂雲詞徒覺筋竿徑寧聞羽檄馳祁連皆積雪渠答夜應施朔漠凝寒久窮荒氣候賖凍雲藏虎谷殘雪滿龍沙地逈邉風急天髙漢月斜何人動鄉思壠上聼金笳新楊栁長憶都門外低垂拂路塵更思南陌上攀折贈行人行人經嵗别楊栁逐年新何當慿塞鴈重寄一枝春關山月宕子久行役遼西戍未還佳人怨遙夜清淚裛朱顔蘚晦蘭閨寂塵昏寶鑑間相思不相見明月下關山采蓮曲江南秋色早江上早蓮芳佳人采紅蕚兩槳渡橫塘翳日華芝薄隨風錦筰長蕩舟方自樂緑水任霑裳夜夜曲明月流清漢娟娟照洞房微風吹敗葉颯颯下銀牀塵晦流黃素爐銷辟惡香年年機杼妾獨怨夜何長長相思逺别苦無悰離居常戚戚顧慕懷所歡徘徊彌自惜瓊蘂不可采瑶華未堪摘惟慿尺錦書一寄長相憶陽春曲頗傷金管遽仍恨緹光促四序若循環百年如轉軸佳人暮不歸蘭苕春又緑空持緑綺琴愁㺯陽春曲陌上桑佳人名莫愁采桑南陌頭因來淇水畔應過上宫逰貯葉青絲籠攀條紫桂鈎使君徒見問五馬亦遲留巫山髙巫山髙不極髙與碧穹齊朝雲常靄靄暮雨復淒淒髣佛聞珠佩依稀認繡袿無能留彼美徒使夢魂迷律詩御溝已下三十八首鄉貢進士投贄逺疏銀𣲖浪深入帝王州不為朝丹禁何緣異衆流冷穿平樂觀清繞景陽樓金屋嚴粧罷香波苑外收荷花翠羽亭亭蓋微障越鄂君錦書何日寄繡被幾時薰步穩非因學絲輕未見棼唯愁容易散盡作楚天雲讀漢史二首漢室方中圮咸京欲半蕪髹墀傾馺娑齯齒笑諸于未暇平青犢旋聞奉赤符貨泉誠妄改天命本難渝久吏皆黃髮頻年困赤眉忽逄司𨽻屬重覩漢官儀謳咏皆欣合民靈共樂推區區蹇囂輩猶不悟天時西晉馬圉言雖驗鳬毛事亦竒紫微才遍植白創已交馳星麥應無酒私蛙尚有糜銅駝休反袂何救黍離離玉階樹亭亭依玉砌鬱鬱盡瓊枝璧月夜雖照金風秋更吹陳宫惟是唱漢殿只應悲似有君軒戀嵗寒終不移無題西陵何限柏一一勝瑶華幾縱青絲騎多逄油壁車香囊猶未致春帶已成賖莫作雲間月願親梁上霞贈市隱者縠帔絳絹頭墻東隱儈牛間門甘骯髒薄俗重伊優有頍丘蘂反寧須拂無資可用遊故人雖茜斾郍復問前騶山中隱者塵巾久絶迹谷口自忘機草橋凌晨出柴車向夕歸磴泉濡蕙帶徑竹敗荷衣借問何為者山中嘗采薇偶作示同志隱几清吟久投瓢浩歎頻如何爵舉日猶是傳還人膠葛終當戾汙塗偶未伸苦嫌家監傲殊不厚田仁夜思明河秋耿耿小閣夜愔愔魯酒不成醉洛生唯是吟簟涼初卷玉爐暖乍薰金默坐終無寐西窗月影沉華月皎皎新秋月分明照洞房幾人千里别今夜九回腸皓彩穿珠幌澄輝上璧璫畫樓兼繡户渾是可憐光間齋偶作鼓吹盡私蛙蓬蒿蔣徑斜梧髙惟待鳯栁密只容鴉度暑巾裁縠迎涼帳卷紗茂陵無奈渴猶有鎮心瓜咏箏别院秋仍靜髙堂夜更間繁絲移寶柱數曲奏陽關好薦瓊筵上長親黼座間野王雖後出無復謝東山對雪同雲方靄靄瓊屑已漉漉陌逈皆連璐臺髙盡結瑶羽樽深酌桂碭壁暖塗椒誰念牛衣客袁扉困一瓢旭日乍出扶桑海如輪隱半規未晞槃上露已側檻中葵赫奕晨霞映空濛曉霧披君看可憐處偏在照梁時秋望逺目仍秋望依依江上楓煙濤寒颭白霜葉亂翻紅列岫晴霞外遵鴻晚照中羈懷同屈宋倚立恨無窮咏苔綿綿上釣磯漠漠擁間扉石靣風梳髮垣根雨濯衣不將凡卉雜還與俗塵違謝砌曽成咏深嚴近紫微詠栁帶緩何曽綰眉長未見愁青青緣御路鬱鬱映金溝亂絮凌空蕩繁絲逐吹流傳聞隋水上千樹擁迷樓玉梁玉梁千丈駕澄流曽與羣仙爛熳逰丹桂扶迹應近月紫苔漫沒幾經秋濛濛五里皆金霧岌岌三休是寶樓此地回驂時一望世間塵土盡蜉蝣幽蘭燕姞夢魂唯是見謝家庭户本來多好將緑葉親芳穗莫把清芬借敗荷避世已為騷客佩繞梁還入郢人歌雖然九畹能香國不奈三秋鷤鴂何寄友人包兼濟極締交何止號如龍發篋疇年絳帳同方領聚遊多雅致幅巾嘉論有清風名髙闕里二三子學繼臺城百六公每策事則生之條疏常多别後愈知琨氣大可能持久在江東生意詩有枕戈待旦之句公子甲第峩峩爵觀前對回微岸鵕鸃冠錦韉飛鞚丹砂埒密炬流膏紫玉槃狐尾單衣常裛麝虎頭雙綬鎮薰蘭間馳便面章臺陌里巷兒童逐彈丸寓懷髙樓間背夕陽登渺渺長懷不自勝錦瑟有時聞北渚鈿車何日到西陵地寒萱草猶難種天逺瑶華豈易慿多謝蘇門清嘯客了無塵事染壺氷時興綸巾短袖迎涼服繭犢笨車乘興逰豈謂煙霞生曠逹只緣塵土倦伊優更無傾蓋將誰共縱有吹雕不我留曽過酒壚唯獨醉幰前猶恨欠三騶暑中言事分得華字薰飈獵獵度融紗赫日流金樹影斜寢簟冷便鋪薤葉門裾輕愛曵橦華仙盤想挹三危露靈漢思乘八月槎雪散氷丸猶長物鎮心堪笑茂陵瓜初曙漢宫金掌露淋漓椒殿裝梅欲罷時宿靄空濛昏繡榻曉暾依約上文㮰九苞威鳳猶棲閣三匝驚烏尚繞枝玉女忩虛蓮燭謝西南金魄隱殘規和人留題華清宫溫泉玉唾神逰接漢京朝元金碧照天明香波淺鬭龍原潤炎液深􅉼雁甃清狎獵亂光浮藻井穹隆長影浸雕楹聖皇勤儉無西豫輦輅經春煙草平秋風吟獵遍蘭叢與桂枝巢居未必有先期靈臺十仭烏隨轉阿閣三重鳯豈知度栁暗催蟬嘒嘒出雲髙送雁離離漢宫玉樹知何限爭忍重吟畫扇詩閲史有感縹帙青箱次第開慨然英氣轉難裁莫言美事俱長往須有清風屬後來彈鋏始知皆瑣旅枕戈方信是雄才平生自况真菲薄只是休容楚鴆媒詔開禮闈偶作呈諸友星弧首闢羣英彀天畢初張衆目羅漢傳仍聞求泛駕周明何止育菁莪碧紗已有蓬山籍緑李將分桂殿科全仗阿香推轂力九門三月化陶梭省試蒲車詩漢祀精禋潔云亭禪禮殊金泥伸祕襝車轂尚編蒲越席侔前制文茵愧後塗軟輪同致美規地用難符翠幰芳蕤集華芝秀彩敷升中儀矩盛偹物壯皇圖天聖五年春省試獻羔開氷國重司寒祭羔羊獻禮陳開氷遵舊典薦廟屬昌辰肥羜方登爼清壺兾饗神蟲疑非早夏狐聽異先春鑿鑿凝光瑩峩峩發彩新何當比魚上從此出迷津元日作萬夀稱觴日三光肇祚辰新陽方改故暖律已升春桃梗分朱户椒花獻紫宸子輿方飬浩何必造盤辛春日偶作借問此何時南園蝶又飛杏梁棲紫燕麥隴覆驚翬榆莢深堆砌楊花亂撲衣洛吟經永日還似舞雩歸梅花洛涘幽居植江南驛使傳一陽初應候萬木獨為先素蕚凌繁雪清香襲淡煙欲知佳麗處漢殿繞粧妍元日阻雨林花脈脈怯朝寒雨隔蘭庭曲水筵欲買春光無定價東風撩亂擲榆錢和友人春日即事小院間扃照日長靜探琅簡事虛皇依依柳蔭銀塘暗習習風穿玳押涼碧合暮雲連礎潤緑攀竒樹透懷香蒙山近得修真訣辟穀常餐太一糧酬金華山人春日見寄之什漠漠鮮雲習習風谷鶯嬌囀小園中謝塘初長如禋草湘渚難留避弋鴻輕雨落花紅撲地惹煙垂栁緑縈空尋芳好伴髙陽侣深憶東山採藥公和友人春日即事香閣登臨恨已多可憐蘭景又妍和書囊閲盡應成癖詩思狂來恐是魔玉樹芬芳連霧縠珠櫳隱映隔雲蘿鸘裘貰得楊昌酒度日無悰倚瑟歌郡齋春日書懷照日亭亭晝漸長煙藏幽砌蕙蘭香纎垂謝監園中桞嫩折羅敷陌上桑出谷曉鶯遷綺樹入簷風燕語雕梁瑶華欲寄嶺頭信心逐白雲歸帝鄉長平懷古康定元年任河東轉運副使入境題長平驛舍先是先令公任河東漕使捐館公服除繼為漕初至部賦此此子徒能讀父書兵降始信藺相如却令後代承家者每到長平戒覆車題籌筆驛卧龍才起扶衰世料敵謀攻後出師幃幄既持先聖術肯來山驛旋沉思題韓溪詩四章三泉縣近郊之一水清泚可愛問諸水濵曰韓溪取地志驗之而信且曰韓信去漢而蕭何追及於此因以名溪豫以韓事於史甚顯而溪並通邑其名獨晦故詩以題之韓信未遭英主顧蕭何親至此中追君王有意爭天下不得斯人未可知平日漁樵皆病涉當年將相盡成功淮隂未濟鄼侯識留得雄才歸漢中水濵山曲暫盤桓盛事臨風一據鞍莫訝史君頻歎詠古來君相受知難途中勝迹盡留題獨有韓溪未有詩直把蕪詞重疊咏只圖流播路人知緑綺楚舞休飛鶴燕歌罷繞梁髙堂橫緑綺上客奏明光秋月華池淨春風蕙草香還卭有辭賦仙鳯正求皇蘅臯蘅薄頻牽望陽林久駐鑣香囊徒叩叩雲月自苕苕翠佩傳情密曽波託意遙翩鴻漸髙逝翻恨隔神宵深院楊桞亭臺暮梨花院落深玉池波湛湛珠幌影沉沉逺思隨莊蝶春懷怯雍琴萱蘇不蠲忿擁皋獨清吟春曉宿靄藏飛觀晨霞熀繡甍錦幃人未起珠樹鵲先驚爐暖香初燼忩幽燭尚明更開花上露粧淚鬭盈盈芳草綺節初抽翠金塘又託根何堪混蕭艾自合比蘭蓀碧映龍池水青迷楚澤魂年年增恨處長信與長門公子朝罷章臺陌追隨紫燕光雁陂冠緑幘洛浦授明璫下士營三窟名姬號四香十千沽斗酒結客少年場井上桐擢幹殊瓊巘託根非嶧陽發華臨玉甃倒影覆銀牀方待髙朋集寧容衆鳥翔尾焦期入㸑誰是蔡中郎栁絮拂地髙陽翠影濃楊花斷續蔽香紅密和微雨粘沙坂亂逐輕風透綺籠漆圃旋驚飛蝶夢玉庭頻擬散鹽空青門一望依依處十里金堤二月中宫詞金屋無人夜未央獨吟團扇倚椒房辟寒猶待君王意鶴焰熒煌龍漏長體輕全不勝鸞叉常羡同心上苑梅翠輦未來珠箔卷漆盤猶貯夜明苔登江樓飛觀接江干乘間獨憑欄鮮雲橫列岫芳草蔽遙灘梅笛吹漁浦荃橈泛鷺湍登臨謝康樂寄逺折瑶蘭春逰紫燕動光輝春逰雁騖陂鶴天方爛熳鴻蓋任追隨促席開瑶瑟當歌泛羽巵言歸將薄暮不羡習家池夜宴清夜開良宴金瓶泛羽觴蕙肴芬潔爼蘭焰耿華堂妙舞流風雪妍歌繞棟梁西園堪賞玩明月照銀塘從軍行汗馬出長城橫行十萬兵晨驅左賢陳夕掩亞夫營雪壓龍沙白雲遮瀚海平燕山紀功後麟閣耀鴻名俠少行錦帶佩吳鈎翩翩躍紫騮垂鞭度永埓挾彈過長楸平樂十千酒南城百尺樓荆娥拂雙袖日夕又遲留桃花雨過新含灼灼華煙籠芳樹勢交加狂飛粉蝶穿朱檻巧囀流鶯傍碧紗露井細香飄烈麝霜林濃艷散餘霞囓毫更近成隂處似入仙源一徑斜早夏言懷碧檻初榮槿芳園已莠葽翠岑應解鹿髙樹欲鳴蜩霞綺籠飛觀雲峯映鎖寮霜紈徒比月仙馭好凌飈寒水沉朱李新吟寄緑蕉藥房清氣爽荃壁冷香消玉沼圓荷嫩蘭禳乳燕嬌薄帷安盡石幽徑採神囂每欲求飛雪常思造結瑶浩歌頻倚瑟長袖幾炊雕靜對黃梅雨間吹紫玉簫砌榴紅爛熳窗岫碧岹嶢袁渚踈還往顔居正寂寥且傾光祿酒莫發采菱謡秋夕偶懷小檻風驚葉幽庭露泫柯芳塵千里逺幽恨九回多螢影穿簾押蛩聲出砌莎寸心無以寫訴月但長歌秋夕偶作獨誦潘郎秋興賦間吟謝守怨情詩風搖紅樹啼螿急月照緑窗蓮漏遲秋夜聞笛秋宵萬籟沉羌笛似龍吟向秀忽思舊馬融方好音細聲寒入牖殘韻半和砧莫奏梅花曲旅人情更深古寺清秋日五首古寺清秋日微涼寶殿中玉題髙納月金鐸碎搖風翠蘚緣階碧幽蘭裛露紅間聼蓮葉漏吟對惠休公古寺清秋日幽間景倍殊晚雲遮鷲嶺新月照蝦鬚玉露霑籬菊金風落井梧武泥求泛駕張翰莫思鱸古寺清秋日登樓擁鼻吟微涼生闕苑輕吹動香林窗外螢飛火籬邉菊散金靜彈流水曲何處有知音古寺清秋日潘郎興倍長院間披鶴􅌁人靜掩鷹房樹密驚晨鵲幽軒耿夜螿班姬應咏扇通夕恨昭陽古寺清秋日含毫憑小樓雨微滋石蘚煙淡落霜楸紫燕休巢幕蒼鷹已下鞲間傾浮蟻酌時典鷫鸘裘重陽前五日探菊比到重陽猶五日露披金菊滿東籬莫言預賞非真賞大抵先時勝後時密蘂不容群蝶采清香未許衆人知幕中婉畫應多暇來伴淵明把酒巵重陽前兩日登樓望月寶剎翬飛切紫霄况蓮開士木綿袍黃昏尚倚危樓望反照南榮唄梵髙玩月吟寄友人桂魄騰輝朱户深瑣寮珠箔夜沉沉慵聼北里吹竽燕間倚南樓擁鼻吟玉宇暗銷紅燭影銀牀斜轉碧桐隂金瓶剩貯程鄉酒留待龍交滿滿斟薄宧羈塵事勞生困夏畦偶來逰日觀更喜躡雲梯便擬紉蘭佩相招隱竹溪回看廣津路欲問轉多迷聞道頻揮霹靂手見虞曹王員外言之定知不費琰之才且收丹筆携詩筆來就花間把一杯逰仙詠十二瑶樓切絳雲醉逰崑閬碧桃春煙藏玉樹棲鸞穩露裛芝田唳鶴頻間訪五城騎白鹿靜尋三洞駕黃麟紫房求看登真録説是明晨第一人送胡秀才歸絳臺飄飄詞賦已還卭法牖推賢繼祖風緩頰且驚儀舌在隻輪休歎阮途窮佇觀振翼遷喬木忍學棲衡嗜晚菘楚寶定須三獻遇胡君已兩上矣肯教頻嵗泣如虹贈孫莊秀才麗藻遒文絶比肩買符新自帝州還四溟浪濶鵾須化三島路長鸞暫間桂玉擅名將繼郤簞瓢樂道且晞顔前春定奮沖天翼休抱如虹泣楚山送郭屯田牧涪陵涪陵古郡接清臺巴俗頻思叔度來魚竹乍分天顧息星軺初動隼旟開一揮暫輟含香職雙筆猶淹視草才佇聽陜棠民頌洽紫泥封詔下蓬萊和張嶢秀才勉弟之什棣蕚聫華繼昔賢素園逰想已多年方觀藪鳯翔千仭將見牀鸞上九天寬詔佇聞求泛駕盛時休憶賦歸田來春定中穿楊箭好約抽毫玉陛前送昌黎先生歸秦亭獨駕輕鴻返故園冠霞曽醉錦江煙五圖金記何年授九籥丹經幾處傳曉別閬州飛玊斚暮登秦嶺挹紅泉椒庭他日重相見應許壺中看列仙送果州李推官赴闕德滿椒蘭學滿籝升堂鴻藻繼雲卿舜庠早巾巍峩選君廣丈首薦儉府還馳醖藉名捧詔定趨文石陛掦鞭將度洛陽城麟臺馬署期髙步間繹藝籖聽苑鶯送友人携手北梁道送君南浦春斜陽沉璧彩流水濯纓塵郢酒頻揚觶燕歌旋愴神瑶華如可折堪寄隴頭人送溥上人逰川火宅清涼廕慧雲海潮芳論更難倫鷹房暫鎖巴山下虎錫還飛錦水濱貝葉文皆收縹帙木蘭衣不染紅塵亭臯欲別偏多感緣是雙林社裏人登通山閣有懷呈同人小閣登臨春暮時綺櫩飛闥映逰絲鶯喧曲檻韓馮樹蘚晦幽庭貢禹綦間對碧雲吟桂水狂思長袂宿蘭池徘徊望斷江邉客采得瑶華寄與誰送劉推官歸冶源棲真館髙情樂幽趣遂與塵事違巖谷久潛照魚鳥知忘機方邀栗里會却指冶源歸借問歸何遽山中芝术肥送福州通判陳鑄殿丞時為殿中御史河東轉運史澤宫登甲第殿省滯時英閩國題輿貴稽山晝錦榮軼才猶絆驥美俗仰誠衡夀母平反喜迎知訟牒清贈會稽尊師藐姑容化三隂館勾漏砂封六乙泥五練夜窮蒼玉機七明晨彩碧雲梯冠霞髙挹浮丘袂握髓深藏鬼谷溪如有西山駐靈藥何妨相贈一刀圭贈自然表白大師三首千仞清溪絶世紛先生髙卧白雲根近來名係丹臺籍多向蒙山見羡門紫府仙人每馭飈朝逰三島暮三茅他年內史功成後願結山隂世外交當感真公傳隱訣每言凡骨是仙材他時載挹浮丘袂直在崑峯十二臺潞公文集卷三
