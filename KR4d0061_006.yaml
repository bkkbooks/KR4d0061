body:
  text: 潞公文集卷六宋文彥博撰律詩西都留守宣徽王祈謝嵩祠往還弊庒因成雅章為貺謹次嚴䪨時判河陽臘雪應祈沾下土府公遵命祀中天定陪仙馭經緱嶺應訪禪林過玉泉和氣隨風生二室歡謡繼日滿三川悠悠大斾纍纍印却愛蘇家負郭田若比揚雄多一㕓僅同徐勉葺東田溝塍萬畝言之過却恐增添助役錢前朔憲孔嗣宗太慱過孟云近於洛下結窮九老會凡職事稍重生事稍豐者不得與焉其宴集之式率稱其名其事誠可嘉尚其語多資嗢􅛐因作小詩以紀之亦以見河南士人有名教之樂簡貪薄之風輒録呈留守宣徽聊資解頥洛城冠蓋敦名教任是清貧節轉髙見説近添窮九老治中舊有九老之會三并此四矣從初便不要山濤謝留守王宣徽寄花逺惠竒花自洛城吟觀醉賞動鄉情開編讀到安仁傳方信河陽浪得名再和惟有陳園接府城池塘花竹可娛情雖然不及芙蓉蕚猶得河橋史館名孟人謂陳園為河陽史館園故公有赤土之戲耳詩謝留守王宣徽逺惠牡丹姚黃左紫狀元紅打剝栽培久用功采折乍經微雨後緘封仍在小奩中勤勤賞玩傾蘭醑漠漠馨香逐蕙風猶恐花心懷舊土戴時頻與望青嵩熙寧癸丑季冬十月三日某被旨謝雪於濟祠巳事與祕書監劉几光祿卿直史館張靖太常少卿馮章李潔巳屯田郎中陳安期祕書丞張端同遊枋口泛舟沁水至峴石而登岸歷觀巖谷間前賢之題名翌日遊化成寺以車渡沁回入盤谷窮覽山水之佳處由燕川而歸枋口作下馬入枋口漾舟緣碧溪雪消山骨瘦風定浪頭低數里復登岸群賢俱杖藜徘徊巖石畔尋覔退之題化成寺作唐裴相之山墅捨為寺昔覽傳心法知公素學禪今逰化成寺使我復思賢大捨傾髙産多生結勝緣人琴雖已矣松菊尚依然寶地侵蒼蘚巍峯柱碧天撮衣書久失裴相撮衣書寺額今失之矣礱石像猶存殿有小石像製作甚工其下刻云天寶十三載造境寂遺塵慮僧間足晝眠欲歸情戀戀緩轡出燕川過燕川渡早過燕川渡千峯插太虛雲開微見日水淺不漸車時造車為梁而過風急樵歌響霜嚴木葉踈緣溪東北去巖腹有精廬即化成寺盤谷作昔有幽棲士兹焉遂考盤驚眠澗泉響醒酒谷風寒列岫開忩見冥鴻倚枤觀韓文傳已久合在翠巖刋舊有石記今已失之願也乖真隱韓文旨趣深本非逃富貴豈是愛雲林已失豪華望方萌退縮心歸來老窮谷村叟共浮沉自濟源回及中道得通守郎中詩跂羡山水之逰以不得陪從為恨因以詩答之通判李師鍚奉祀靈源臘雪餘薄寒風景似春初因尋山下逰三日惟恨樽前欠二車南望思君回五馬北來遺我得雙魚新詩兩首連成貴百斛驪珠價不如司空相公特貺雅章俯光陋迹依韻和呈以答厚意富一代勳賢孰擬倫惟公爵德齒俱尊顧慚參魯辭樞管輒繼蕭規偃輔藩每到碧漣思召茇時傾緑醑憶曹樽平嵩極目西南望仁里髙閎近鼎門富公宅直定鼎門初泛舟新池觀子弟輩作詩因為此示之舊池疏引透新池轉覺澄瀾勢渺瀰得志魚蝦爭跳躍無根萍梗任推移船頭欲過衝橋腳柳眼初開映水湄借問阿連春草句何人先把紫毫摛將赴大名奉寄西都留守王宣徽驟易銅臺守脂車冒藴隆北行如拾魯南望倚平嵩畏日臨傾藿驚颷走斷蓬伊流舊新友應亦念衰翁春旱既甚禱祈未應小園即事渴望甘膏蘇旱歲日趨祠廟罄虔祈春風也解相欺罔鼓扇楊花學雪飛寄相州侍中韓魏公時留守北京向在三城退公多暇日玩法書名畫以為娛樂內韓晉公村田歌舞圖及顔魯公跋尾雖得蒲中摹本其實頗類真迹今再來大名屋壁間覩公之書正與顔類覬得公之數字跋尾以光前迹是所願也非敢望也兼成小詩藉以干澤晉公名畫魯公書髙出張吳與柳虞注畫記以張吳為正經幸得魏公揮寶墨緣公楷法亦顔徒題韓晉公村田歌舞圖後治世舒長日田家事力蘇干戈久不識簫鼓共為娛濁酒行無算酡顔倒更扶將求太平象此是太平圖題輞川圖後吾家伊上塢亦自有椒園漠漠清香逺離離丹實繁盈襜常要采折桞不須藩每看輞川畫起豫商可言即事偶書世道逢消長人情徇愛憎光華如石火明滅似風燈巢幕堪憂燕垂天不羡鵬危心戒行險視履益兢兢昨夜飲散未眠偶成拙頌録呈武功寺丞若猶未棄無惜開示以幻能際幻居塵不染塵略於歌舞地聊現宰官身有法猶為滯無心乃是真還將所得趣試問悟空人再答説幻緣知幻言塵為覺塵覺知今亦遣塵幻豈關身獨體方無對雙修未是真因君祗夜頌自愧小乘人提舉劉司封訪别將赴滏陽輒成五十六言劉流乞領琳宫作散仙雲情鶴態任天然榮驅軒馭歸仁里懇拜封章解計權尺璧時光須愛惜寸金鄉土且留連銅臺事事君誇詫莫望西山緊著鞭偶成小詩贈提舉劉司封向上應無快活人斯言未敢便當仁留君且住非他意好作熙寧第八春家園酴醿自京寄至奉送提舉劉司封小圃酴醿爛熳開盈箱采得寄銅臺當花對酒熏然意似到清香洞裏來提舉劉司封監牧張職方詠酴醿詩皆以微文形於善謔輒成纍句聊用解紛蠻箋往復寫瓊瑰皆是論都作賦才花本無情亦無語清香自到鄴城來已折素華迷雪苑更將瓊艷照氷臺劉郎曾入仙源路又到唐昌觀裏來招仲通司封府園避暑騎山樓下水軒東一室初開待白公白云竒章欲於南溪上别葺一室與白傳止宿故詩云終恐不如南澗上别開一室待間人雖是不如南澗土都緣却有北窗風銜杯避暑稱河朔飛蓋延賔在鄴中解榻况逢徐孺子饋漿加飯與君同卒章戲之耳金宿樓望月呈仲通司封是夕與賔佐會飲後園滿滿十分酒髙髙百尺樓於兹賞圓月况乃值中秋天宇浩無際露華光欲流西園清夜景公幹不同逰緬想建安盛西園飛蓋逰初筵會才雅今夕繼風流月伴昏星出雲隨晚吹收老生於此興不減庾荆州詩贈提舉竇侍郎舜卿紫髯真將白雲卿總領琳宫道氣清􅀈竹一林曾斷買青溪三弄得遺聲季倫自作思歸曲向秀方深感舊情雖恨功名非謝傅樽前更欲聽君筝舟中别後中夕無寐偶成四十言奉寄中輝大卿史聊致黯然之懷史照五十年親友如今兩鬢霜相逢在淇澳所樂似瀟湘話舊如春夢聽歌放酒狂壓關樓下别一夕九回腸依䪨謝運使陳虞部生日惠雙鶴靈壽杖仙禽壽杖垂佳貺麗句雕章煥列星深悉至懷形善禱擬延西景駐頽齡青田雙戲九臯鳴屈降仙姿入户庭冝與衰翁為老伴雪毛霜鬢共星星瑰竒擢秀從王屋靈壽傳名自漢庭仁者存心安老者欲扶蹇步得長寧美幹非緣削治成挺然修直體堅輕仙郎曲借扶持力使助登山蠟屐行熙寧丙辰十一月二十八日安正堂喜雪凍雲濃厚朔風嚴紛揉瓊霙撲綺簷斗變至和緣帝力迎知上瑞協人占晚歸漁市蓑衣重曉上旗亭酒價添更待三英同勝賞翩翩賦筆紫毫銛雪霽金宿樓間望偶作盈尺初晴皓采鮮長空極望勢漫漫銅臺不憚三休上氷井須添一倍寒舟楫似從雲外過園林如在鑑中看冬來景象今方好未到黃昏且憑欄詩答鄆州分司李待制許中春寵訪師中念昔多聞友於今四紀強滯才君絆驥叨命我循墻二月芳期近三臺淑景長東郊望飛蓋原隰有輝光謝假新舟贈運使陳金部知儉使艦新城泛碧瀾更陪李郭共登山同計運李龍圖學首郭郎中共載深慚一水如衣帶不稱君家舊濟川寒食逰壓沙寺雨中席上偶作魏公前歲朝真去盛傳道士拜章見魏公于天門寂寞闌干尚有情莫道甘棠無異種至今留得雪香名魏公命主僧建雪香亭于藜園詩刻在焉沙路無泥地側金滿園香雪照瓊林一枝帶雨尊前看還是去年寒食心機冝職方見示三月十八日逰船場見許公亭詩追惟文靖公之舊迹輒成四十言以繼善聲文靖居留日于兹事勝逰春塘雖有草夜壑已無舟造船場有藏舟澳召伯昔所憩魏人今再修不緣從衆樂爭忍過西州某伏覩運使金部運判祕丞運同贊善贈長老元師詩一首舉唱三觀圓成叵測精微但深讃歎輒不自揆願繼善聲素昧宗乘頗慙蕪陋此土久無臨濟嗣宗風不振至於今方當魏俗依僧室須訪堯山禮道林東去懇邀香象駕西來頓識祖師心紺園變色慈雲庇蔀屋容光惠日臨理事融通周法畍處時同就聽潮音不分孔老為三教欲使瓶􅐻作一金得度皆欣龜值木當機盡許芥投針伽他孤起開晨景運使金部首形歌咏伊字齊修昭暝隂運判運句繼作頌言獨愧鈍根非了了宛同眢井自沉沉願將天鉢清涼水淨洗昏眸與濁襟效唐杜牧之對酒絶句醒時忙事醉時間隨分傾杯也破顔若使玉樓休釀酒春風應不到人間追和銷磨歲月功名內檢束身心禮法中除却髙陽詩酒伴人間誰解惜春風問石楠遣使赴西洛因書問石楠栽培既已久圍徑必須添協韻布菜應籠檻抽梢定出簷丹心與徑節無憚雪霜嚴此木盛冬枝杪生紅心問栝酷愛池南栝當年手自栽出藍常有望生白固難催此木逾百年即有白衣如粉本草謂艾納香者得地根彌固凌霜勢不摧楸梧皆不問為爾亦凡材書扇莫結新情斷舊情斯言明載坐忘萹心名口誦為深戒祗恐迷情逐景牽詩答致政范侍郎致政內翰侍郎榮過郊居少駐軒馭兼留詩詠俯賁丘樊輒次元韻郊居誠弊陋平地見伊光適值華軒過仍當煦景長幸能留憩止豈敢謂髙涼緑篠緣荒徑青蘿補壞墻勸耕周厥土問稼保斯箱處擇仁為里歸尋醉作鄊老懷從放達宴坐絶稀望後躅承相顧交情孰可方清吟委珠玉雅奏協宫啇似震驚群蟄如牷薦大房畏塗逢善友酷暑得寒漿三復勞鑽仰詞雄韻更強運判祕丞黃以某自大水後久無燕集聲酒之樂貽書問念繼以佳章輒依來䪨和呈黃莗下水關樓張別宴別來惟是寄雙鱗近緣荒政須藩樂趣辨輿梁為濟人水後橋道俱壞朝旨督促修治歌罷貫珠收畫扇舞停回雪卷文禋蓬山叔度憐勤瘁繼走郵筒惠訊頻謝運使陳金部生日惠繡壽仙香爐合依䪨和二絶句絺繡為章古法傳刺文肖象用功専他時携去伊川塢欲並西方皤叟仙伊上弊居有積慶蘭若中有范瓊所畫皤叟仙得於成都大慈寺世稱名筆今得壽仙可為雙絶得非竒物有時而合耶詩緣大雅成歌頌器自良工得範模珍重星郎為壽意更從蘭省輟薰爐龍圖給事使還過魏少留仙斾道舊為樂因及北史魏收之語作為雅章輒敢繼聲聊資一噱蘇相頌劇談亹亹陪麾麈竒表堂堂對伏犀易作詩章頻有得難為逋峭豈無稽回驅大斾龍沙北歸直清廂虎帳西龍圖閣在資政殿西久困土山緣直道侃然常恥病于畦子容頃罷西掖退為散郎奉常恭逾年路上舟中作初致政自京還洛詔乘巨艦濟安流聖念偏于老者優堪笑霸臣何瑣瑣五湖歸去一扁舟行及白馬寺捧留守相公康國韓公手翰且云名園例惜好花以俟同賞因成小詩公書苦惜春光晚桞絮榆錢撲面飛惟説名園絶竒品留花未發待翁歸去嵗曽吟怨別詩今春醉賞又參差洛城雖是歸來晚趂得姚黃正發時留守相公康國寵召同賞花歡飲兼示雅章次韻洛表衡臯穀雨天歸來景物尚鮮妍喜隨使斾尋花圃急趂賔簮赴綺筵酒撥嫩酷傾緑液曲調新譜促朱絃玉堂仙客應潛笑強作風情學少年潞公文集卷六
