body:
  text: 潞公文集卷二十九宋文彥博撰奏議乞兵部廂軍密院置籍元祐二年臣以樞密院應內外廂禁軍自來並係密院置籍所管今以新制並不管廂軍皆送尚書兵部且密院謂之本兵之府豈可內外五十萬廂軍却無籍拘管緩急出軍行師廂禁皆用况廂軍不獨用於諸般營造雜役兼自來如廣南槍手綱丁及諸州鄉兵亦是密院有籍欲乞令密院祗於兵部取索廂兵等人數於兵籍房置簿拘管逐年揭帖常見實數亦不煩費緩急差使易為照會即不妨尚書兵部依近制主管取進止奏戶部事元祐二年臣以戶部尚書乃昔之三司使之任專掌邦計財賦出入無不周知則國用取濟今當以昔之三司使之任悉歸戶部財賦盈虛可以經制不誤大計自尚書侍郎以下慎選而久用之庶幾集事尚書侍郎即是三司使副之職郎中員外乃昔之判官之職此國之大計乞早留聖意奏除改舊制元祐二年臣近靣奉聖旨具自來除授官職次序一本進呈臣今略具除改舊制節目如後吏部尚書選人兩任親民有舉主升通判通判兩任滿有舉主升知州軍此已上敘升今謂之常調知州軍有績效或有舉薦名實相副者特擢升轉運使副判官或提點刑獄府推判官今謂之出常調轉運使有路分輕重逺近之差河北陕西河東三路為重路嵗滿多任三司副使或任江淮都大發運使發運使任滿亦充三司副使成都路次三路任滿亦有充三司副使或江淮發運使任滿充三司副使京東西淮南又其次江南東西荆湖南北兩浙路又次之二廣福建梓利路為逺小已上三等路分轉運使副使任滿或就移近上次等路分或歸任省府判官漸次擢充三路重任以至三司副使內提點刑獄則不拘路分輕重除授轉運使副省府判官或逐急籍才差知大藩鎮者其歸亦多任三司副使或直除修撰待制者三司副使嵗滿即除待制有本官是前行郎中少卿或除諫議大夫者有資淺而除集賢修撰充都轉運使後亦除待制三院御史舊制多是兩任通判已上舉充嵗滿多差充省府判官或諸路轉運副使纍遷至三路嵗充三司副使又嵗滿除待制御史或言事稱職公論所推即非次拔擢繫自特恩正言司諫自來遷擢無定制或兼帶管職文行著聞或議論識體方正敢言朝廷所知臨時不次擢用本無常法三館職事本育才待用之地例當在館久任其間資地人品素著除修起居注即今起居郎舍人遇知制誥有闕即試補即今中書舍人已上並舊制甄别資品履歷次第除注之法與今來官制或小異而大同更乞與三省參詳進呈奏夏國事元祐二年中外臣僚上言夏國受朝廷封册恩禮極優錫賚尤厚而敢忘恩背惠輒行公牒傳逹疆吏自絶於天不修貢奉天地所不容神人所共怒乞行天討以正有罪欲乞降詔邊帥及出勑榜以諭中外若朝廷姑務息民推天地之大德曲示含容抑羣情之怒忿不與醜羌計較即乞明諭邊臣嚴加守偹靜以待之必取全勝所有朝廷續遣大兵且令分屯次邊州軍以偹緩急邊上句抽進無逸圖元祐二年臣伏觀周公作無逸以戒成王後代聖君皆奉為至戒以成治化以克永世臣又觀唐史見宰相崔植對穆宗云玄宗初得姚崇宋璟為宰相二人者夙夜孜孜致君於道璟嘗手寫尚書無逸一篇為圖以獻玄宗置之內殿出入觀省記念在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圖朽壞始以山水圖代之自後既無座右針規又信姦臣用事天寶之末稍倦於勤王道於斯缺矣今陛下虛心求治伏望以無逸為元龜穆宗善其對臣恭惟皇帝陛下聰明稽古嚮學思間日御邇英延儒臣講讀經史臣又觀邇英北壁有仁祖朝講官王洙所寫無逸圖臣慮禁中或未有此圖輒敢寫録四軸并一卷上進望於殿內張挂置於几案以便聖覽臣愚不勝區區之至奏吏戶刑部官久任臣伏覩先朝復尚書省六部二十四司欲其分治職事悉如唐制臣切以尚書省吏部典選戶部掌邦計刑部主國法此三部最為重而侍郎郎中員外多不久任遷轉頻數未熟本部職事已見遷改必致胥吏乘間作弊行遣遷滯臣欲乞三部郎中員外須令並滿四年理為兩任逐任與升資序立為定制經久遵行內吏部户部司封司勳考功度支金倉部亦須再任與逐任升資上件三部郎官佐本部長官主判逐曹任官材掌邦計主國法皆是國之重事伏望聖慈詳察早賜行施奏踈決刑獄元祐二年臣今日早延和殿奏為聖慈閔雨二十二日御殿踈決禁繫罪人當日降雨尚恐外處州縣有未雨足處乞下逐路監司令分巡部下州軍催促刑獄疾速斷放免有寃滯因録先朝御批劄子進呈奉聖旨令進入奏中外官久任事臣以中外任官移替頻速在任不久有如驛舍無由集事何以致治故纍曾上言乞中外官各令久任須滿資考近日以來遷改尤為頻數蓋由風俗躁競例欲速遷執政者或避怨謗不能鎮靜欲望中外治安未可期也臣欲今後凡差除中外官並具見在任官年月滿未滿須令任滿方得交替如是急速籍才須要其人則不拘此制其任滿得替之官須具在任實有勞績方與照會合關升差遣所責官吏自此不敢苟簡欲速百職自然修舉取進止臣纍曾上言以吏户刑部官屬主大選大計刑罰并外任監司及親民之官並須久任此繫朝廷致治之本不可忽也今乞與三省更申明祖宗舊法遵法施行奏監司舉官事元祐二年臣竊見諸路官司及州郡帥守薦舉部下官吏但務極稱才行不考實狀其間多徇告囑頗誤擢用臣乞今後凡薦舉官並於舉狀內直具在任的確分明事迹及本人素來行業為衆所稱方與上簿記録或有任用更加詳察取進止奏坊監草地令百姓出租臣竊知太僕寺在京苑坊監牧馬草地其間甚有自來水占牧馬不到去處係人戶斷僕租佃客貧民採捕蒲魚種植蓮藕入城貨賣以資口食今聞太僕寺為係牧馬地內一例勾牧入官臣聞本寺官及供到細狀稱上件水占牧地可以依舊令人斷課租佃濟貧民並無妨闕况今來下民艱食之際伏望聖慈特降指揮令依舊出課租僕以紓近京貧下之民取聖旨奏鬼章事元祐三年臣以為始禽鬼章於法便當誅戮朝廷惟天地大恩貸其性命兼欲係其二子之心使感國恩不為邊患則西邊事簡兵屯可減用度亦省今因阿里骨使人既來若令一見鬼章即其子信其父在若更與補一至下虛名使與李賖羅抹同日遊寺燒香寺廷間遙逺一見亦不能通傳言意即羅抹具告相見之所則結咓捉等深信父在尤當感恩或謂鬼章有罪之人雖虛名小官亦不可授且如西賊李崇貴誘殺保安知軍揚定其後秉常執送崇貴來先朝亦貸其命授以官李繼捧與繼遷叛興大兵討伐生擒繼捧來獻亦貸之授上將軍封宥罪侯此並是前朝推恩之例如此甚多若李賖羅抹到京數月不見鬼章歸畨之後結咓捉等必切詢其父之所存却云並不曾見即結咓捉必疑其父已被誅戮他日鬼章以病死其子亦必不信豈不深恨非時點集所部於熙蘭側近作過或堅求夏賊與之合縱分右秦鳯之界作過即西邊兵屯未可減用度未可省亦須稍煩西顧然臣以謂令李賖羅抹一見鬼章於朝廷有何損屈而議者或堅謂不然即不知有何利害臣竊惑之兼昨日簾前臣具以此議上對亦屢聞德音以此為便後於都堂又集議却聞猶有遲疑未即奉詔者伏乞聖慈詳諸臣之議早賜從長處分如陪戎校尉之類乃九品武階又無請受向時多是諸州牙校授之結咓捉初亦知其父上知不戮又劉舜卿亦以委曲􅀈結咓捉云鬼章見在東京照管甚厚今李賖羅抹歸畨却云不見鬼章其子豈不疑恨即朝廷貸鬼章之命都無所濟又臣於二十七日上劄子言鬼章事必已付三省今晚密院人吏來呈文字云候第二畨阿里骨使人來令見鬼章臣以謂終是令見鬼章何候後畨兼第二畨使回又須更四五箇月若前畨使回云不見鬼章必是疑訝兼聞阿里骨第二畨使人七月十日到闕欲且令第一畨使候第二畨人來令起發因而同見鬼章為便取進止臣以謂議者不欲令見鬼章今又令候第二畨使人來令見之終是令見又何須如此疑難若諸臣必有的切議論利害分明臣安敢不從奏知州通判理任元祐三年臣伏覩熙寧勑并元豐四年條貫內地知州通判知縣並以三年為一任此正合舜典三載考績之義甚為稽古之美法蓋親民之官久於其任則民安其政故漢唐以來郡太守或有善政則增秩賜金留以久任近覩元祐元年四月勑旨知州通判並以三十箇月為一任臣以謂三年為一任不為稽古之美法乃先朝之定命施於官政極以為便此必是吏部以在部守待知州通判待闕之官甚多少得近闕差注遂欲促其年限殊不知雖時下差注得一畨待闕之官即替回者却多待闕者却衆徒有更張並不濟事又非三載考績之義臣欲乞且遵用三年一任之法取進止若通判以三十箇月為一任即五年成兩任便升入知州則知州之闕轉多潞公文集卷二十九
