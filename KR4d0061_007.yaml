body:
  text: 潞公文集卷七宋文彥博撰律詩留守相公寵示東田宴集詩依韻和呈韓康公嘗同徐勉搆東田花竹成隂雨後天為愛憲臺寬白簡得隨相府賞紅蓮清尊屢釂呤情逸紅袖頻翻舞態妍歸興直須三鼓盡月華况是十分圓端午日招諸公于弊園為角黍之會獨堯夫不至因成小詩奉呈用資一笑范相堯夫時為西臺藥餌從來多客至人情大抵見榮觀戴崇貪赴安昌會必為東田不足歡留守相公寵賜雅章召赴東樓真率之會次韻和呈朱樓華閣府園東蝸陋仍依美庇中儉幕深嚴依緑水楚臺髙逈快雄風四絃清切呈新曲雙袖蹁躚試小童况是元規興不淺歸軒爭敢便匆匆次韻留守相公同逰龍門鑿開青障啓天門直㵼伊流泄汝濆舊説禹鑿龍門以泄汝海之水八節驚濤鼉振鼓千花寶塔雁翔雲巖隈雨過飛泉漲谷口風回墜葉紛龕穴隆穹三像列樓臺華煥兩崖分方陪茜斾來尋勝不就蒲飱趂茹葷北里笙竽皆擁從東山羅綺半酣醺升堂共覩皤仙貌䇿杖同尋古士墳喜脫貂冠親野老幸隨熊軾附邦君林巒岑寂真堪賞市井喧譁漸厭聞人度長川猶隱映香銷古殿尚氛氲周生歸後蘭重佩荀令行時蕙更薰曉露未晞珠滴淚秋花爭發錦桃文羣娃散步塵生襪小舫爭登水濺裙釣叟傍觀皆歎羡禪師迎謁盡歡欣既無冗局羈間迹忍促回軒背夕曛得向石頭溪上飲從今遂不畏移文某在北都纍求致政時駕曹林員外以映山紅曲詞見贈尋答之其末章云遂請後願頻醉石樓溪口今飲于石樓有小娼獨得此曲因以佐飲次韻留守相公住雪應時同雲瑞雪符丘禱喜氣歡聲動洛師農事迎知春後望時寒順應臘前期抽毫未見三英賦貴紙先傳六義詩賢者與民同此樂下民無復共嗟咨次韻留守相公以羅門新渠並成喜而成詠萬艘潭滙嘉猷里分洛疏伊盡北馳逺引駛風通越貨肇營勝迹在唐詩通渠中梗年滋久美利重興勢亦遲漕口羅門今並復相君一一授成規知府學士堯夫遠寄雅章曲念衰老謹依髙韻和呈粗伸感佩之意范相幾年洛社盡朋簮照席瓊枝秀出林月夕同逰詩筆健花時共賞酒杯深帝綸中出榮開府使節西馳愴判襟逺寄佳章念衰朽知君最有歲寒心和致政張徽大夫見貽之什自愧無才濟世難貂蟬挂了謝朝班襟形散逸塵埃外杖履逍遙水石間君亦早拋華省貴人皆仰羡白雲間湖溪聞與郊居近不用拈錢剩買山送順師赴積慶院寂照菴結夏偶成二頌結夏南歸寂照菴潛移性海入華嚴從來野寺門風拙頻與西堂受小參西堂舊有牧牛圖七祖真容列座隅雖是宗門粗淺法從粗入細到無餘野寺衆僧深有望于慈悲開悟也送彌陀實師訪積慶西堂順老好去三摩地相逢兩會家禪心究實際慧眼絶空花聞在東林日常烹北苑茶願將甘露味餘潤濟河沙茶湯各一角聊資禪話頌寄實師順師傳聞二禪伯共是一家風悟處頭頭悟通時事事通西堂入妙用寂照舍真空更有青青竹菩提法眼中余前此二紀保釐西郊與判臺李少師及洛社諸君逰龍門飲伊上有漁者獻鱖魚十數尾因作羮鱠坐客有思鱸之興余後守魏纍請休致久而未遂曾為憶鱖詩寄洛下諸賢今年秋纍與諸君飲於東田池上葦間鱠魚炊香稻以佐酒浩然有江湖是詩并録憶鱖詩如左元豐中留守西京作一尊江上思鱸酒兩首伊濵憶鱖詩今日東田遂前請香粳緑蟻鱠紅絲元豐甲子秋十一日嘉祐中余尹河南與少師李公明龍圖董巨源集賢王伯初同逰龍門漁者得鱖魚數十尾以助杯柈飲興皆歡日月云邁幾二十年感舊念遊作憶鱖詩乃思鱸之比也李東之董沔王起熙寧中北京作西風一棹思鱸興抖擻塵纓歸舊廬最憶香山石樓下清伊深處釣寒魚追思洛社間逰伴屈指于今大半亡若到龍門更聞笛定知悲感似山陽堯夫惠簟使指及門傳惠賜􅀈春薤葉水紋寒相君鼎意多兼濟欲使炎天老者安清明日玉津園賜宴即席元豐七年節應桐華始筵開禁苑新推恩緣舊物如惠及陳人衆樂聞天奏同寅會柄臣蘭肴享豐潔桂醑釂芳醇覆育需雲廣㴠濡湛露均桑榆垂晚景何路報堯仁西歸日瓊林苑賜宴即席竊祿叨榮四紀餘退思僥幸亦無如趨朝再覩新宫省解綬還歸舊里廬報國丹心明皎皎戀軒疲足去徐徐羣公盡出都門祖盛事光於漢二踈臣得請致政赴闕謝恩修覲禮成回歸西洛感恩戀聖情激于中謹成五言十二韻詩一首齋沭繕寫上進遭時方筮仕涉道未逢原四紀叨榮祿三朝忝重恩華顛固一節厚載託孤根得謝緣矜老求全愧達尊懋官非尚德進秩玷維垣海納推􅉼育天容示保存賜筵臨黼座别旨釂金樽獻替芻詞拙詳延玉色溫雲章訓深厚日接寵便蕃穆穆辭宸扆遲遲去國門戀深惟有涕感極却無言誓竭忠勤志書紳戒子孫臣伏蒙聖恩今月二日就瓊林苑特遣中使寵賜御詩仰味聖言恭披宸翰曲推恩禮過奬愚臣感愧之深負荷弗克輒課愚陋恭和聖製老臣為感聖恩殊趣治輕裝覲帝居錫宴便藩親鳯扆賜章重疊捧龜書康時有志才終短報國無功術已踈身在洛陽心魏闕願傾丹懇上公車次䪨留守相公韓康國光和運使度支陳詩今古雖殊事不殊古今賢相事相符昔惟晉國今康國皆自西都鎮北都麻制有卧護北門豫喜裴度之老奕葉公臺緣世濟纍朝名德與功俱鎔成九鼎歸良冶玉季金昆動一爐送圓明大師歸吳興數曲清琴達舜聰瑶津仙苑助薰風朝端多士知音久霅上故棲歸思濃協韻命服鮮華新爛椹行裝輕簡舊焦桐鄉人若問大檀越盡在食經千部中某再獲謝事歸老洛師留守相公玉汝寵惠台什過形奬豫謹達來貺二聖恩深念老臣許從休退樂伊濵重觀景物皆塵迹喜見居留是故人林下放懷無檢束尊前道舊長精神公難久作東田伴却作黃樞秉化鈞留守相公寵示喜雨雅章曲有推借謹抒鄙意上答嵩雲纍晝結層隂一夕雱𩃱濟物深稼穡首資千畝藉焦勞頓釋兩宫心髙臺便有涼風至奧室全無暑氣侵利澤定知均率土保釐再起作商霖留守相公玉汝疊惠雅章過形奬借弟以老乏才思難以繼聲輒以二十八言為謝薦捧佳章頻歎服洋洋盈耳類鏘金老昏拙澀無才思勉強難為繼大音余於洛城建春門內循城得池數百畝其池乃唐之藥園因學徐勉作東田引水一支灌其中歲月漸久景物已老喬木修竹森然四合菱蓮蒲芰于沼于沚結茅搆宇務實去華野意山情頗以自適故作是詩引得清伊一𣲖通三灣相接勢無窮便成渺渺江湖趣更有蕭蕭蘆葦風西洛故年為勝地東田今日屬衰翁藥園事迹分明在盡見雲卿舊記中唐沈佺期雲卿藥園記東田乃其舊地逰東田八䪨文物平津閣風流太傅山勝逰松島外故迹藥園間霜蔀編為屋寒荆刈作關窗櫺雲漠漠畦竇水潺潺蘆渚炊煙起萍漚釣艇還竹經朝雨翠荷借夕陽殷幽興能招隱髙情自愛間從來行樂處擕手一開顔與之珍朝議慕容伯才秋日東田觀魚擲餅水中魚食者衆觀魚雖是樂莫作羡魚心退而能結網所得過千金垂鈎與施食乃是兩般心莫作魯人意公張取百金鳬鷗兩間暇知我無機心躍淵宜自在直莫上鈎金前日蒙留守相公玉汝延飲于中和新堂仍别設氊帳欲令羸老暫憩翌日小娃已傳其説輒成小詩新堂仍設舊青氊欲使劉伶暫醉眠何似竒章南澗上别開一室待焦先留守相公玉汝於中和堂之西偏别設氊帳以待老夫中憩嘗以拙詩為謝尋蒙答貺仍改題所憩為醉眠菴不任感戴輒依髙䪨和呈中和堂飲夜厭厭逸客峩冠欲墮簮深荷相君憐老意改題氊幄醉眠菴留守相公玉汝寵示嘉篇有棠隂舊遊之句過奬難當輒敢和呈曹酒清醇飲易酣接籬倒著不須簮甘棠舊憩人無咏何似退歸伊上菴再和留守相公玉汝惠雅章蝸舍歸來多閉户貂冠挂了不留簮每登丞相潭潭府常憩西廂大隱菴再和留守相公繼示雅章兩兩台符世仰瞻髙懷沖淡厭華簮經綸器業時方賴難遂南陽卧草菴送留守相公康國韓公歸闕尊前不制淚汍瀾大底人情老别難東閣賔朋漸分散西都風景便闌珊惟憑魚鴈通書問祗對松筠想歲寒公衮還朝副公望永將天下置之安次韻致政中散荀龍寵惠雅章承枉安車訪孟津披雲喜覩舊風神昔年友會心相契今日朋從意轉親華髮並蒙難老福清尊莫作獨醒人髙門積慶簮纓盛世上尊榮孰比倫致政中散苟龍連惠三萹俯光衰老輒亦依䪨和呈再鼓羸師其氣已竭止希一覽而棄之可也郢樓髙唱麗陽春重疊三章妙入神席上縱歡殊不倦尊前道舊轉相親故交共是休間客令子今為輔弼人河內仙居頗優逸風流雅尚有誰倫河陽寄留守相公堯夫暫别熒煌座初為半月期洛城歸意切不獨為花時次䪨留守相公堯夫促令歸洛自古錦城雖可樂猶言不若早還家三城爭似洛城樂只是安仁一縣花謝留守相公堯夫惠書及詩意愛勤重河陽滿縣花稱好仰望三川難比肩留鑰惠詩鏘玉振采毫灑墨燦星聫尊前畢集鄒枚客舟上同登李郭仙伊叟依劉心更切柴車促駕即言還雨後全無京洛塵名園勝景足逰人東田兼有春毬探來就三城報得春昨日東田吏來獻探春毬且言花已盛開題河陽太師堂二首自别三城十九年重來舊迹總依然鯉庭兼是魚符守戲綵承顔慰目前河橋洛宅近相望三月花時日又長暫整安居來子舍為我特啓太師堂遊花市示之珍慕容去年春夜遊花市今日重來事宛然列肆千燈爭閃爍長廊萬蘂鬭鮮妍交馳翠幰新羅綺迎獻芳尊細管絃人道洛陽為樂國醉歸恍若夢鈞天題伊叟菴二首伊南積慶墳院北菴斯干室上上方北巖伴自為伊叟菴每到庵中須熟寢覺來惟共老僧談此菴菴北望伊堂南望伊川極目長更有箕山并頴水連延直入挂瓢鄉清明後同秦師端明會飲於李氏園池偶作曾孝寬洛浦林塘春暮時暫同遊賞莫相違風光不要人傳語一任花前盡醉歸賢大師以諸巨公畫像見示傳神寫照曲盡其妙兼丐拙詩輒成一首奉呈用志專精妙入神援毫肖象奪天真能將繪素傳竒表似與公侯結勝因婁德髙僧通夙命王維善畫記前身師緣素習今生悟曾寫雲臺四七人題郭熙畫樵夫渡水扇淺水深山一徑通樵夫涉水出林中可憐畫筆多情思寫在霜紈一扇風經略大觀文相公堯夫寄示東田别後一萹謹次元䪨范時尹太原出處交逰數十年故情勤重見矜憐東田屢涉求羊徑西洛頻陪李郭仙四路連城歸節制萬兵開府杜威權雅章垂貺尤竒絶走筆如風似湧泉次韻留守相公玉汝以某赴東莊特賜佳萹東郊瘠土才千畝繞舍團椒僅百家地接玉泉多草木路經緱嶺少風沙能留過客雖無餌時對清樽亦有花昔日相君曾降顧常憂蝸陋不容車賀經略太尉相公玉汝移鎮太原國節移前晉階符應列星新開大幕府衆號小朝廷風偃殊鄰服威加絶塞寧歸來煙閣上肖象炳丹青北首并州路旌幢擁畫輪萬兵嚴後從百吏拜前塵漢相儀刑重堯風氣俗淳政成期月報四海望鴻鈞將軍號令栁營傳緩帶投壺自適然一片笙歌聞四面晉公舊事在龍泉晉陽襦袴歌來暮洛宅衣冠動去思若到參墟念嵩少北園南望下樓遲憶東溪近得洛信云東溪水漲舟行頗駛常憶東溪溪上坐相從惟有野僧來可憐鷗鳥知人意料得無機總不猜北京作某以端居多暇懷洛城詩伏蒙運使兵部俯垂屬和拙詩伸謝吳審豐倦翼念歸林幽懷動越吟更回溪叟信深契野雲心巴里傳髙唱英韶繼善音便須傳洛社紙價重千金運使兵部以某馳想林泉拙詩言志薦承屬和曲有褒嘉今復致謝為憶伊川塢因成洛社吟永言聊見志真賞得知心黼繡頻加飾夔牙屢振音傳家同祕寶不啻滿籝金運使兵部見采拙詩四沭繼和唱者已竭而答者無窮內省小巫敢當大敵既難收合餘燼願為城下之盟引玉才三唱投珠已四吟出荒拙者三蒙屬和者四一鈞皆協律並蒙次䪨見和六義盡同心巨浸傾無竭洪鐘叩有音鼓行君正勇怯者願聞金元師遷化其徒得舍利供於天鉢因作四十言讃歎既而得殿省蘇承詩又增十字師今順寂去所寂竟如何倐爾歸無物湛然同太虛化成三昧火超出四禪居方悟祗園法又勝漆園書蘇君善知識言詩更起豫令弟堅官滿歸京偶成四十言代書寄判武學顧學士略資一噱多年判武學未改舊官銜有意將投閣無人為解驂師資盡韜略况味極虀鹽聞説鱸魚好歸心風滿帆蒙惠咸陽水梨極佳快陶隱居謂梨為快果太原鳯棲梨少許納上非報也欲校其味耳吕大忠運使惠鳯棲佳果玉漿寒馬乳龍鬚味一般太原蒲桃名重天下未敢便教充釘坐更將冰蜜校量看咸陽有氷蜜之名承答詩披覽歎服無已今復和呈資一噱而巳藥録雖稱性味寒滌煩功效有多般從來御宿佳名著豈與西沙一例看魏人謂壓沙為西沙承惠梨栗前詩止及梨今并及之荒詞喧黯又增戰栗盈襜始自終南采兼量初從御宿般寄到鄴城人未識阿通欣躍已先看承惠鱖白魚蛤蜊仍以佳章見示并深珍感輒依來䪨奉和且申致謝之意河北運使郭民憲考功惠多魚見饋逾雙鯉異味兼常過八珍更使伊賔垂釣手轉思江上鱠鱸人望月懷珠重紫唇隔墻聞賣已稱珍奩收篋貯承佳惠深濟頺山病酒人偶書答岐守吳卿幾復北京作君説歸期未有期西風又是鱠鱸時何當會集香山伴同赴松窗燭下棊東溪奉送景仁內翰歸東都三首君自東都至西洛風光相賞不相違瑞雪承露從頭看看到桃黃興盡歸暮春修禊洛川逰絲管隨登李郭舟仲損昌言俱未至凝眸東望不回頭張仲損張昌言送君東至伊東塢東望青嵩與白雲又向嵩雲更東去花前把酒惜離羣頌送天鉢長老若沖北京作江吳行化久法眼衆推尊不憚南來逺緣從北請煩潮音振祖道朔土闢宗門有授傳髙弟無遮接下根慈航拯羣溺慧日破重昏老守心迷鈍求師示一言五老會詩元豐三年九月諌范鎮內翰卿張宗益工部張問議史照大四箇老兒三百嵗當時此會已難倫如今白髮遊河叟半是清朝解綬人喜向園林同燕集更緣尊酒長精神歡言預有伊川約好作元豐第四春為來歲張本耆年會詩富公第一十太師第二共二人九老唐賢形繪事元豐今勝會昌春垂肩素髮皆時彥揮麈清談盡席珍染翰不停詩思健飛觴無算酒行頻蘭亭雅集誇修禊洛社英逰貴序賔自愧空踈陪几杖更容欵密奉簮紳當筵尚齒尤多幸十二人中第二人再酬富公一絶洛下衣冠今最盛當年尚齒禮容優惟公福夀并勳德合是人間第一流次䪨秦師經略吕通議過洛少留喜過西都暫解鞍尊前不惜醉酡顔推襟道舊從容久落筆詩成傾刻間塞外定知威令肅幕中常得雅歌間相門出相歸人望瑣闥難淹侍從班家園花開與陳大師飲茶同賞呈伯夀劉正叔楚昌言張今朝自賞家園花濃艷繁英粗可誇外監上坡俱不至紫團仙客共烹茶近以洛花寄獻齋閣蒙賜詩五絶褒借輒成五篇以答來貺寄酬洛陽曽端明孝寬左魏牛黃數十枝洗粧添色又新竒金刀剪送三城去聊助山翁宴習池謂陳園也山翁為賞洛花竒采筆連揮五絶詩口沫手胝頻捧讀蘭亭醉墨尚淋漓舊説河陽滿縣花安仁當日頗矜誇洛城花品雖竒絶多出尋常百姓家朱輪大斾行春樂濟上山陽景物佳莫羡洛城花品好三城本自有朱砂朱砂紅洛中竒品陳園亦有之後園不見栽桃李舊尹無能可自知縱使當時曾手植經今十載亦凋衰來書云孟之後園尋常桃李亦鮮聞近有真率會呈提舉端明司馬近知雅會名真率率意從心各任真顔子簞瓢猶自樂庾郎鮭韭不為貧加籩只恐勞煩主緝御徒能困倦賔務簡去華方盡適古來彭澤是其人是詩也率爾而作斐然而成雖甚鄙拙亦有希真之意焉提舉端明寵示三月三十日雨中書懷包含廣博義味精深詞髙䪨險宜其寡和輒次元䪨春光垂欲盡夏景漸增添鬱鬱松篁茂蕭蕭風雨兼花心隨絮落屐齒被苔粘巧囀鶯遷木驚飛燕入簾蝦鬚穿曲沼虎爪度前簷坐久香銷炷吟多費筆尖雲容方靄靄日色未炎炎舞鶴傾丹頂遊龜散緑髯命賔常務率出令更須嚴詩咏當階藥書尋傍架籖蘭芬衣可襲露潤草俱沾貴近辭金馬編修賜玉蟾髙懷惟自適獨樂未嘗厭赤白曾咨丙丹青每誚閻沖和緣飬浩寂寞為安恬身處貧無愧心貪道不亷成文推大手濟用鄙輕縑視履循清節祈恩陋雜占聞韶欣鳯舞在藻愛魚潛鱸鱠思魚艇貂冠望酒簾聖時非吏隱賢業繫民瞻撫事惟公論摛辭乃自謙保躬誠易退康世義難淹類句慙無取酬言幸不嫌奉陪伯溫中散程伯康朝議司馬君從大夫席於所居小園作同甲會四人三百十二歲况是同生丙午年招得梁園同賦客合成商嶺採芝仙清談亹亹風生席素髮飄飄雪滿肩此會從來誠未有洛中應作畫圖傳子山朝奉倅汝隂過洛訪别求詩陳安壽鄴下才名同七子六年開幕得嘉賔子山前佐大名使幕六年老拙所賴屈從潁水投餘刃合去甘泉作從臣素以潘陽敦信睦仍於洛孟得仁鄰士元驥足難羈絆即見康衢勢絶塵留守相公和提舉端明作三壽公字䪨詩輒繼前䪨三川開盛府萬鑰主離宫雪苑延梅叟湖園奉晉公因依念有素出處幸多同雅會歡言意今推前輩風右紀留守相公韓康公千載親逢聖三槐位忝公周行簉鵷鷺渭水愧羆熊致主曾無術康時豈有功台文形雅咏褒假過優隆右自述并謝留守相公春色滿伊嵩春花拆萬紅欣逢翰林主還訪玉壺公聽賞吹簫鳯陪隨飛蓋鴻尊前忍輕别樂事轉頭空右景仁內翰水軒淙夜響花寨􅖙春紅中有羣書府恬然獨樂公清吟如唳鶴髙翥若冥鴻汗簡猶多費時聞槖屢空右君實端明承伯夀大蓬惠書寄大小鉢囊花并語及敝居松下石上之飲因成二小詩片石長松時下有青山緑水覺來無姚黃賞盡東歸去六六峯前會酒徒大小鉢囊花色好不知得似此間無玉華峯下應頻賞綺里園中是飲徒次䪨留守相公洛中金橘嘉實本從南地産移栽洛土結成時踰淮未必全為枳方信中邦物物宜北都留守相公韓以某頃守魏都粗修齋舍特加標榜仍示雅章謹依髙䪨載守銅壺踰八歲漸營涼室與溫房踈簾夏捲清風閣密幄冬褰愛日堂窗靜坐聞松竹䪨徑深行襲蕙蘭香已慙必葺非宏麗更愧佳章比召棠贈國信畢少卿仲衍前作北京僉判北京作鄴下當推七子才兔園賔客重鄒枚三千里外出疆去四五年前點頓來將幕未歸慙老大使旃重到喜追徘朔風不度龍沙逺只向雲中講信回答龎相家園雖陋春物向榮日兾相車時枉逰覽未蒙寵降承貺佳章謹次嚴韻一㕓幽趣斗城西竹映軒窗栁拂堤園吏每誇風物美主人常歎簿書迷碧池荷動觀魚戲朱檻梧傾待鳯棲惟願毗耶長者至莫憂花裏有鶯啼公初還致政有詩云毗耶長者入街初又樂天有惟憂花𠂻鶯饒舌之句題龍門奉先寺興禪師房元豐三年十月時自判北京移西京十月赴積慶墳回作伊叟已先至興公猶未歸憑髙東北望一片白雲飛偶書扇面人生七十古來希老境來侵老病隨自算愚年垂九十也須漸愧耳聾遲潞公文集卷七
