body:
  text: 潞公文集卷四宋文彥博撰律詩某天聖四年叨充鄉賦明道二年夏假副車於本郡今年夏沗外計於本道實嗣世職前此三年先大夫為河東轉運使八月行部率遵故常鄉老歡迎邀留纍日徘徊舊地追惟疇曩因成拙詩二章題於行署不才惟侍髙門慶奕世皆為外計臣鄉老相逢頻教我盡忠思孝報君親昔年鄉賦議興賢曾接諸君硯席間屈指歲華逾一紀錦衣懷綬過稽山送益利路承受梁供奉回京二星同入蜀三歲復還臺供奉與同事羅侍禁同時到任及相繼美替秋晚華軒去江濵祖席開歸途雖日逺別酒任山頽恩渥迎知厚當朝重使才雷簡夫自辰溪還除國子博士鹽鐡判官以書見謝并寄杜鵑鳥一雙偶成二章答學省新聞用退之陽城司業定相知休思杜曲仙鄉隱好獻元和聖德詩三部共推鹽鐡論五溪曾制虎貔師濟源處士功成後始信書生善出竒山人逺寄杜鵑禽因寄山禽遂寄心應謂不如歸去好髙飛却入舊雲林送中舍蒲君致政西歸閬苑當年硯席同別來三十八秋風東朝新命西歸去珍重賢哉鶴髮翁送分司少卿歸洪井二首囊奏祈分務綸恩寵亞卿揮金還故里脫屣謝浮榮綵服趨庭學彤䄡解榻迎送言慙有味何以答希聲來章有願求裴令一篇詩之句知止遺榮世所稀帆風美滿浩然歸江邊聞有梅真宅吟對西山不掩扉送知府給事赴闕紞如驚曉鼓山斾戒晨欣萬臂攀朱轂千兵擁緑縢歸途非杳藐髙步即嚴凝竹馬光前迹蒲鞭掩舊稱睿襟思啓沃宸扆佇疑丞輿論方盈耳僉謀盡伏膺公乎調大鼎皇矣賚良肱屬吏垂三異微才僅五能梁園暫未至燕館愧先登北海難充薦西曹久見矜頑金雖自况巧冶欲誰憑深結君軒戀翻思附驥蠅和太師相公重九日宴府僚之什不獨龍山勝致全黃樞開宴盡時賢風回綺席鸞觴泛日上彤䄡虎幄鮮陶菊香濃侵玳押吳歈聲緩倚鵾絃雲箋一幅西園什如聽鈞韶下九天小園即事間脫蕉衫挂樹丫竹冠芒屫自耘瓜心形散傲如園吏椑榼縱橫似酒家古檜婆娑張碧蓋流泉詰屈動青蛇風清日落未歸舍待得東南見月華宫保相公杜以某於具之役與有勞焉及聞非才忝爰立之命貽詩加奬有晉公親討衛國專謀之句稱述太過擬議非倫輒成拙惡一章以達謝意平淮伐潞皆殊績靖亂夷凶著往編今以薄才叨重任敢將微效覬前賢人慚肖象求商野德謝非熊起渭川惟有安昌念髙第雅章稱述愛彭宣題髙平公范文正親書伯夷頌卷後范自青州書寄許下書從北海寄西豪開卷才窺竦髮毛范墨韓文傳不朽首陽風節轉孤髙春日湖上偶作二首地勝當春早身間愛景幽微風吹積水盡日揚虛舟客至解懸榻魚來避直鈎機心本不動猶恐駭群鷗岸幘長吟坐釣機花香漠漠柳依依夕陽湖面光如鏡風送虛舟自在歸謝太傅相公杜以近詩三十首寄示一軸詩三十詞髙氣格雄文通推雜體吉甫讓清風平日丹青筆當年造化工安車有餘力移向二南中湖上獨酌盡日觀魚坐水邊悠然獨酌望青山樽前解下淵明帢起就東溪濯膩顔外計蘇度支示古銅器形製甚雅輒書五十六字還之古鼎良金齊法精未知何代勒功名更須梓匠為鳬杓堪與仙翁作酒鎗南史有餘景山酒鎗滌濯尚應勞犢鼻腥羶不復染羊羮水邊林下風清處長伴薰然醉玉傾雨中湖上緋桃盛開舟子維纜於樹因書二十八言灼灼穠華照碧流素烟絲雨助妖柔武陵不放劉郎去更就桃根繫小舟得告赴洛辰省松楸往還寓宿於陽翟程密學新第因成四十言寄髙陽公臨趙北際續漢志云屬河間宅據許西偏來往由通德逢迎阻見賢嵩髙當牖外頴樹出墻顛信宿依華廕身居賀燕前時雖春分乙鳥未至提刑司封垂訪郡齊會於湖上道舊為樂兼貺雅章輒成四十言以答來惠昔忝西州牧驅車經劍門見君新鑿沼延我共開樽治岸依山麓疏泉透樹根鴨湖今日會往事喜重論豫移守青社同年宋學士代豫守璧田㑹有來詩因成四十言為答舊許陪原郡時清偃息逰羡君熊軾去奪我鴨坡遊草樹秋芳密禽魚晚思幽相憑皆與問猶憶醉翁不豫在許昌務間多適湖上吟醉月三四焉答南都致政太傅相公雪苑揮毫寄雪宫丘門褒寵過華蟲希聲逺奪霜鐘韵妙墨髙踰禊帖工辱顧頗慙才陋薄玩辭彌見意勤隆西南跂望安昌館何日陪隨似載崇偶題看山樓新畫水山盡日望西山扶笻復倚欄逺觀猶未足更作畫圖看太原府統平殿朝拜逆壘彌天甚君王駐翠鑾荆榛親剪伐家業信艱難一劔山河定千年廟社安故城禾黍美無復驗泥丸太祖朝天兵至城下城中作土丸擲空中卜之外雖破裏頭完則城尚可保平安太宗朝天兵再至復為此卜而一擲內外俱碎而城遂下寄太原韓太尉時建忠武節尹京兆韓以武康節尹太原某近叨恩命避讓勿容伏思天聖丁邜稚圭髙中殊等坐忝附驥歲月如瞬倐焉二紀稚圭以文武兼資中外重望擁旄仗鉞臨鎮方面老生無狀輒又繼之其幸多矣偶成小詩寄呈舊說男兒本分官更將詩句報長安虛庸自省尤非據深玷君家漢上壇和梅公儀待制詩二章登驪山見連理木長生私語都無益芳樹交柯自表竒就使玉真如素願山隂栱木竟何知宿西溪寺地占蓮峯麓溪環鷲嶺巔密林含細籟巍剎照清漣獨賞寧妨醉幽吟定廢眠支郎諳雅尚掃榻就潺湲公儀天章書示暫往藍田兼閲山水以答來貺暫枉觀風斾從容賞物華藍山青有玉輞水碧無沙林靜聞啼狖川長見落霞宜尋幽徑處竹里到南垞和公儀天章雪中遊藍田山悟真寺古寺依山搆髙車冒雪逰穿林皆玉樹倚檻盡瓊樓景勝煩詩筆財豐緩計籌巖阿聊寄傲物外恣尋幽韁鎖慚羈繫匏瓜歎滯留無因陪雅躅清唱復難酬寄青州田龍圖况某伏䝉龍圖諫議以須守青社多居山齊復以某手植薜荔麻黃頗甚滋茂因有虛奬謂之甘棠輒成拙詩一章仰答來貺東秦假手裁經歲偃息山齊興味長怪石罅中裁薜荔於當軒怪石腳裁者尤滋茂碧梧隂裏種麻黃種於兩桐樹之下蒼翠可愛吟牽翠蔓秋烟潤醉擷纎英曉露凉內省非才寡遺愛爭教所憩似甘棠雨後游華嚴川馬上作雨後城南路無泥未有塵因觀曲江樹更憶杏園春草色遙侵水山光翠逼人劭農兼訪古攬轡緩朱輪題中山郎中華嚴川墅城南風物勝最勝是華嚴謝墅偏幽寂顔郎此退潜流泉清繞砌列岫翠當筵更愛村橋畔楊花撲酒帘謝公儀待制惠黃石桃梅摯時為陜西都運得時應在穀城山蒸栗溫娑照席間助我潄流髙卧意曲胘從此不晞顔和公儀隱㕔書事跡貴雖軒冕心間似隱淪林間新葺宇公退此頥神蘚色青緣砌池光碧照人愛君髙雅趣琴酒屢相親㕔在池南景物幽邃豫屢接公儀觴咏于此月夕挈新釀并文石酒樽就公儀南湖雅飲桃花石器榴花釀携就南湖訪飲朋雅論清吟凉月滿山翁不惜醉騰騰次歆和公儀月夕遊南湖凉夜南湖飲林端月上初樽壘既古雅亭榭復清虛靜賞興無盡劇談歡有餘羣騶不解事應厭久停車和公儀咏蒲葵扇不取歸資厚仁風藉爾揚論財雖儉薄應用極清凉六角價非重九華名未光傾心既已久安石勿相忘和登飛橋觀遊艇為愛橋樓月色多飛觴捉麈對吟哦輕舠一葉時來往驚散雙鴛動碧荷和公儀重到隱㕔偶書絶句重訪隱齊留雅咏將歸禁署促東轅曉猿夜鶴君家物不戀南湖只戀軒和公儀湖上烹䝉頂新茶作䝉頂露芽春味美湖頭月館夜吟清煩酲滌盡冲襟爽暫適蕭然物外情與公儀㑹飲南湖作公儀翌日當赴湖上髙樓對逺山一樽清醑且開顔今宵尚作林塘主明日將歸侍從班心向白雲雖自樂身趨丹禁未容間為君不惜厭厭醉賞盡銀蟾秉燭還和公儀逰太華山水清音步步隨謝家歌舞豈須携深逰霧市身應潤直上蓮峰路不迷細草舒茵承蠟屐長松傾蓋護雲梯岩隈靈藥皆堪采未得盈箱亦自提見山樓小飲偶作雲淡天迷楚樓髙地占秦哀箏一行雁小字數鈎銀巷陌三條月池塘十步春府門初夜閉多少夜逰人寄致政太師相公杜四首向作是詩且欲因物將意竟以詞語鄙拙不敢寄呈使人之還承賜手教副以佳章稱是四物加有奬飾故追録四詩聊偹一噱云爾卭竹杖孤筠徑質異纎柔欲假携持助勝逰不為凌霜髙節在對公靈夀合包羞蜀箋素箋明潤如溫玊新樣翻傳號冷金逺寄南都豈無意緣公揮翰似山隂華陽巾俗謂之隱士帽華陽山相遺巾法蜀國烏紗學製成公厭貂裘今已久定知野服稱髙情䝉頂茶舊譜最稱䝉頂味露芽雲液勝醍醐公家藥籠雖多品略采甘滋助道腴近以蜀物寄獻復以雅章為報輒課蕪音仰酬來貺答杜相微物逹誠方愧極雅章流惠見情深野夫自是甘芹味國老何嘗靳玉音伸紙恣窺藍肆寶發函頻作洛生吟辭清墨妙真雙絶韞櫝傳家勵子孫每得公手筆即令子弟輩聨綴裝演藏為家寶天平相公逺寄佳章謹依韻和呈龎相時守鄆曉闕天閽出帝綸麾幢誤委不才臣六條頒詔專臨雍一道全師别制秦雖授深恩辭北闕擬將何術撫西人他年遂解簪纓去乞去伊川號散民昔年公掌秦中漕虎節尋提四鎮師從此功成為漢相至今關內仰蕭規新詩逺寄音盈耳纍牘頻窺喜見眉更問春逰何處好夾城西面景龍池次韻答平凉龍圖王諫議素凛然威望讋西戎十萬貔貅節制中從古藩垣謀帥重于今詩禮得才雄勤歸定是推優賞靜勝由來保上功不獨韋平稱世美緇衣兼咏武桓公來詩云偶因安帖都無事空使淹留不見功之句答王龍圖逰山見寄素分得魚符守雍州垂帷閉閣再經秋眼看巖岫將登覽身似匏瓜苦滯留杜曲朱坡雖已到圭峯紫閣未曽逰却輸假道歸朝客上遍終南寺寺樓題紀太尉廟死節古來雖有矣大都死節少如公惟圖救主重圍內不憚焚身烈熖中龍凖有因方脫禍猴冠無計復爭雄如何置酒咸陽㑹只說蕭何第一功過榮陽玉像院瑞相雙刋玉仁祠側布金輪蹄一道過風雨二山嶔密蘚蒼緣壁喬松秀出林村僧不可語難問祖師心過汜水關濟世安民主擒充執竇歸山川遺氣像史册動光輝原廟今昭德群雄昔畏威虎牢名自久牛口諺應非關塞侔天險封疆介日圍特吟摩詰句度水桞依依某伏䝉昭文相公富以某方忝瀍洛之寄因有嵩少之行惠賜逰山器一副質輕而制雅外華而中堅匪惟便于齎持實為林下之珍玩也輒成拙詩一章報謝上公遺我逰嵩具匜盥杯盂色色全拂拭便須延隱逸潔清那敢汚腥羶行齎每度雲巖側器使當居蠟屐前林叟溪翁皆竊玩山厨因此識加籩器悉以竹編而髹其中輕堅精巧絶倫答青州相公二首來詩一慶豫守洛一序舊龎相非才久玷鈞衡重乞得麟符守洛師聖造如天從素欲愚𠂻何地報鴻慈先塋松檟躬時省私廟蘋繁潔仲祠相國情深最知我郵筒千里貺新詩雅章追念柏臺逰屈指今逾二十秋初奉南牀持大憲後陪東閣告嘉猷心如金石同謀國路出風波免覆舟聞欲堅隨赤松去擬擕靈壽從留侯梅公儀見寄華亭鶴一隻子真仙裔富髙情逺寄仙禽至洛城昔向華亭常警露今來緱嶺伴吹笙稻梁猶憶嘉禾美竹樹應憐履道清樂天池上篇云有華亭鶴二已遣吾家伊水墅旋營莎薦似咸京公儀在雍公署種莎謂之鶴薦繼有詩詠遊平泉作一崦抱溪斜前朝輔相家遺基皆瓦礫古木尚烟霞夙昔東山墅留連上殿車雖云營退隱未免逐豪誇事往如飛鳥林空噪暮鴉池平無舊鳳堤壞有殘沙野叟猶能說樵夫亦共嗟至今巖石下多長紫微花平泉花木無孑遺然巖谷間猶多紫微花是其遺種乎又讀平泉花木記歷覽平泉記文饒性苦奢如何伊上墅多是日南花當時文士咏平泉有日南太守獻名花之譏美䕃皆竒樹清芬悉異葩安知桃李盛不及晋公家竹樹環青嶂樓臺生碧烟珍竒窮四海景象冠三川上黨夷凶日太和歸國年此時能勇退應遂老平泉吾觀李太尉所失在夸權名遂不知退膏明惟自煎終身戀華組何日到平泉徒有思歸意歌詩盈百篇潞公文集卷四
