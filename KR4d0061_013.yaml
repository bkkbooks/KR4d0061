body:
  text: 潞公文集卷十三宋文彦博撰雜文座右銘夫圓首方足肖天地之形是為最靈也褒衣博帶慕聖賢之道在於篤學也噫世之冠章甫衣逢掖而為儒者可勝道哉其庶幾於道則無率皆捨本趨末屑屑於章句間利目前之利語乎道則何其遼哉夫人之常情孰不欲達捨道而進則君子不為也然而道有消長時有遇否所以才有餘而功未著業未半而勲巳百者有矣而昧道寡識者則其得與失孰賢也榮與辱孰珍也曾不知齊景之有千駟不若顔子之曲肱董賢之為三公不如揚雄之執㦸故云不以其道得之勿處也昔我先師厄於陳蔡召子路而問曰詩云匪兕匪虎率彼曠野吾道非邪吾何為至於此子路曰意者吾未仁邪人之不我信也意者吾未智邪人之不我行也子曰有是乎由譬使人而必信安有伯夷叔齊智而必行安有王子比干復問子貢子貢曰夫子之道至大天下莫能容夫子夫子盍少貶焉子曰賜良農能稼而不能穡良工能巧而不能順君子能修其道綱而紀之統而理之而不能容今爾不修爾道而求為容賜而志不遠矣顔囘入夫子又問之囘曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修是吾醜也夫道既巳大修而不用是有國之醜也夫然則君子之於道夷險不易其操焉僕又嘗病世之人其學未得其髣髴即飾虚譽以夸愚俗時小有所長又自慮時之不知也必欲家至而户曉焉嗚呼何反夫先師所謂不患人之不我知之言乎又獨老氏所云自伐者無功之言乎夫鼓鐘於宮聲聞於外又何必其然也昔胡威父子俱以清廉著稱晉武帝問之曰卿之清孰若父之清對曰臣不逮父遠矣臣父之清恐人知臣之清恐人之不知也如此則自耀者不必為優自晦者不必為劣崔亭伯所謂呌呼衒鬻縣旗自表者非隋和之寳暴智耀世因以干祿者非仲尼之道又曹公云行而自炫者女之醜行也夫蘭生深林不為無人而不芳鳳翔千仞覽徳輝而乃下則君子藏器抱道與時隠顯何患名聲之不聞爵仕之未遂乎又嘗患士之多上人而自大者殊不能景行先哲見賢思齊而乃與常輩角其才智自以為能此又見其愚陋褊廹之甚也深不取焉古語有云可為智者説不可與愚者道苟非其人即不如守吾之黙也士君子既能以道自處復去自賢之心加之以遠識清鑒襟度夷曠為儒之美復何尚焉苟不能爾則徒有章句薄才小巧終不能禆儒行之萬一亦與夫刀筆小吏無有異也雖復頂儒冠衣儒服且不可逃詩人彼其之刺又何施面目於士林間乎僕每讀唐相鄭公餘慶傳觀其行事有古人之風真君子之儒矣砥名礪行謙卑自牧踐歴䑓省以蹇諤聞侃侃於公卿間未甞俛仰媚於一人必以其道祇事四朝出入將相逮於晚節不渝素行可謂以功名終始者矣然而當時議者謂沽激尚未以全徳許之噫士君子不達即已苟達焉可不益思慎其名檢乎進思盡忠退思補過夷險一致終始不渝不爾即得為榮陽公之罪人斯幸矣昔揚子雲解客嘲班孟堅答賓戯崔駰達㫖張衡應問蔡中郎之釋誨郄秘書之釋對皆所以矯厥俗而旌厥素焉僕非能編徳於數公也但述於翰墨誌之座右庶幾乎自勉者而已將廣崔生之銘焉因為座右誌云題裴晉公畫像讃并序尚書郎武功蘓才翁得裴晉公畫像於大資政富公謂與家藏舊本正類因以相示予嘗謂裴公自題冩真讃有靈臺莫狀之句意公負其所藴謙不自言俟他人發明之而當時多嫉公勲徳或云平蔡者愬公何與焉又逢吉黨謬為謠言以傾公獨賴正人訟其誣枉僅免於禍雖宗閔素出其門猶憾不引為相擠公於梁則于其時孰肯揚公之羭後世史官於公無嫌追書公美近乎實録噫豈羣邪醜正見抑於當時耶將貴遠賤近人之常情耶予仰公之風覩公之像因原公意輒續公讃繪事雖巧傳神冩照公之靈臺孰觀其妙靈臺崇崇含和處中經始勿亟積善累功賢人之業仗義資忠人不我譽吾不為沮人不我毁吾不為喜竊揆公意如是而已慈照大師真讃嘉祐中余保釐洛師屢遊闕塞始見幽公於寳應精舍聴其言簡而詣覩其相靜而定又其朋智漸法薨之秀也亦謂余曰幽公博通教典潛悟禪那苦行精進為流輩所推余後數與之談漸之言信伊西竹塢積慶蘭若爰集浄衆日嚴鐘梵以奉先公之卜宅幽公樂是胥字惠然肯來亦既宴止遂有終焉之志未幾寂化其徒悲涕慕思圖形瞻禮以永歸依謂余為大檀越來乞讃云師行維幽師心為寂就名觀義循理索跡性相皆空了不可得胡為形容設色之工即空即空傳冩無窮四衆瞻仰悚然信恭題宋宣獻書帖後宣獻公文學徳望為一代宗師頃年甞遊公藩誤䝉與進一日延食於春明東閣示予蘭陵蕭城書且曰名筆也乃知公之行筆類蕭今觀此小楷二軸精勁有法遠出前輩追惟東閣眷與之厚不覺泫然熈寧九年六月二十四日北都善養堂題潞公文集卷十三
