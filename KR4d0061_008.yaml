  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_008-1a, image: WYG1100/WYG1100-0642a.png}
body:
  text: 潞公文集卷八宋文彥博撰挽詞慈聖皇太后挽詞仁皇當寧久聖后配天崇厚德符坤象先朝定震宫尊榮三代禮擁佑兩朝功徽範并慈訓皆留信史中聖孝攀慈範神逰兾少留重明緣積慶隂德在貽謀制服從恩重因山變禮優白雲何處去雪涕望嵩丘榆輴漸出金門逺蘭膳深悲玉座空奕葉舜華推至孝前朝文毋繼清風柏城鬱鬱依嵩北石闕隆隆鎮洛東白髮老臣何以報日期西去掃山宫英宗皇帝挽詞乾德符亨會天飛出慶寧繼明光五葉啓聖協千齡方保瑶圖永俄悲玉殿青定知遷寶座還集太微庭厥初丕命集咸慶長君賢恭儉敦堯德憂勤損舜年象耕蒼野地龍御鼎湖天帝錫宣英號鴻休耀信編在隱推龍德重明協帝華蓼蕭均澤及四海襲威加就日心方切騰天馭已賖攀髯不可跂淚目送雲霞濮安懿王夫人挽詞令淑王藩表恩榮代邸尊篤生為聖嗣善述在神孫吉兆慿嵩麓真歸傃濮園賔天雖日逺國本自靈源昔重間平樂中推輔佐功德容咸有裕善慶果無窮以義情雖奪於親禮更崇洛郊春向晚薤挽變凄風神宗皇帝挽詞千齡逢聖旦六葉嗣昌辰睿智天攸縱章程日又新車書通絶域雨露洽殊鄰民罄華封祝帝思蒼野巡龍髯攀不及鳯翼附無因望斷喬山路憂深祀國人含生蒙聖德率土被堯仁罔極何由報徒能損百身元豐聖政洽隆平溢牘聫萹載頌聲皇武惟揚昭七德帝華克協麗重明喬山去日乘龍馭蒼野􅂒時見象耕億兆臣民蒙澤久損身思報一毫輕老臣逢聖運受眷獨優隆覲禮超羣后官儀極上公皇慈矜舊物帝念録微功一酌堯樽異臣致政後赴闕謝辭蒙恩親御垂拱殿特賜宴仍取御樽别酌一盞面諭云知酒量未退可飲盡玉音洋洋猶在於耳今兹號慕無以勝任三篇説命同臣受命判河南府蒙賜御詩一章自後得請致政歸洛又蒙賜御詩二章恩禮之厚中外榮觀斯心期檢玉不意遂遺弓聲暨要荒外哀纒普率中凄涼石門路慘淡柏城風血淚盈襟隕何由報昊穹宣仁聖烈皇太后挽詞九年四海被清輝瑞彩重輪照殿幃間日視朝勤旰食未明思政事宵衣存心庶務勞千慮決意真遊厭萬機下土顒顒望霄漢仙輿直指厚陵歸老臣八十慚尸素挂了貂冠歸洛陽芝詔薦臨優眷注蒲輪促起預平章重辭禁幄猶如昨今迓靈輿益自傷勉策衰羸來鞏固臨風灑淚厚陵傍故相國元憲宋公挽詞天聖收羣彥惟公獨出羣兩朝推舊德一代仰髙文得位才康世逢時道佐君云胡天不憗撫几悼勳勤念昔為寮契周旋一紀餘佐時君望重謀國我才踈霧露常蒙潤陽秋每借噓忽焉傷殄瘁隕淚滿襟裾名遂營身退髙風近古稀台司脫屣去空土挂冠歸仁夀宜難老朝陽歎易晞宸篇學丘禱恩耀賁泉扉故宣徽惠穆公挽詞二首公弼奕世韋平族經時管葛才蒼生方仰望大厦忽傾頺不憗皇情悼如仁士論哀涇山赴真宅應見國僑來蚤預朋從談燕熟晚陪樞管歲時多心如金石堅無改聲似塤箎久更和丹鳯臨池猶未浴白駒逢隙已先過相門餘慶簮纓盛繼述皆同穀與難故尚書懿敏王公挽詞二首素盛德三槐舊論交二紀深帝聰聞曵履人望在為霖沒世猶齎志時康未稱心孤懷傷殄瘁清淚滿衣襟上臺三品位非輕祕殿論思職更清頻倚壯猷為屏翰合從僉議秉鈞衡頺然處順君無怛痛矣懷賢我有情不獨九原埋寶玉人琴從此絶遺聲尚書令魏國忠憲韓公挽詞三首三朝光輔致升平九敘咸熙入頌聲獨運鴻鈞成大業親扶英主繼重明聖賢自昔推同德忠獻于今重易名清廟已聞從配饗哀榮不獨在佳城敕使護葬特營石室平生投分比金蘭莫逆論心最歲寒唱第楓宸陪驥尾秉鈞槐府并貂冠潘楊事契常修睦相魏親鄰正講歡冰井臺邉星隕後公薨之前夕大星殞于府第百身何贖但汍瀾時留守魏都韓守相州出入三朝共周旋四紀同論交最知我經世獨推公觀水驚川逰升堂失棟隆悲懷與聲淚逺寄紼謳中中書令魯國宣靖魯公挽詞公亮四首三朝輔翊秉鴻鈞功在旗常澤在民黃石授來為帝傅赤松逰去保天真達生優享髙年福出世輕遺大夢身自古陘山多吉宅國僑裴令繼芳塵二府陪逰垂二紀服公哲範每思齊留心舊典皆馴致從事新書悉順稽言發清風常穆若心停止水更淵兮先朝付囑非無謂必為其仁在放麑龜蒙啓土世傳榮猶倚耆英作政卿及見伯禽親拜後方知遺愛在元成穆穆罷朝嗟不憗衝衝停布歎如仁生芻絮酒難親致薤曲書成淚濕巾王太師挽詞圭二首賢書早入英雄彀冠歲髙馳賈馬聲一紀玉堂司大筆兩朝金鼎主和羹天邉遽失騎箕象川上猶思用楫名欲識聖恩優異處密章重疊賁佳城去春解組遂西征曽辱都門出餞行席上詩成光退迹尊中酒滿敘離情經年方歎音容隔此日俄驚柱石傾羸老不能親引紼臨風灑淚濕襟纓司馬溫公挽詞四首莫逆論交司馬丈君心知我我知君同謀同道殊無間一死一生今遂分八十衰翁如稿木一千餘日是殘曛前途若有相逢處尚以英靈解世紛公賫志以歿猶不忘利澤生民心在王室留滯周南十五年成書奏牘過三千東山方起為霖雨大厦俄傾歎逝川密有忠言如藥石别如優禮賜貂蟬兩宫痛悼皆臨奠秪為臯夔志未宣昔有鄉賢陽道州亦聞比近有松楸新阡便合開三徑同氣相求好並逰傅巖舊迹今猶在兼與安平祖廟鄰賢相裔孫還卜宅先疇吉土是歸真司馬贈太傅康國韓公挽詞三首綘朝路相從三紀餘更陪國論對鈞樞康時逺術推賢業造膝嘉猷協帝俞盤結方資庖創解旱乾猶望傳霖蘇寢門遽有人琴歎老伴凋零道轉孤洛城曽與公相别已為人生老别難今作紼謳成永訣滿襟悲淚轉汍瀾别此三年公赴北都餞于上東門愚嘗有詩云尊前不制淚汍瀾大底人情老别難之句西豪居在許東偏丹旐遙遙過許田欲問相君真宅處髙平吉地是新阡公家始卜葬地問于野人此是吉地吉乃野人之名中書侍郎傅公挽詞堯俞三首友會朋從二紀餘金蘭投分更無殊鳯池晚接經邦論龍陛晨陪步武趨起副民瞻方倚賴用為霖雨待昭蘇如何奄忽公先逝自歎靈光老益孤賢業雖長命不融從來此恨古今同為霖作礪君家事未盡舒張數已窮常愛龍潭龜島上移床醉卧緑髯中茂林修竹皆如舊惟歎人琴遂一空昔與欽之飲于濟上泉石之間有小島如龜形令植碧莎如緑髯然致政仲損工部哀詞二首自昔朋逰今五紀斷金連璧附英翹學通經史蒙三益心類松筠見久要白首郎潛甘寂寞清時吏隱甚逍遙年逾九九誠無慊惟歎人亡與道消金蘭取友務端良仲損于余極久長蚤歲傾懷論管鮑晚年修好結潘陽人琴忽起芝焚歎簫鼓俄隨薤挽傷不到寢門親一慟臨風老淚獨浪浪太尉韓國文忠富公哀詞弼蚤擅才名重天資德望崇大勳緣定策美利在和戎一代推人傑三朝倚棟隆音容雖已矣永譽更無窮鼂董經邦策臯夔濟世賢頻堅挂冠請未及從心年早遂赤松伴晚參黃蘗禪懸車垂一紀築室冠山川瀟灑心中相優遊地上仙尊榮兼夀考五福在公全我愧才無取公常問不能白麻曽並命黃閣遂同升調燮彛倫敘將明庶績凝如仁今奄忽昭代失良肱去年春作耆英會一坐簮紳仰典刑今日共嗟天不憗惟瞻英範在丹青達觀定知無怛化常情未免愴離魂卭山土厚雖埋玉遺烈餘芬萬古存故太師開府王公挽詞君貺太子太師早歲馳聲猶未冠錦標獨得冠詞林四朝出處身名泰五紀遊從事契深天聖中豫與君貺同應科舉居守北郊依舊德退休西洛負初心白龍泉畔青烏兆引紼悲謳淚滿襟熙寧中君貺守洛留余會飲於雙桂樓親作沁園春曲詞相屬有華髮青雲之句昔年過洛赴三城華髮青雲敘故情今日人琴俱已矣猶傳樂府沁園聲天聖年中始得朋後陪孟洛兩交承此亦君貺歌詞所及之意追思往事渾如夢老淚如傾自不勝後已北都交印前歲公圖歸洛中待君同賞狀元紅人間萬事難如意須把興亡付壞空君貺久思歸洛余嘗有詩寄之云公乎早歸來莫負花前約同賞狀元紅更看劉師閣楚正議建中挽詩三章元祐五年九月出處交逰五十春洛城晚歲卜親鄰東齋錦襻清談處今日重來淚滿襟大抵神存體不留萬安山下宅松楸平生燕集歌歡友伯夀應同泉下遊正敘新阡與伯夀鄰每讀龜書洪範萹人間五福是髙年公年九九雖無慊散盡耆英我屹然潞公文集卷八
