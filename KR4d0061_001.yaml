body:
  text: 潞公文集卷一宋文彥博撰古賦聖駕幸大學賦并序國家以寰宇昭泰仍歲登平務恢儒風以章示黎獻皇帝乃偹法駕幸于太學詔諸儒博士講論前典親臨聽焉臣獲逢休吉之期恭聞偉盛之事舞蹈不足形於賦詠誠不能述宣上德褒讃形容姑第樵夫之談以協擊轅之韻爾詞曰炎宋受命之四葉皇上御極之三年九有咸若六合晏然黎庶濟于夀域文教燭乎冰天朝無闕政野無遺賢九叙可歌而不紊百官承式以惟䖍刑罰幾措宿㴻不愆荒憬清夷而偃革狙獷慓讋而慕羶軼漠踰沙趣藁街者有萬受纓請吏伏魏觀者且千碧砮文鉞之琛充仭乎儲邸黑章肉角之獸馴擾乎郊阡嘉祥麕集異瑞蟬聨天降甘露地出醴泉語鴻烈則超圖而溢牒較盛時則絶後而光前宜乎優遊當寧拱默承乾尚乃愓嚴𠂻而馭朽思嘉謨而涉淵以為治國之道學校為先故周氏東膠往誥之所顯商人右學來葉之以傳上既行則民胥效也君所令則臣必從焉雖平昔之已務在于今之益宣於是命有司涓良日祲儀盛蕆法駕乃出天威穆穆國容皇皇采章煥爛和鸞鏗鏘太史協樂以前𨗳太丙弭節而徐翔嚴羽衛歷康莊在浚之都于國之陽神移斗運乃至于上庠宸心䖍鞏天步髙驤歷階踰閫覩奧窺堂晞將聖兮有穆如悉數兮相當然後趣講室明典章纓緌匝序巾卷充廊巨儒碩生奉帙而在列禮官博士掌姻而詔王展東面之殊禮法西周之舊章禹聽彌審堯聰益詳夫子善言由兹而不昧虞舜好問於是乎有光時宣諸直講臣講魯論于時閭閈相歡民靈胥喜扶老携弱自遐及邇莫不連踵而憬集駕肩而戾止悉雲委于橋門盡覩觀于璧水粵有華顛胡老童牙胄子含經味道之流方領髙冠之士咸相與而言曰赫胥逺而大庭尚矣無得稱焉不可詳已自夫五帝而降三王之始書契可以傳聞憲章可以追擬悉皆恢雍泮之基盛膠庠之址四術四教因是而興三行三德所由而起是故淳化丕隆至德逾美為萬世之所宗彌億載而罕比卯金之後蓋不足紀當塗窘蹙典午淪弛南取島夷之譏北貽强敵之耻干戈于是日尋俎豆以之中圮咸不永于卜世但胥循于覆軌逮乎有唐皇維誕張五室之儀兮絶而復嗣四郊之制兮抑而復揚置序于術建孰于鄉家知禮讓民用和康所以卜年久而享國長號治古而振懿綱朱石之際龜聲閏位覆亡則曽不暇給學校則誠非擬議噫大道不可以終否斯文不可以久墜于是天命方有特眷之隆世運遂有日新之意維我太祖掃除僣僞俾萬方無塗炭之勞百姓有息肩之地三后繼明百祥遝至展云岱之鴻儀紹元封之故事盛德大業固無與二今我皇上克奉先烈夤紹慶基體元則大纍洽重熙將使儒風寖盛文教日滋故乘輿親視于學俾億醜預覘其儀足鄙元鼎之間屢有甘泉之幸堪譏延熹之際惟尚濯龍之祠夫然則三代之風必能緩步而越矣兩漢之盛豈可並日而論之偉乎軌跡夷易文物葳蕤信千載而一時金苔賦并序王嘉拾遺記曰晉惠帝初有祖梁國獻金苔其色如金聚之如卵投水中則蔓延于波上光生照日上于宫中鑿池以置之常觀焉外人莫得見也惟進御嬪綵多被其賜與置于盤中則照耀滿室故宫中亦呼為夜明苔僕頗異之因為斯賦追其美詞曰伊兩儀之髙厚育萬彚兮紛紜嘉金苔之有異窮古史而未聞出于祖梁之國獻諸典午之君其為狀也色掩捐山光分化鵲非沃壤之可植向華池而可託精氣所為衆口難鑠色焜朝日寧同沈郎之錢根覆輕漪豈美陳王之閣如賜郭釡難藏陸槖縈流荇而細細繚舒荷而漠漠爍堂上之江蘺沮洲中之杜若風團而或謂能鑄浪颭而多虞自躍洊雷臨睨疑抵燕池之蛙出震誤觀常歌漢液之鶴所謂麗水非云滿堂東籬之菊兮瞻我而失色北堂之萱兮對我而不芳葳㽔頻盛蔓延上聲彌長緝作水衣海上濯吉光之服梳為石髮舟中見黃頭之郎伊詭異之餘狀非名言之罄量宜乎首出庶彚超蘭掩蕙持藥友以荃交使蘋輿而藻𨽻雖剃氏之務去兮不我芟夷縱騷人之善詠兮莫吾擬議噫昔産遐陬常依異類既作貢於大國遂見珍於中地唯皇居之必蓄依圓海而是置自逺成美以少為貴非世俗之或覩豈凡品之能譬其或長樂清間承光祕邃翠華黃屋宵逰夕憩春霄宫之鳯腦曷騁輝光咸陽庫之螭鱗皆從擯弃置吾于隆棟之下則午夜而昕升我于文石之前則重昏而燧偉乎哉苔之為狀也亦以異苔之為用也亦以至然不能方屈軼效靈蓍指邪觸佞兮清君之側鈎深索隱兮决人之疑此無所取又將焉為徒能隨波瀾而上下與蒲稗而因依輝煌禁籞賜錫壺闈悅目兮媪宦侈心兮嬪妃南風之蕩兮豈率循于四德正度之荒兮遂曠弛于萬機是致永熙永嘉之蕩析劉耀劉聰之傾逼玉輦播遷金行否塞蟠龍踞虎雖别王于偏方封豕長蛇恣吞噬于中國萬户蒿榛千門荆棘金苔亦陷于敵人深可為之太息律賦省試諸侯春入貢賦天下侯國春入方物聖啓洪緒君臨溥天侯國之辨方有要王春之入貢昭宣列爵正儀謹奉藩而立制建宣協序致任土以居先稽芳載于禮經仰徽名于帝者諸侯述職以無曠太史奉時而可假以謂惟王建國我則叙五等于域中與物為春我則任九貢于天下徒觀夫爵分顯父位列元侯當是時緹管順煦和之美皇祗布發生之休震方之善氣潜逹長樂之洪儀聿修帝容執瑁以端拱臣節奉璋而告猷旅幣羣方咸奉舜班之瑞充庭萬品皆分禹别之州但見雲布封疆綺分邦域故我當歲首以入用致坤珍而罔忒巽風和令導傳臚之九賔遲日當陽麗執玉之萬國豈不以辨九土者當貢首四序者上春蓋將偹物宜于時育助邦光之日新龜納江沱之錫磬浮泗水之濵齒革羽毛以偕至球琳琅玕而畢陳三品良金于以向履端而執贄五都竒貨于以當獻歲而效珍莫不名物森羅衣纓雜襲雖厚篚以斯偹在庶邦而允集此春色霈于皇澤當鄒律之均溫彼貢也錯于地財異楚茅之不入彼來宗者夏之禮制獻功者秋之典章曷若謹歲貢以偹物慶春祺之載陽諒修時而貢職乃辨物以居方偹于蕃于宣之儀皇皇輯瑞當載生載育之候濟濟來王故聖人灼敘聲明光昭文物懿公侯之隆盛克貢賦之繁蔚屬后王布和之辰獻國珍而罔咈省試青圭禮東方賦修舉春祀崇尚圭薦青惟五色之首圭乃六器之儔朝日之郊是薦迎春之禮聿修結緑鴻輝既肅陳于震位出藍美質將奉仰于神休原夫榖旦前諏祲威具舉太史先春而必告宗伯厄職而攸叙青圭之祕寶爰資蒼帝之明靈可佇謂物生有象我則鋭其質以協宜謂歲起于東我則傃其方而得所無瑕可貴有美惟珍配其色表盛德之在木正其位彰與物以為春異雕楮之竒文琢工奚取侔剪桐之秀彩寅位斯陳詎止溫其寧專瑟彼成形自表于瑰器致用必先于毖祀色斯舉矣俯玉按以相宣禮以行之背金方而致美豈不以標十德者圭為貴列四序者春是崇將順時而展禮故辨方而在東䓤蒨成姿稟粹自輝山之石䖍恭致薦逆釐從解凍之風然則為器之用不同禮神之功可尚名參有邸之義色異因方之狀縹華中祕生成之氣候斯迎紺綵外融溫厚之方隅相向懿哉享兹生物之主異彼迎秋于西神感而登禮必答時和而迓衡不迷用可重焉且異舜班之瑞文為貴也還殊禹錫之圭故得鴻覆降康太庭錫羡祈民福以昭格授人時而於變蓋有以圭方㧾翠之美欵青郊而可薦焚雉頭裘賦珍異之服焚去無取晉武帝以德繼惟睿功齊乃神焚雉裘而崇儉負鳯扆以臨民化彼元元必被先王之服燔兹楚楚蓋除希世之珍原夫聖澤遐敷皇風廣被當百度之攸敘見萬邦之從乂諸侯述職既悉貢于瑰竒擴俗賔王亦咸輸于珍異伊彼程據當兹盛時庶為臣之美矣必竭節以事之由是製此雉裘將充乎任土之貢獻諸龍陛爰陳乎執帛之儀徒觀其麗彩鮮明爛光彬郁彌縫皆自于藻翰製作遂成于珍服異王恭之鶴􅌁但取清竒殊李兊之貂裘惟彰溫燠帝乃念兹至巧命以俱焚慮淫靡之下漓薄俗恐奢華之上惑明君俄委燎原之勢遂同有齒之文紅熖初騰漠漠而漸成餘燼青烟欲斷依依而尚靄微芬然後珍怪罔求姦邪悉去六合咸歸于儉德萬化永安于鴻緒雖斯裘之甚美焉能衣之以奉天且厥用之至繁豈可被之而當寧若然則聖政敷于九有帝德合于三無闡易俗移風之道遵還淳返朴之途雖文帝之罷露臺尤難並矣縱武皇之焚甲帳未可同乎則知德不廣無以化蚩蚩之氓儉不崇無以成蕩蕩之主故焚裘之可美在去奢而有取既著美于一時遂流芳于千古者也汾隂出寶鼎賦皇漢之道神鼎斯出至德昭彰炎靈道昌當汾隂而展禮見寶鼎以呈祥有感則通表承乾之穆穆為時而出彰負扆之皇皇昔孝武以運繼東周位崇西漢居尊克務于兢業臨下彌勤于宵旰崇諸厚德俾逺邇之悅隨祀彼方丘冀神人之幽贊禮斯盛矣神惟享之允降穰穰之福靡愆抑抑之儀由是睢丘之畔汾水之湄仰窺乎天見黃雲之繚繞俯察于地得寶鼎以瑰竒莫不煥金景之榮光蔚龍文之麗藻非惟啓于至聖抑亦見乎有道寧虞覆餗實天地之殊祥不假銘功乃邦家之盛寶偉夫萬邦悉慶百辟咸欣非鑄鼎以象物蓋至誠之感神瑞啓明時豈類宗周之寶天祚皇德實為巨漢之珍是何澤及坤靈祥昭金鼎固莫量于輕重又難偕乎竒梃載于瑞典非遷洛以堪同獲彼靈祠豈于湯之足並不然則又安得並芝房而薦廟配白雉以陳詩于以顯皇化之廣運于以昭聖政之無私嶽修貢而川效靈徒虛語爾鼎取新而革去故何莫由斯美夫祀事聿修休祥有秩非勞九牧之貢自顯三材之質所以標瑞諜而紀祥經彌萬代而首出鴻漸于陸賦鴻在于陸為世儀表觀乎大易嘉此冥鴻因漸陸以斯顯遂為儀而可崇欲潔于身克務乎升髙自下不濡其翼寧煩乎激水摶風原夫居賢之象載觀設卦之由斯在體於鴻則蓋取進動漸於陸則爰求爽塏寧同越鳥依棲永戀于南枝有異莊鵬運轉常歸于北海徒觀其載飛載止匪疾匪徐矧徊翔而翩若心髙潔以依于翻迅羽以嗈嗈弋人何慕仰層巒而岌岌陽鳥攸居髙遂雲飛長辭水宿别海上之鷗鷺鄙波中之鳬䳱肅肅隨陽翩翩遵陸見可而進同鳯鳴于髙岡靡常厥居類鶯遷于喬木豈不以陸者地鎮之峻極鴻者羽族之珍竒翼若詎量于軒翥屹然逈出于喧卑非來者之漸矣安跂豫而及之鸞逰而蓋不足取擊隼則又何能為將候雁以同賔羽翮既就與時龍而共起鷙雀焉知不雜塵逰寧同波逝固殊遵渚之列自有鳴山之勢類彼勤行之士卓爾離羣同乎髙蹈之人飄然出世且夫棲陵木者甫濵于山足集磐干者尚邇于水湄茍人言之有厲則世網以見縻曷若我將翺將翔首據髙明之地爰居爰處俯為衆庶之儀孰謂乎無所取材不離飛鳥或俯集于雞樹或下臨于鳯沼宜其羽翼清虛可以為天下表孝者善繼人之志賦人子行孝能繼先志稽禮經之垂訓見孝子之奉親俾繼襲于先志蓋慱諭于後人必學為箕既顯奉親之孝無改于父克彰務本之因得不載考斯文深窮祕㫖非徒樹彼教本蓋以朂于人子欲令不悖于親固在必從于始克讃丕緒始則揚武王之休追祀先公次則顯周旦之美觀其孝道斯盛國家遂行悉務無違之教或敦不匱之誠其父析薪孰云負之靡克若考作室但見構之方成斯蓋君令臣從上行下效俾百姓以從化則一國而興孝用勞用力率從安義之文學禮學詩敢悖過庭之教罔愆先德彌增懿稱于顛沛而克肖實前後以相承子路之貧屢傷斯為直飬孟莊之臣不改是謂難能所謂乎君子能勞後代有繼遵地義以寧失守天經而罔替克紹前烈我則益務于矜莊無廢舊勳我則彌懷于遜悌是曰有後無聞辱先非惟世濟其美抑亦代不乏賢史談著書遷繼而立言垂世夏鯀治水禹紹而隨山濬川懿哉念凱風之言遵白華之義蓋將無忝爾祖是用不違其志夫然則上自君而下達民固宜守兹而勿墜中者天下之大本賦天下之教由此而出中者存乎性性者命于天為萬化所宗之本乃七情未發之前淡乎自持政教自兹而出矣感而后動吉凶由是以生焉原夫頥禮典之淵微得中和之用舍聖人極之以育物君子循之而化下人生而靜故能用其中焉教所由興是以謂之本也始其惟寂惟寞何慮何思道所從而隆矣人可得而由之喜怒不形守為朴素之本嗜欲將至散成禮樂之基外物未牽中扄是斆茍能發以中節是致廣而成教始惟所禀金則義而木則仁終乃有遷父為慈而子為孝是知言其中者哀樂之未發謂乎本者教化之必由藴之則五常盡在散之則百禮交修何異夫大朴將分上者道而下者器洪鈞欲播達乎萌而出乎勾得不載考斯言詳觀至理雖化育之甚大亦權輿而自此誠明內著兩儀蟠極之宗和順外融萬物經綸之始有如此者不其偉而為最靈而可美著達道以攸宜若然則天下之精無能及此縱域中之大何莫由斯故知道不自于天生禮非從于地出起于人性之靜肇彼我心之質所以王者之致中和雖百慮而同歸于一能自得師者王賦能得師者王道成矣王者求賢仄席聞善伏膺克隆于大寶曰位用臻乎庶績其凝得士者昌懋顯日新之德好問則裕弼成天縱之能豈不以訪道者非師而勿克治國者非王而不得茍能擇賢師而訪道是以為聖王而治國勿謂乎介在人上我則接下而思恭勿謂乎富有域中我則尊道而貴德所以保傅是重模範攸資克永持盈之業彌隆卜世之基周道方融吕尚處三公之首漢業將盛子房為萬乘之師樂育賢材旁求儒雅咨詢而學在中矣體貌而禮無違者誠由勤以行之用致勃焉興也心惟主善既光闡于鴻猷道在經邦遂尊臨于函夏若夫雲師紀運天統興王無為之德斯盛可大之功已彰問道猶深于䖍鞏拜言尚極于齊莊行之非艱既美乎后從則聖繼者為善是宜乎邦乃其昌永孚于休必由斯道師事之禮非忒衆正之言可考固異夫五帝之佐德勿及以非功三王之臣志同憂而可保曷若我博采俊彥周爰老成始摳衣而翼翼終負扆以明明前有疑而後有丞嘉謀未盡帝與師而王與友至教方行偉乎稽仲虺作誥之由見成湯革命之美非徒下順于人欲不獨仰符于天理蓋由在上而不驕得師臣之道矣潞公文集卷一
