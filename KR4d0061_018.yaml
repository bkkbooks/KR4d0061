body:
  text: 潞公文集卷十八宋文彥博撰奏議乞令諸路擇機宜官治平二年臣切見諸路機宜司文字繁多所繫至重主管之官往往不先時檢閲詳熟遇有急速應答外界文字或處分軍中事宜致有差誤未當臣欲乞遍下諸路帥臣令掌機宜官盡將本司前後所授宣劄子不下司文字并軍中前後行遣處置事狀一一分門編類排置册封掌遇有應報外界文字及處置軍中事宜參詳檢會不致差悮所有掌機宜官亦乞令帥臣慎擇奏舉取進止條奏薛向利害治平四年臣被旨令看薛向所上疏并邉陲利害具可否條列録進入臣詳觀向之所陳大要有五其一任將帥以制其衝其二亟攻伐以罷其敵其三省戍兵以實其力其四絶利原以弊其國其五慎經費以固其本所謂任將帥者朝廷何嘗不慎擇而重之但所擇或得或否耳既得其人固當如向所論使久其任必各成效猶如前時屢遷數易雖得賢才使將帥亦難責其成功所謂亟攻伐以罷其敵者一曰先舉之策以謂先發制人攻勝後發制於人攻負故欲亟肆以罷之多方以誤之二曰淺攻之策其大旨欲招誘橫山部族團結熟户之兵及義勇弓箭手之衆侵擾賊境使不寧居將自困敝此皆朝廷素留意者兼韓琦上言慶厯初曾與范仲淹嘗建此議會西人輸款而止去嵗樞密院遂與中書同議悉有成算尋已降附逐路今録奏議進呈兼逐路之兵自來未嘗精較實數去嵗樞密院令編例官類聚得確實人數降下諸路嚴切訓練至於部分亦有成法并檢康定中諸路出師牽制之術並密封遂帥遵守令並本佳别録呈朝廷處置之詳殆無遺策然此舉動必當其時去嵗十月臣嘗上奏於先帝若諒祚果遂倔自絶於朝廷以討伐凶渠招納降附無所不可若猶恭順服過即當含容所謂羈縻不絶况王者之師非不得巳豈宜輕用今向亦云若諒祚改圖自新復守誓詔伏望廓天地之量霽雷霆之怒省費罷兵安邉息民天下之幸斯言是矣然於平時不可不講議精熟一旦有隙用之無疑所謂省戍兵以實其力者其要欲省東兵之疲軟揀土兵之精勤取實用損虛偽持久必勝之術朝廷近以計較逐路之兵去冗留精皆有定數俟向去春季依法料簡兼去嵗不以親衛兵戍邉此亦省兵實力之一端也又曰絶利原以弊其國謂朝廷嵗賜并緣邉和市一宜絶之賊勢自窘矣嵗賜和市如諒祚阻命自當絶之上三策不待議論而利害可知所謂慎經費以固其本此乃方今至切之務最要講求蓋經費若簡國財乃富國富即兵強兵強即蠻不敢內侮而後制禮作樂馴致太平何欲而不可今之言者不計國用之豐寡而欲輕舉妄動為國生事者多矣惟朝廷審用而慎行之兵一用其費不資苟力屈財殫雖有智者不能善其後向又以調度兵費宜以康定為鑒其言尤為切當蓋康定時兵久不用人未知戰上下騷然暴取橫用莫知所極天下困弊終無尺寸之功亦可鑒矣向云自寶元初守官陜右出入兵間今又主關中之漕首尾七年目覩心計固宜詳悉其言誠有倫理然謀攻料敵老將所難兵者大事不可輕言之古人論兵至慎至重如向云取橫山如反掌捕西賊若設罝掩兔謀雖可采言亦似輕誠願慎之重之愚慮如此伏乞聖神詳擇御批綏州邉事熙寧元年御批今早得薛向此奏乃知彼中巳是交兵及知种諤尚在綏州未回何故前來朝廷指揮今審量事勢取舍猶未到及據薛向奏云种諤申已令折繼世部領畨兵弓箭手與西賊鬭敵却不説向北人户自能捍拒必是逃竄已及分數又不云續招到人户幾何度其彼中事勢大假孤弱獨种諤倔強以數千之衆守一空城耳於大事必以難就又慮綏城萬一不守諒祚重兵驀來沖突到時須藉諸路帥臣同心慮置及據探到事宜中諒祚所點起兵數亦甚衆多必卒未有期休散今雖一切責與薛向一朝失事戮之亦後時也若朝廷兼為大慮韓琦改作陜府西路經略安撫使更不須降宣别指揮令經制四路軍事既帶陜西經略則自節制諸路便與改正敕文令過節便授餘事候面議奏令陕西沿邉牒送降到畨部於宥州熙寧元年麟府路軍馬司奏昨有軍前殺降到西界畨部結勝欲走歸西界事奉聖旨結勝放罪量支盤纒結口劵轉送與鄜延路經略司令保安軍牒送宥州收管今來夏國纍遣使詣闕貢奉如舊朝廷廣推恩恕務遂物情昨來捉降到夏國人口違去本族豈無懷土思歸之心宜令逐路經略司並依此送保安軍民令牒送宥州收管者論夏國册命熙寧元年薛宗道至若所賫表止是告哀别無陳訴及宗道於押伴官處别無傳達言語欲令孫構因聚會欵曲間祗作巳意問之云先國主薨謝今來何人繼嗣達他若云某人繼嗣即却問云是先國主之何親若表中已有告終稱嗣之文即直便問其嫡否云是子即更問云是嫡子否若云是嫡即與更問云先國主盛年棄世今來嗣子必是幼小他若有對更隨機問答之少間即更説與自古外國必須中國册命者方可取重於諸畨今來西夏以纍世貢奉故當册命嗣子然朝廷以夏國自嘉祐以來於麟州界上掩殺郭恩及於涇原侵掠固家堡子後又於大順城作過有違誓表如此非一以至先帝上仙不時來祭今上登極亦不入賀然朝廷曲示含容尚存事體而夏國終不省過又於去年十一月中於寧順寨界上誘引殺害却知保安軍楊定等三人如此不道今來朝廷必未肯便行封册之禮須與夏國重别商議再具誓表信約丁寧務存久逺方可商議别行封册若依前却有侵犯邉境貢奉不時豈是恭順和好之理若宗道别分疏即隨其言以理折難若云某祇是賫表來告哀不敢與聞他議即且説與今來使還須是子細説與本國知委候議定别具誓表來上朝廷須有商量亦是使人了事之功效也奏減廣南東西路戍兵熙寧元年檢會廣南東西兩路景祐中屯泊兩路就糧本城兵三萬四千餘人治平三年兵共五萬一千餘人比景祐年多一萬七千餘人蓋自皇祐儂賊事宜後來添屯今賊平已久嶺外無事屯兵尚多况廣西稅入至薄糧餉不給皆向內地轉輸而往加以北兵往戍不習水土每至嵗滿戍還瘴死者十有三四此乃守臣務固事權兵官希望酹奬張皇邊事誑惑朝廷虛屯兵甲枉費錢糧不早更張必大困弊檢唐制嶺南五府經略守兵才一萬五千餘人向時亦無北兵屯戍遇有蠻事止發鄰近鎮兵以助攻禦事定則兵還至於兩漢命將自樓船下瀨並為征蠻因事立名事畢即已未有久屯兵於炎瘴之地况儂賊平定之後守土者固當經度減省以寬民力復如往日平時方為了事若但因循坐視勞費豈副選任之意兼朝廷近省諸路冗兵二廣尤宜裁節兼今有臣僚上言廣西設官屯兵增置鎮寨事甚詳悉欲並下本路經略安撫將田子細相度具擘畫利害聞奏并下廣東經略使亦􅀈前項事理具本路見屯兵甲合行減省利害聞奏奏雄州邉事熙寧元年張利一等奏北界待通刺兩屬人户充義軍至時只行公牒理辦必恐不濟事如北界果是刺丁手臂欲却勾追照驗逐旋發遣赴唐鄧等州給與田土居住或乞却於兩屬人户上等內揀少壯之人刺雄州義勇字已作聖旨令張利一等更切密細體探如果欲㨂刺兩屬户充義軍即速行公牒以理闕婉順爭執止約况聞北界近裏巳通刺了義軍獨遷延未便刺兩屬人充軍乃是自顧事體行之非便故遲留未決又聞向前亦曽如此通刺尋亦中輟兼探報云恐以為名意在乞斂而已約若更以道理計術阻之事應自罷設若全不顧道理刺却兩屬人户充軍亦於他無利止是轉失人心奏乞劉怤早過界熙寧元年臣準御批劄子可據陸詵奏如有宥州人來計會劉怤過界之時須是應日令疾速如常前去若諒祚以种諤事發殺其使人即舉兵更是有名萬一事或不來則朝廷應期遣使往來豈是中國先生間隙臣伏詳聖慮深切事機已依準即時行下延州令劉怤應日如常前去不得稽留况自古兵交使在其間蠢爾小醜豈敢輕犯王人兼於他無濟陸詵此奏誠是疏濶萬一過慮如唐時畨賊執漢使犯邉者此亦無慮向差劉怤衆謂此人堅慤有守必能自保忠義論修復延州北金明寨熙寧元年按聚米圖經延州之境東自長寧塞以次帶西北至德靖寨沿邉回逺接賊界地分約七百里舊分三路中路塞門大川直至延州北至金明栲栳兩寨上又分路東入安逺寨自背水川入北入塞門寨自塞門川入沿邉雖是山谷然諸處並有大路行人馬有渾川塞門兩川最是寬平易行大軍先朝五路八界范廷召自塞門川進軍向時元昊大入延州亦自塞門川安然直至城下故先朝常保蘆關以扼其衝要蘆關在塞門北十五里所以置塞門者守此關耳自賊陷塞門安逺金明栲栳塞熟户部落蕩然一空今雖復修金明寨然徒有城壁其衝要之地多陷於敵加之蕞爾州城不可不别為處置潞公文集卷十八
