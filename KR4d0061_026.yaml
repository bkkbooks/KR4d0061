body:
  text: 潞公文集卷二十六宋文彥博撰奏議論西邊事元祐元年六月臣伏䝉太皇太后陛下皇帝陛下不以老臣不才以其逮事四朝出入藩府垂五十年追起於休退之中令平章軍國重事臣敢不極盡所藴上副虛寧臣於簾前纍䝉宣諭將來西人求復疆界令與三省執政熟議臣以所議地界不出二理其一論義理曲直其一計利害大小所謂義理曲直者昨者出取其地土皆邊臣妄希功賞欺罔朝廷為國生事取怨敵人今若推朝廷恩信因秉常所求而賜與之有以懷復敵人之心光大朝廷之德所謂計利害之大小者今所得堡寨并蘭㑹並荒徼沙漠之地本無城邑人煙惟是朝廷創築城壘屯兵戍守嵗費百萬以上困竭中國生民膏血以奉無用之地俱恐不能支久却須自弃如向時囉兀城之比其蘭州本屬董氊元不甚要籍夏人得之已久亦不曾築堡塞戍守只有一小頽廢城塹如中國荒僻村落朝廷不知將謂如中國小小郡縣徒煩兵守所費不資兼㑹州又未知在甚處蓋是李憲當時怯懦不曾領兵赴靈州城下只領兵過蘭州廢壘之下遂欺罔張大云收復蘭㑹以圖苟免不至靈州城下軍令之誅遂誤朝廷以至於此臣亦聞議者謂地界被求而與之亦用兵不與之亦用兵語尤欺罔但向去欲免主議不與起釁之責且秉常來求我如其意而得之必須感戴恩德三數年間當且保無事朝廷近經靈州永樂不振之後可以粗整齊兵勢完養民力異時或有邊事用兵庶幾有偹無患今若不推恩信賜與其地敵人貪暴之性因此不遂所求便作㸃集酬報之勢朝廷方此多事之際兵力未完可得髙枕乎近年以來為新進書生不曉蕃情邊事兵政者誤朝廷多矣願陛下審察而詳處之老臣年過八十感陛下厚恩惟知竭盡補報固無觀望希進之言不勝區區臣今檢録到祖宗以來處分邊事詔書西人事迹兵幾件進入乞賜詳覽或曰蘭州冝如充國可置屯田添助兵食今若有田多屬畨族不可盡奪向時王詔謂熙河可耕以助兵食人牛種子徒有所費終無所成今聞轉運司判官節减蘭州嵗計猶須一百餘萬又當計㑹知州并帥臣保認可以足用否繳進元豐答詔元祐元年二月臣數年前判河南府日見調發帥兵進討西夏受國恩深形於過計遂纍具章疏論列利害䝉先帝聖恩專差臣男貽慶賜臣答詔仰詳詔意乃知先帝本意止務安邊不欲輕舉皆是邊臣希望功賞為國生事僥幸萬一以致兵食困匱財力殫耗今聞於道路之言西人欲求內附臣以謂四裔內侵堯舜之時所不能免伏望陛下恢天海之量廣示開納御四裔之術羈縻而已由此可以偃兵止固吾圉外夷懷服中夏安寧太平之風浸隆浸久臣又以朝廷舉事必較利害唯務開疆以希功賞即不知用兵之時所費錢糧若干得地之後所入租賦若干凡一嵗屯戍兵馬所費糧草之直若干若所得不償所費逺甚即是竭中原生民之膏血以事荒逺無用之地此乃唐開元之末務賞邊功邊臣各求徼幸致中原困竭唐業下衰可為商鑒今因西人請命伏望朝廷熟計而審處之老臣不勝區區憂國之心迫於傾輸言無倫次所有前者䝉先帝所賜詔書輒敢進呈所貴詳知先帝素志惟在安邊不務輕舉謹具奏聞元豐五年李舜舉過洛河先帝意㫖止令邊臣自固邊鄙多如臣所受詔㫖爾後以徐禧南方書生不曉邊事繼之李稷急於官賞妄有開陳經畫遂致永樂敗事臣荷先帝異恩去年春䝉賜御詩云嘉言時幸寄車臣亦仰和聖制有願傾丹懇上公車之句去年三月西人由熙河路入朝內求附臣即於密啓所見未幾先帝不豫遂止今西人復來須至有此開陳望聖明照察論役法元祐元年五月臣竊聞天下諸路差雇役法朝廷雖已降指揮而今未定頗聞煩擾臣檢㑹始初司馬光閲天下臣庶奏章多言出錢雇役其不便遂却復差役之法然司馬光所言甚詳而節目頗繁恐州縣不一一通曉而又朝廷置局詳定議論不一必難通行臣以謂差役之法本州縣常事其來久矣皆素有定法及其末流不容無弊故當隨事刋改臣曽纍具劄子奏乞先令州縣刺史令佐從民利便依例各議定其法縣申州州申轉運司看詳定奪奏聞如得允當却降下施行蓋朝廷大號令必當自上而下州縣常差役理須自下而上則各從民便以天下之廣郡縣之衆不可以一切之法行之行之必互有妨礙而局官及諸臣僚紛然上言各任已見不周知利害及秪付所司别無與奪以至州縣希望朝廷風㫖至今其法未定益滋狡吏侵擾若如臣前請且各付逐路郡縣定奪利害各從其便庶幾下民早得息肩取進止臣元上劄子二道尚書省付詳定役法所劄子一道并知華州趙燮與臣白事劄子一道並録進呈俟臣簾對日别具回奏又臣竊見朝廷差役議臣之中少有熟親民政者所議論不同前後所降命令不一致州郡難以適從緣城郭鄉村人户只有差科二法鄉老村耆各知次第但用心公平必得愜當刺史縣令最是親民之官乞且專委守令各隨本處自來體例差差定役人編成簿籍細開自來體例條貫申轉轉運司看詳體量如各得精當一面施行申奏緣經變法以來僅十五年至今不無小有須合更改從便事條亦當委自逐處親民官及監司相度申取朝㫖詳定仍稍寬程限使盡利害所貴行之久逺差役之法逐州縣各有不同若自朝廷降一切指揮即逐處難以一切奉行今來詳定役法所見可據逐處申陳看詳定奪指揮必當又臣昨以朝廷復州縣差役之法臣曾奏劄子以為差役之法其來甚久此乃州縣常事鄉老嗇夫皆熟知之刺史縣令皆總領之當且委逐縣議定申州看詳如得允當即申本路轉運使司運司將一路詳定即申奏朝廷朝廷覆視如可行即從之如有未便更當㑹問或自有義理即可行之或有顯然乖當即處分改正施行便見就緒今乃置局詳定及諸人議論不一命令雜下致州縣疑難久不决定况差役之法乃戶部所領今乞罷詳定局只委戶部尚書侍郎郎中員外於本部詳定况局中趙瞻劉昱自是本部之官如本部要知本末即令孫永與李常等同計詳定所有舊局中人吏並各勾赴戶部行遣文書所貴早得了當如有諸臣僚奏議役法亦乞不顯姓名降附逐路州縣看詳如有可采亦乞施行取進止應緣役法臣已於簾前仔細開陳訖乞降付三省潞公文集卷二十六
