body:
  text: 潞公文集卷三十九宋文彥博撰舉官舉楊文舉臣切見利州路提㸃刑獄楊文舉亷勤幹敏前年利州路大飢臣纍牒本官體量救濟偹見用心集事以致流民不致重困伏乞朝廷特賜旌奬升陟任使如經擢用後犯正入己贓臣甘同罪取進止舉田瑜臣切見益州路轉運使田瑜材識通敏自到本路歲月未久而辦集財賦更張弊原皆有倫理今臣保舉堪充升陟任使如經擢用後犯正入已贓臣甘同罪取進止舉李九言臣切見太常博士李九言九經登第學術精深施行為政動有規法前任益州通判益州適值歉歲與臣協力賑濟飢民偹見績效今已得替到闕切緣益州通判得替舊例皆得升陟差使近因臣僚爭授益州通判遂停舊例止得循資而九言之職勞未録首為新制所限伏乞朝廷體察特賜升陟任使或悉其學術任以檢討之職如經擢用後犯正入已贓或舉不如狀臣甘連坐取進止舉張撲等准勑節文令臣限一月內舉官三員于通判內舉成資以上一員充知州者臣切見祕書郎通判永興軍張掞文學政事輩流所推兼兩任陜西通判並有聲稱臣今保舉堪充知州張掞不是見任中書樞密院及臣之親戚兼歷任中並無贓濫及私罪情理重者如經朝廷擢用後若贓汚不理苛刻害民臣甘當同罪謹具狀奏聞臣切見太子中允知汾州平遙縣陳湜文行純懿政事詳敏臣今保舉堪充通判其湜不是見任中書樞密院及臣之親戚歷任中並無贓濫及私罪情理重者如經擢後若贓汚不理苛刻害民臣甘當同罪謹具狀奏聞臣切見秀州軍事判官鄧申禀性公直蒞官幹亷臣保舉堪充京官知縣其鄧申不是見任中書樞密院及臣之親戚歷任中並無贓濫及私罪情重者如經擢用後若贓汚不理苛刻害民臣甘當同罪謹具奏聞舉蓋平等臣近准勑保舉通判永興軍張掞充知州今准中書劄子為張掞今任永興軍通判當知州兼以奉聖㫖候得替與試令臣依勑別舉官聞奏者臣切見國子博士通判并州蓋平久于從政素有能聲臣保舉堪充知州其蓋平不是見任中書樞密院及臣之親戚兼歷任中並無贓濫及私罪情理重者如經朝廷擢用後若贓汚不理苛刻害民臣甘當同罪謹具奏聞臣切見屯田員外郎通判廣州張談纍更任使素有聲稱臣今保舉堪充知州其張談不是見任中書樞密院及臣之親戚兼歷任中並無贓濫及私罪情理重者如經朝廷擢用後若贓汚不理苛刻害民臣甘當同罪謹具奏聞舉張宗益治平二年臣切見湖北轉運判官都官員外郎張宗益學識精深議論宏博蒞官為政所至有聲臣今保舉堪充臺閣清近之職所舉不如狀臣甘謬妄之坐舉趙士宏臣切見駕部員外郎知永州趙士宏識慮詳明敏于從政試以繁劇必能幹濟臣今保舉堪充升陟繁難任使如所舉不如今狀臣甘謬妄之坐舉姚復治平二年十月臣切見大理寺丞姚復學政精勤臨事幹敏士檢端慤為衆所知臣兩奏充掌機宜文字偹見其能伏望聖慈特賜召試出身如經擢用後所舉不如狀甘謬妄之坐舉楊遂治平臣切見綘州團練使楊遂出于行陳纍有戰功塵軍廂主落權涇原州總管及㳂邊都巡檢使頗有績效兼年齒方壯臣今保舉堪充管軍及邊上重難任使如䝉朝廷擢用後不如所舉臣甘連坐舉張掞治平二年四月臣切見龍圖閣直學士張掞議論堅正器識周通先朝侍讀學士揆之弟學問優博有兄之風臣今保舉堪充經筵之職如所舉不如狀臣甘謬妄之坐取進止舉劉航年月同臣切見屯田郎中白波都大提舉輦運劉航駕部員外郎提舉在京倉草場李希逸知永州比部員外郎趙士宏並才術優長臨事精敏臣今保舉各堪充升擢繁難任使如所舉不如狀甘當同罪取進止舉魏沂治平二年臣去年夏奉制判永興軍奏辟河南府伊闕縣主簿魏沂就若充京兆府學教授未到任間臣被召赴闕沂已經流內銓投狀情願更不赴任在銓祗候注官勘㑹沂自嘉祐八年登進士第初任河南府伊闕縣主簿方十箇月以臣奏舉罷官不成考第近知改注真定府户曹參軍猶待逺闕伏緣本人久預太學生員衆所推其學業臣今保舉伏乞朝廷改注沂西京或南京國子教授差遣免致久罷官守妨廢資考足以推廣學業訓勵生員舉任逸熙寧四年正月臣切見都官員外郎通判鄧州任逸賦性明敏臨事精詳臣今保舉本官堪充升陟繁難任使如擢用後犯正入已贓及不如舉狀甘當同罪伏候進止舉賈青臣勘㑹本路安撫司所管棣州素號劇郡兼有第十六將官在彼駐劄近聞知州虞部郎中張昌期奏乞宫觀差遣今切見通判大名府庫部員外郎賈青久歷事任才用周敏伏乞朝廷就移青知棣州所貴繁劇得人如朝廷擢任後不如舉狀及犯入已贓臣甘同罪取進止又臣近奏舉通判大名府庫部員外郎賈青知棣州今聞朝廷以别差下人臣勘會慱州知州王休復到任已及二年以上緣本州係居黃河地分合係舉官去處兼所管就糧儲軍不少全藉得人臣切見賈青久歷事任才用周敏伏乞朝廷就差賈青知慱州候王休復任滿日交割勾當所貴繁劇得人如䝉朝廷擢任後不如舉狀及犯入已贓臣甘同罪取進止舉范祖禹元豐七年二月臣切見奉議郎編修資治通鑒范祖禹文行􅋵守為衆所推臣曾論薦堪文館任用臣以為古之用人必因其器能如祖禹之才實堪文館任用伏乞檢臣前奏特賜任使取進止舉冨紹庭元祐元年七月十三日臣切以故相冨弼直道逢辰昌言致主始終一節中外具瞻向與王安石同在中書議論趨向不合義難共事乃請出藩遂不待年亟求致政間居十稔不幸亡沒今聞配享神宗廟廷公論極為允愜今弼之子惟紹庭一名監中嶽廟伏望聖慈以今來配享特推恩禮于弼之子孫更賜優加録用取進止舉孔文仲等元祐元年十一月十七日臣切見朝廷近置館閣職名修復祖宗育材養士之法詔許大臣各舉所知三人以充其選仍立法以祕書省官任校書郎二年正字四年並除校理伏見禮部員外郎孔文仲蚤應制舉學行純正兵部員外郎葉祖洽熙寧初進士選首殆今一十七年學術優深衆謂淹滯比部員外郎錢長卿詞藝精敏問學該通先帝嘗令撰髙麗書本稱㫖遂䝉奬拔三人皆曽任祕書省校書郎偶于未復館職以前就遷省郎不該新制緣逐人各在先朝已經采擢偹祕府文學之任宜在今日之選新條試職之人京官已上並除校理今來逐人已係省郎欲乞詳逐官資地比附各除充館閣近上職名取進止勘㑹復館職新制以前曾任祕書郎者止有此三人今後即無人援例潞公文集卷三十九
