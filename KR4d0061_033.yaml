  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_033-1a, image: WYG1100/WYG1100-0761a.png}
body:
  text: 潞公文集卷三十三宋文彥博撰乞罷重任御書批答皇祐元年卿近進乞解罷重任為遷葬事於私實便於公似有所妨今正使卿當其國政推誠委用君臣同體所求難從所便更不消再上封章乞退所請冝不允付文某第一劄子熙寧二年臣伏望聖慈以臣上表乞解重任求領近郡特降宸翰封還臣章諭令勿再上者君父之命理當必從臣子之志亦有所守臣䝉被厚恩忝塵近位豈欲輕去軒幄自取踈外誠以年事衰晚精力減耗不能則止須合自陳若靦然尸祿必當癏官祈解樞衡願假符守庶寬職責稍息疲癃惟陛下天地父母哀而憐之必賜開可無任又臣以非才久塵重任衰老疲薾力不勝任惟極至誠上干宸造必祈矜憫俯賜俞從雖更多言無易此懇豈敢喋喋徒煩聖聽切見知河陽陳述古到任已久臣雖愚短願假符守猶兾勉駑粗寬西顧臣無任又并手詔一封同封回臣伏䝉聖慈以臣上表乞守外郡特賜批答不允仍令斷來章及差中使傳宣撫諭即時已附狀先具奏謝伏念臣于今早得對嚴宸且陳至懇必期天造俯從人欲豈謂犬馬微志未能回蓋髙之鑑伏地循省但極兢惶臣被遇三朝豈敢輒圖安逸實以衰朽難當繁務庶得許從外補稍遂休養異時或委繁使豈惜捐軀論報又以今兹表裏寧謐愚臣方敢陳請伏望聖仁憐察必賜俞從臣無任又臣纍上章表罄竭至誠未䝉天慈矜察雖欲再三披露無易前懇固不敢重復煩言仰瀆聖慈然屢為詔㫖伏積兢惶亦不敢輒自歸司敗涉於沽激今當待罪私門恭候朝命萬一天慈矜恕俯狥愚懇許從外補稍貸疲駑則老臣䝉更生再造之恩不勝大幸謹具奏聞伏候進止又臣伏䝉聖恩特降中使封還臣今日所上劄子及傳宣撫諭便令供職者螻蟻微誠不能感動天意又以屢違詔㫖退伏私居以待嚴譴雖至仁寬貸而未俞勤請區區所懷隕越無措臣愚尚兾天慈垂憫必從所欲假以外補稍寬疲薾情迫於中言無倫次臣不任惶恐俟命之至謹具奏聞伏候進止又熙寧四年臣伏䝉聖慈封還臣所奏劄子以臣陳乞外補未賜俞從仰味聖言伏增感懼切以犬馬之微猶知戀主況臣奉事尤右行將五年至仁㴠容厚禮優假豈當輕去軒幄自取踈外直以衰老疲劣勉強不前覆餗是虞履氷如栗然每欲陳請必深愧畏內惟悃愊終兾矜從伏惟陛下天地大恩日月委照俯從所欲俾守外藩勉其寸長尚可圖報臣無任又熙寧五年臣內訟非才久塵大任已瀝誠懇仰叩髙明祈解樞機之近司并還將相之兩綬得以散秩假守便州必兾聖慈俯從人欲重念臣齒髮衰殘精力减耗不能則止自知甚明當退一也久妨賢路無補聖政當退二也賦性孤拙與時多違當退三也所當退者三而晏然尸位陛下聖明以臣為何如人天下清議以臣為不知止臣雖愚蠢粗有肺肝夙夜以思不遑啓處恭惟天地至慈不使一物失所伏望亟發俞㫖俯遂勤請臣無任又臣聞慈父不能愛無益之子仁君不能畜無用之臣如臣不才可謂無用臣自叨樞管首尾八年訖無猷為上贊述作官忝空徒任居諭道而無一論可禆聖政職兼常伯責在納言而無一言可回天聼加之衰朽䆮以耗昏尸祿若斯靦顔至甚是敢力傾懇悃薦拜封章祈解樞機之近司并還將相之劇任得以散秩假守便州庶逭人言免妨賢路伏望陛下憐其舊物貸以寬恩未責曠官亟從所欲臣無任又臣伏䝉聖慈以臣乞解重任未賜俞可特降中使封還臣所上劄子并傳宣撫諭已具奏謝切念臣年齒衰殘雖任樞務纍年以來頻乞出補間郡聖慈全度終未允從今以西事向寧及密院忝除副使臣方敢再申前請必望聖慈俯從所欲臣無任又臣以纍具奏封乞解重任私居俟命未奉俞㫖薦被聖聼臣自前日入見陟降俯伏及歸私第左膝轉加腫痛欲望聖慈許臣在假五七日將息稍得平愈即當入見伏候進止又臣以衰老不才久玷樞管比年以來奏章數十上祈解重任乞從外補聖恩存録未賜允俞蓋犬馬微誠不能上動天聼日勉一日于兹八年精神內竭筋力外耗今以邊事寧息力伸前請必兾聖慈俯遂人欲臣復內訟才拙望輕精明不能洞幾微重厚不能鎮浮薄于國之謀固多踈闊為臣之義自當退黜伏望聖慈憫憐舊物尚假寬矜終賜保全早從所欲臣不任又臣纍乞外郡直以衰老無補勉強所難惟望聖慈矜貸許其均勞纍䝉敦諭令赴朝供職雖出對天光口陳誠懇陛下必加存眷未容解去臣子之情仰荷宸意難以喋喋固辭須至不避嚴誅有違聖㫖俯伏私居必期得請臣無任臣辭窮意切伏望聖慈早賜矜可又臣皇恐臣之至誠危懇偹瀝於纍章而天聼蓋髙未賜俞允仍俾亟復其位未即奉詔伏深惶懼嚴誅重譴所不敢逃然臣所恃者聖仁如天必加矜察是以不避再三之瀆猶敢控陳伏望憫臣久勞精力耗竭許從外補以保衰年臣無任又臣纍具奏章乞外補未䝉俞可及連遣中使撫諭亟令供職愚誠懇切久不奉詔以是自訟俯伏待罪然猶仰恃聖慈必從所請臣無任又臣伏䝉聖慈特降中使封還臣乞外補并待罪劄子及傳宣撫諭已别具狀奏謝切念臣止緣衰老無堪久妨賢路連章纍奏罄竭懇誠必望聖慈特賜矜允仍乞於冬至節假前早賜處分臣無任又臣上章乞守外郡私居俟命於兹纍旬今冬節假開伏望聖慈矜允早賜處分又昨晚䝉降中使撫諭及封還臣所上劄子至夜即聞鎖學士院必謂已降指揮遂臣所請今即知是降德音於河隴臣今不避譴責私居待罪須至再有陳請伏望聖慈矜允又臣以齒髮衰殘精力减耗數年以來纍乞解罷重任出守近郡聖慈念舊未忍遐棄愚𠂻雖切天意未從去冬伏䝉聖恩矜其疲薾許至今年同天節後聽從外補德音親被睿㫖丁寧復云不須上表即便踐言臣今更不敢别上章表仰瀆天聽伏望聖慈特申前命録臣向時纍奏許解重任假守近郡臣無任又臣伏䝉聖恩特降中使賜臣詔書以臣乞解重任外補近郡未賜俞允尋具狀奏謝伏念臣年齒衰殘精力减耗內省尸素日虞曠敗數年以來懇求外補庶勉妨賢而聖度含容未即遐棄緣去冬懇請䝉聖慈憫勞俟至今年同天節後聽解重任許從外補且云不須上表便可舉行臣方敢再瀆天聰必期得請臣竊謂天子固無戲言王者必信出令伏望聖慈憫臣衰疲允臣勤請臣無任又臣以去冬親被德音許至今年同天節後聽解重柄出補近郡仍云不許更上章表便可舉行定命臣所以祗具劄子自陳必謂便降諭㫖今乃申遣中使特賜答詔加以敦諭亟令復位即乖誠願深積兢惶須至别具表章再瀆宸聽庶期矜察允從仍乞只據臣今所上一表早賜處分臣無任又臣丹誠至懇已罄竭於纍奏更無可陳述惟仰告天慈憐其衰老許其外補聖言可復人欲是從臣無任又臣昨日隨表上手劄子再瀆天慈蓋臣之丹誠至懇已窮極布露更無可陳惟仰告聖慈天地父母哀而憐之俯察危𠂻許從外補臣無任又被俞音今兹邊事既寧老臣必期得請祈天俟命願賜哀憐臣不任潞公文集卷三十三
