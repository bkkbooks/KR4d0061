  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_019-1a, image: WYG1100/WYG1100-0695a.png}
body:
  text: 潞公文集卷十九宋文彥博撰奏議供取索英宗遺事熙寧元年先帝切於求治審於任人臣等因進擬差塗官上曰朕向在藩邸每聞朝廷除官多是不厭衆論朕亦以為掄選未當及朕臨御以來精意求人不吝好爵今選於衆方知得人頗難然隨才任之使各稱其職可也臣等上奏曰帝王任人不藉才於已往不俟賢於將來隨才任之誠如聖旨乞戒勵諸路將帥熙寧元年今西事方興用兵有漸欲預行戒勵諸路將帥一將佐逐日公共協心講求兵政邉事各務周知利害藴蓄有素臨事不惑則鮮有敗事一將佐依時躬親訓練士卒務令事藝習熟人情相諳免致倉卒悮事一將佐須各熟知山川險易道路逺近敵人情狀所貴用兵料敵不失機會一將佐等須熟詢康定中用兵次第鑒當日之失策則可以致今日之得計一兵分勢弱取勝必難仰本路經略總管熟議戰守之兵各有定數兵有定將量力應敵必求全勝無若康定中纍為誘兵所陷一沿邉小堡寨若遇大冦不能支吾即檢詳前後處置臨時或須併入大寨不管落賊姦便一賊冦大入更相赴救或逐路牽制仰細詳前後指揮處置不得至時觀望不進有悮大事及不得輕有舉動致有敗衄一常切選得力勾當事人探候賊中事宜如所報得實及致官軍勝捷一依前後賞格施行一行軍賞罰常須檢詳所貴倉卒易為處置一所須財糧常須計會運司計置有備仍須體認邉儲難得豐備不得非理妄用一經略司機宜官常須編排檢詳本司前後文書務要習熟齊整緩急處置報應有所依據不致差失稽遲有悮大事一機宜官不得與本路兵官過從結納及赴筵宴有妨行遣文字乞禁止漢人與西人私相交易熙寧二年檢會纍降指揮沿邉諸路經略安撫使嚴切禁止漢人與西界私相交易博買非不丁寧近訪聞諸路沿邉因循習俗不切禁止常有畨漢私相交易蓋緣官司不遵守條貫明行賞罰是致全無畏避及無人發摘告陳近又聞西界不稔斛食倍貴大段將牛羊青鹽等物裹私博斛斗入畨不惟資假盜糧兼妨沿邉及時計置收糴軍儲令欲再下逐路經略安撫司依纍降指揮施行奏陜西保毅軍利害熙寧四年據涇州保毅軍人户程奉先等狀乞除放保毅軍及乞免放送納見錢事檢會熙寧二年八月終據陜西沿邉四路經略使與轉運使薛向分析擘畫到逐處保毅利害看詳鄜延環慶兩路保毅軍皆是於人丁上點差尋並撥並充義勇外涇原秦鳳兩路毅從初並於人户地畝上件差只有相承祖名元無正丁充役皆是臨時衆户依地畝合錢雇人充役每嵗典賣地土於契帖上開坐合著保毅分數隨地推送及至應役之時出助錢數多不齊足經官理索即勾集典賣衆户管認分攤極煩追擾尋牒兩路保毅五千餘人更不勾追只令合著保毅每一名共納錢三貫文各於稅簿內開坐合著分數隨夏稅只於本州縣送納見錢不得支移折變如遇典賣地土亦依分數於契內開坐如兩稅法割移其納到保毅錢别作一項封樁如本路有修城或隨軍差役却將上件錢雇人充役即不得别將支用自行下此指揮後秦鳳路已依準施行公私為便别無詞訟惟涇原路據人户狀稱乞依舊充役免放納錢尋降指揮例與減錢一貫每名只共納錢二貫文去訖今又據程奉先等狀乞免納見錢及乞除放保毅軍體量得自前保毅人員與逐州典利在輪差保毅在州占使因緣侵漁弊幸不一今欲令本路經略使更切體量利害如果是本欲保毅人户納錢不便即却令依舊充保毅非時不得勾抽在州縣及諸官下占使除大段修築城寨及隨軍搬運軍須即得勾抽差役所有自前已納不拆保毅錢具數封樁抵充和雇夫匠修完城壁奏西夏誓詔事熙寧四年夏國遣使通和今月二十三日中書樞密院同奉聖旨令押伴説與西人除綏德城界至欲令趙卨商量外餘依從來蕃漢界至重立封堠掘壕塹封堠界壕內蕃漢任便樵牧耕種彼此更無所禁於界首擇蕃漢穩便處置立和市許蕃漢交易漢收漢稅畨收畨稅候商量上件了當即納誓表降誓詔待之如舊又一興置和市檢會前年冬已令蔡延慶等各於逐路先次密切體問自來畨漢客旅博易往還之處相度置立和市須至兩界首開置市場差官監轄畨漢客旅除違禁物色外令取便交相轉易官中止量收漢人稅錢西界自收畨客稅利去年夏諸路已相度到利害相次便值西人於慶州作過遂未曾施行今欲重舉舊議此一篇即不係誓表內開説一綏德城為未曾立定界至致去年修立堡鋪頻有交爭欲令押伴説與西人同延州差去官分明標立定界至載在誓表所貴久逺别無交侵此一節創新須入誓表餘依慶厯四年誓表誓詔一秦鳳路甘谷城至治平寨通謂堡自來雖界至分明為未有壕塹以致纍年頻有西人侵入地分今令秦州德順軍於本界內開㙭界壕所貴久逺别無交侵此一節祇是於界至內創開界壕止欲令西人知勿令沿邉首領妄有占乞别定益利鈴轄司畫一條貫熙寧四年臣勘會益利鈐轄司以所部去朝廷逺承前體例事由便宜裁決所以上體倚寄之重亦以安服逺人之心二廣雖亦遐逺權其事體輕重不侔均順之事耳目未逺故朝廷擇守比他蕃鎮絶重舉西南事一以委之慶厯六年臣知益州時屬飢災列郡多事賊盜興起刑獄淹延事稍有疑例欲奏決臣勘會得益利路鈐轄司多是承例酌情便宜區斷尋曽牒轄下州軍今後勘到合行奏聽勑旨公案且先申當司以慿相度其間有别無疑慮或情輕法重可以末減情重法輕當從嚴斷者率皆便宜決遣內有事狀必難裁處方敢奏聞兼朝廷不以為非在川蜀甚以為便邇來事體與昔頗殊處置之間或多齟齬今本路提刑司纍奏乞别定鈐轄司畫一條貫猶恐本路鈴轄司今來依舊引用臣慶厯六年川蜀飢災之時權宜公牒致監司官頻有論列欲乞送刑法司依本路提刑司别定鈴轄司畫一條貫所貴經久遵守施行取進止論用人熙寧四年臣屢被德音將來西事寧息更須精擇守邉之臣積粟訓兵為經久之制此乃陛下恭紹祖宗之丕基慎守盈成之大法將欲躋斯民於富夀致天下於太平臣退思之不勝竊忭又思以虛薄孱拙不能上副陛下孜孜求治之意更增悚惕今所擇邉臣雖未得周才及已試之效但思慮精審不輕舉妄動以求徼幸苟圖進身則已善矣復能訓兵積粟節用愛民恩威兼著將使逺人懷附非但不敢侵侮而巳兹所謂長城巨屏致朝廷高枕無虞矣若一用輕險躁妄之人使之守邉為國生事以規身利則邉無寧謐之嵗兵無休偃之時中外擾然民不聊生矣臣謂有唐天寶建中之難可為龜鑑開元初明皇勵精求治任姚宋為相馴致太平當時不賞邉功以妨生事及天寶之際林甫國忠作相引用匪人布在朝列時以承平既久才力富盛於是邀功之將務恢封略以甘上心欲蕩滅契丹剪除吐畨喪師者失萬而言一勝敵者獲一而言萬寵錫之極驕矜遂增哥舒翰統西方二帥安祿山統東方三帥踐更之卒俱授官名郡縣之積罄為祿秩於是驕將鋭卒萃於二統邉陲勢強朝廷體弱祿山一唱中原蕩析元和中宰相李絳亦對憲宗云開元之末姦臣説以興利武夫説以開邉天下勞役以至大盜竊發兩都覆沒憲宗又嘗問侍臣建中之難朱泚盜據宮闕德宗播遷梁漢致亂之由宰臣李吉甫對曰德宗之初躬行節儉任崔祐甫作相動遵至道及祐甫歿繼其任者或非其人忠諫不聞小人乘間邀功便巳苟媚當時以為河朔未賔宜用力取甘言先入主聽致惑是時國材不足趙贊司國計先纎細刻急括率京師商賈富民又諌官陳京獻策稅屋間架立法峻急人情愁怨遂致京師叛亂鑾輿播遷實由輕用兵信小人剝下之謀以致危亂是二臣者皆願憲宗追念前朝之失以為元龜所論天寶建中事皆出唐書非臣附以臆説臣今伏聞德音以西事寧息之後慎擇邉帥為經久之制實安邉息民之逺圖乃馴致太平之長策天下幸甚然尚慮有邀功生事之將希時取合之臣潛為甘言上惑睿聽伏望陛下鑒前古治亂之由更加詳察或付之外廷公議可否兼樞密院每進擬用人陛下纍云某人好作事可用某人不肯作事不可用臣愚以為事有可作而不作誠為過矣未遇可作而作失其宜矣不可作而妄作非惟害事實害治道夫下之人不從上令而從上好上好是焉下有甚者且中人常情鮮克守經趨時希旨從上所好則必勉強作為不計後之利害止圖一時僥幸者衆矣伏望陛下察其言觀其行原其始要其終可行而行可作而作庶無後害比者臣以劉邵人物志進説未審陛下以為如何臣以邵之書主於􅀈察人物於任官擇材之法有可觀焉故其序云明王之宜玩宰相之宜覽又曰人之質量中和最貴中和之質必平淡無味故能調成五材變化應節是以觀人察質必先察其平淡而後求其聰明至於人主任材亦貴平淡若道不平淡與一才同好則一才處權衆才失任夫一才處權則憸邪之人枉道附離而希進朋比之風扇矣衆才失任則端方之士守分卷懷而思退忠正之路梗矣然則於任人求治之道必有所偏偏則必有所害傳曰逺佞人去鄭聲夫佞者才智之稱蓋邪佞之人必有小小才智以飾身而干進其事君也務納小忠興小利以自效夫小忠必為大忠之賊小利必為大利之害苟人主不早辨之終必致於禍亂如聖人之於去佞其戒尤為深切書曰在知人在安民知人則哲安民則惠能哲而惠何憂乎巧言孔壬伏願陛下貴平淡之道以用人使羣才不失其任推哲惠之心以去佞使羣邪不干於正堯舜所以致治而於變時雍者由斯道也臣備位樞近內省尸素思竭區區上禆聖政干冒旒冕伏候嚴誅潞公文集卷十九
