body:
  text: 潞公文集卷三十五宋文彥博撰辭免免充禮儀使至和二年右某䝉差人送到牒一道為迎奉太祖皇帝御容孝明皇后聖容赴開先殿奉安奉勑差某充禮儀使伏緣某將及都門未經入覲況未授命即預相儀實恐非便已具劄子奏乞改命大臣充使所有元勑一道謹具送納中書辭免公使錢治平四年臣今早進呈宗室公使錢文字䝉顧問體例臣因便奏陳極密使帶節度使不當例受公使錢去歲曾奏乞請罷當時雖未䝉俞㫖然臣必不可請受臣近移鎮永興軍又准宣接續支賜公使錢今檢到去年八月奏劄子一宗文字謹具進呈伏望聖慈許從請罷非惟遂臣素志亦兾粗革前弊稍有後法取進止中書劄子熙寧二年十月准今月三日詔中書門下二府者政事之出也維是一二股肱之臣日謨于廟堂之上皆朕所尊禮之顧其職豈有重輕哉伏覩仁宗實録天聖時二府之相猶以其職髙下定位則知往者不若今制之拘也今文彥博蓋朝之宗臣朕方倚以疆垂之事雖用陳升之為宰相其令升之仍位彥博下以稱朕遇賢之意故兹詔示想宜知悉已降詔書如前答詔劄子右臣伏覩今月三日詔書宰臣陳升之位在臣之下者朝有著定國之彛儀苟容僣踰是紊綱紀況臣之孱薄安可克當願寢異恩庶安孤跡兼考先朝故事止因曹利用而行臣本書生粗知禮節事出姑息決不敢從伏望聖慈特賜俞可又臣昨日奏乞班位在陳升之下及追寢十月三日詔命未奉指揮緣今日百官起居中書密院别班入殿即無妨礙自來日後赴常朝中書密院同班入殿若未得請即難以入班臣須至家居俟命伏望聖慈俯從愚懇早降俞㫖取進止今日進呈文字畢欲再懇請又已日旰不敢留身御批十月五日卿兩朝舊德顧命元勳位右升之禮體甚順其勿過為謙抑久鬱朕待卿之志兼已降詔㫖來日不可不入視事也答詔劄子十月六日右伏䝉聖慈特賜手詔以臣纍奏乞位在升之下及追寢十月三日詔命未被俞音亟頒宸翰誤奬臣以勳德令勿過為謙抑臣以謂忝備近司當守法度朝班之制不可僣踰蓋聖慈曲有褒優在愚臣固非謙抑況兹禮例之起自於利用之初臣實畏之豈可當也必兾曲軫天慈俯從人欲詔㫖令來日不可不入視事臣今日即未敢隨班入殿已依禀入本院視事聽候俞㫖手詔省所奏伏覩詔書宰臣陳升之位在臣之下者願寢異恩庶安孤跡事具悉卿翼亮三朝周旋二府國之耆雋望實素隆升之任用尚新甫登宰席原其雅意必欲推先是用斟酌禮文裁其宜稱發于朕志奚取常規蓋以褒異老成豈與利用為比卿謙恭久著於此何嫌往安乃居毋逆朕命所乞宜不允付某答詔劄子臣纍具奏乞追寢十月三日詔命及乞依儀制立班在宰臣陳升之下至今未䝉俞㫖臣欲伺候陳升之正謝畢再具陳乞又檢詳儀制使相在親王之下宰臣在親王之上將來合班尤所不便伏望聖慈詳臣纍奏班在升之下正朝廷素定之儀安愚臣所守之分區區之誠必期從可候勑㫖手詔十月十六日省所劄子奏臣纍具奏乞追寢十月三日詔命及乞依儀制立班在宰臣陳升之下事具悉卿往事仁朝再為上宰豫嘉舊德進服邇聯而固執謙撝屢形論請謂宗祖之故雖嘗以宫使而等差而朝廷之儀亦已下詔書而著定懇懇辭避至於再三勉從所請不忘嘉歎所乞冝允付某中書劄子十月十九日准今月十九日詔書中書門下朕為國朝之制雖兵民分于二府然其委用者皆所謂執政之臣豈獨相樞密者以為使相耶朕嘗惑之故丙申之詔令文彥博頒陳升之上所以尊老成而均政體也今彥博數言於武臣之例非可同于親王之班有未便執謙慮損情有莫回豫思罔然雖拒勿得其令中書門下如所請施行故兹詔示想宜知悉已降詔書如前乞免移判永興軍熙寧六年七月臣近䝉特降中使賜臣移判永興軍敕牒仍傳宣㫖以關中久旱慮人心不安令臣往彼安撫一道臣內省衰拙何以克當臣以謂朝廷嚴戒邊臣不得貪功輕舉致有引惹若邊鄙别無事宜人情自然安帖以至方田助役團結保甲皆非目下交切之務且令權住及罷提舉常平之官一切委之提轉務從寬簡以絶搔撓則關輔之民不止安帖亦可小康如此即吳中復自可安撫關中不須愚臣誤有委付伏望聖明詳察取進止再乞免移判永興軍右臣近瀝懇誠乞免移判永興軍事伏䝉聖慈特賜詔書敦諭不允所乞伏念臣以齒髮衰遲久當重務聖慈矜憫方許均勞假以近藩實寬衰拙今才赴任三城尋便就移京兆況關輔之重誠非衰老可當伏望聖慈必賜矜察慎選才德付以分陜聽臣却赴河陽之任臣無任免兩鎮第一劄子臣得進奏官報二十六日降麻制除臣兩鎮節度使聞命若驚不遑啓處臣以愚薄遭逢聖明祿厚位髙日虞危溢陛下曲念舊物恩禮過隆苟義有未安則禮當固避切以本朝以來名器至慎兩鎮之重親王方授雙鉞之貴庶官不除臣豈敢貪天之功越本朝之制靦顔不顧冒寵以居匪惟于臣難勝實乃為國惜法伏望聖慈特寢殊恩以全舊典令臣安分庶免責言臣無任兩鎮之重非庶官所授頃年韓琦罷相曾授兩鎮亦不敢當伏望聖慈矜察即賜寢罷第二劄子臣近覩進奏官報制除臣兩鎮節度使臣即已具表并劄子以臣之愚薄及于理必不可冒授乞賜寵罷未䝉俞可臣伏念上荷聖恩過有優奬臣今不敢全違恩㫖乞祗授所加食邑實封即于老臣得安愚分臣無任激切俟命之至臣于前奏已具陳述兩鎮之重非臣庶可授況韓琦已不敢當今臣決不可受伏望聖慈矜察仍乞貼麻處分第三劄子臣于今月十一日再具劄子布露誠懇以兩鎮之命至優至重愚臣決不敢當蓋恐自臣遂成體例臣亦上體聖意不敢全違恩㫖祗乞授食邑實封兼鎮乞從寢罷伏望聖慈俯從所請臣無任潞公文集卷三十五
