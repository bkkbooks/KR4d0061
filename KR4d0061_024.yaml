body:
  text: 潞公文集卷二十四宋文彥博撰奏議奏黃河曹村決溢利害乞擇水官熙寧十年臣於今年正月六日奏為據德州申大河自去年秋夏至今冬河底淤澱通流不決河勢變移不循故道見今四散漫流兩岸俱被水患臣詳黃河下流淤澱疏濬不行泄水不快即上流水勢須至壅遏若不預行經制切慮將來河水泛漲必於魏博恩澶等州決溢為患自後不聞水監别有擘畫只是固護東流北岸今年五六七月間大名金新堤一帶諸掃非常危急果致澶州決溢臣又檢會今年正月八日奏為近年以來河防官吏以減省物料指望酬賞只緣三四年來黃河非常水小掃岸偶無危急是致減得物料即非久逺常制必恐掃岸漸次有失添修若將來河水泛漲如舊必致踈虞伏乞檢會舊條不以減省物料指望酬奬今年夏秋水漲諸掃危急多稱物料少數亦聞今來曹村掃決溢自熙寧八年九年十年檢計春料合行接貼低怯之處三年之中並不曽應付接貼兼本掃兵士多在别處占使或駕船裝搬水利司小麥外見在只有兵士十七人實役致今以來堤身低小怯薄遂至決溢臣前來因論列河事并及水官乞行慎擇今河岸京東州縣人民被水患者莫知其數嗷嗷籲天上軫聖念而水官不能自訟猶汲汲以希賞於理何安臣前後所陳出於至誠本圖補報非敢激訐輕有干冒伏望聖慈垂察奏定奪所勾人吏事熙寧十年八月六日臣本司準定奪取勘所牒勾追安撫司全司人吏八人留守司河堤一案人吏十人赴京照對濬河公事伏為今來本路州府非常大雨及黃御河決溢并德棣博等州賊盜常多曉夕行遣文字救護水災修完城壁隄防催促捕捉盜賊凡百公事比之常時數十倍多加以所行文移急於星火今若盡勾却上件全司人吏則所掌文案首尾並無人檢會承稟行遣必致違誤本已具奏乞將上件人吏如的合何罪即乞依條收坐就鄰近州差官取勘敢不承伏兼昨來保明熙寧八年濬川退出地土事臣為見九年河水依舊復來淹浸却八年退出地土人户並訴水災照會得事理仔細分明是以不敢雷同保明况事皆由臣不由人吏如顯有不當只今獨坐臣罪伏望聖慈詳察特賜指揮取進止臣伏詳元差官定奪疏濬黃河及開運河如有理曲之人便行取勘今來定奪所勾追人吏不少切恐定為理曲之人伏望聖慈將所定理曲之狀付臣容臣一一仔細開拆聞奏所貴不誤朝廷賞罰乞恤刑元豐三年九月臣切見近年以來中外刑獄頗有枝蔓淹延大暑盛寒縲繫囹圄其間豈無寃滯感傷和氣朝廷每至盛夏必行疏決或水旱為災原減輕繫此聖慈欽恤之至也然守臣獄官鮮能上副陛下之意有傷仁厚之化夫刑者所以輔教聖人不得已而用之故三王任德不任刑以德為陽居大夏生成之時以刑為陰居大冬不用之處所施輕重居然可知臣不敢以經史逺事言之切以唐之憲宗號為中興任德任刑頗得其理嘗謂宰相曰于頔懷姦勸朕任刑欲朕失人心也且聖人感人心而天下和平人主而失人心邦本何由寧固臣謂今之牧守監司宜得明惠厚重之人宣布朝廷寬大之澤施愷悌之政變刻薄之風則太平之隆可垂拱而致論赦事元豐三年九月臣伏覩陛下躬行大享之禮前朝潔齋於路寢朝謁於靈宮孝享於太廟乃格明堂以嚴宗祀祀禮之重莫重於此既而御端闈孚大號霈惠澤於天下號令之重莫重於此然號令之出在於必行不惟其反謹詳辛巳赦文釋繫縲貸逋負比常赦至寬自殺人已死及監主自盜官吏枉法外罪無輕重悉除而近嵗以來中外臣僚多不詳罪犯與情理之輕重皆乞遇赦不原朝廷或從其奏臣恐輕重之間有所未安且臣下迎合赦令則禮為不恭朝廷遂從其請則令有不信臣乞今後凡有罪奏乞不赦原者並送刑部候具獄上一繫朝廷臨時特旨臣伏覩近降赦文官員犯罪依條不以赦降原減者許於刑部投狀具元犯奏聞未斷者案後聲説取旨蓋朝廷必以情理輕重而區處之進史論元豐三年九月進臣讀漢史鼂錯之策云五帝神聖其臣莫能及故自親事臣謂錯之言乖謬頗甚因試論之夫易之乾曰天道也君道也坤曰地道也臣道也天地既位君臣之象著矣君臣交濟邦家之治隆矣而錯乃云臣不及君故自親事然則古之聖帝明王安用輔相而致治乎所謂五帝者堯舜為聖之優故仲尼刪詩書則斷自唐虞為萬世法二典之載堯則有命羲和為天地四時之官允釐百工庶績咸熙舜則命禹平水土棄為稷官契為司徒臯陶作士垂為共工益為朕虞伯夷秩宗夔典樂龍納言皆選於衆而後用其人各任以職且云僉曰汝諧慎柬之至也所以百工允釐熙帝之載如此則堯舜果自親事乎仲尼曰舜何為哉端拱正南面而已錯所謂自親事豈非乖謬乎若後之人君謂錯言為是乃以一身一心兩耳兩目獨任自用以周天下之萬務豈不殆哉又將使厥后自聖無復察邇言好問之裕仲尼云一言幾於喪邦者謂人莫已若則錯之言亦幾於兹乎臣故著論深切以明之庶幾有所補益潞公文集卷二十四
