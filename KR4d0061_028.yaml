  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_028-1a, image: WYG1100/WYG1100-0738a.png}
body:
  text: 潞公文集卷二十八宋文彥博撰奏議進漢唐故事元祐二年臣近者竊聞聖㫖令經筵官間日進漢唐故事各一件以偹御覽有以見聖德稽古求理之切臣忝預經筵固當粗有禆補輒亦於漢唐史中節録得數事繕寫進呈伏望聖慈采覽一漢文帝紀贊曰孝文皇帝宫室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為身衣弋綈弋黑色也綈厚繒帷帳無文繡以示敦朴為天下先專務以德化民是以海內豐冨興於禮義斷獄數百幾至刑措嗚呼仁哉二漢武帝問東方朔曰吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歷數千載尚難言也臣不敢陳近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈師古曰弋黑色也綈厚繒足履革舄師古曰革生皮也不用柔韋言儉率也以韋帶劔師古曰但空用韋不加篩莞蒲為席師古曰莞今韋之葱蒲也莞以莞及蒲為席亦尚質也音官兵木為創服䖍曰兵器如木而無創言不大治兵器也衣藴無文師古曰藴亂如絮也言內有亂絮上無文采也藴音於粉反集上書囊以為殿幃師古曰集謂令聚也以道德為麗以仁義為准師古曰麗羡也准平法也於是天下望風成俗昭然化之三漢丞相王嘉上疏言孝文帝時吏居官者或長子孫以官為氏倉氏庾氏則倉庾吏之後也其二千石長吏亦安官樂職然後上下無苟且之意其後稍稍變易公卿以下轉相促急又數以改更政事司吏部刺史察過悉劾發揚隂私悉盡也言大小盡皆舉劾過於所察之條吏或居數月而退送故迎新交錯道路中材苟容求全不敢采持郡下下材懷危內顧常恐獲罪每為私計一切營私者多二千石益輕賤吏人慢易之或至上書章下依其所上之章而下令理之衆庶知其易危言易可傾危小失意則有離叛之心四漢宣帝謂太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治效輒以璽書勉勵增秩賜金或爵至關內侯公卿缺則選諸所表以次用之師古曰所表謂增秩賜金爵也是故漢世良吏於是為盛稱中興焉臣近曾上言乞刺使縣令須滿三年一替及尚書吏戶刑三部官職務尤重須令久任此皆治古之法兼先朝亦不令速遷五漢賈誼云今民賣僮者如淳曰僮謂𨽻妾也為之繡衣絲履偏諸緣服䖍曰如牙條以作履緣師古曰偏諸若今之織成以為要襻及褾領者也古謂之車馬展其上為乘車及騎從之象也內之間中服䖍曰間賣奴婢闌是故天子后服所以廟而不宴者也師古曰入廟則服之宴處則不著蓋貴之也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸晋灼曰以偏諸緁著衣也師古曰緁音妾謂以偏諸緶音步千反美者黼繡師古曰黼者織為斧形繡者刺為衆文是古天子之服今富人大賈嘉會召客者以被墻師古曰被音皮義反古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也師古曰屈謂財力盡也音其勿反且帝之身自衣皂綈師古曰綈厚繒也而富民墻屋被文繡天子之后以緣其領庶人㜸妾緣其履師古曰㜸謂庶賤者此臣所謂舛也夫百人作之不能衣一人師古曰衣音於計反欲天下亡寒胡可得也一人耕之十人聚而食之欲天下無飢不可得也飢寒切於民之肌膚欲其亡為奸邪不可得也國已屈矣師古曰音勿其反盜賊直須時耳師古曰言待時而發然而獻計者曰毋動師古曰言天下安不可動搖為大耳如淳曰好為大語者夫俗至大不敬也至亡等也師古曰無尊卑之等至冒上也師古曰冒犯也進計者猶曰毋為可為長太息者此也臣近曾上章以風俗僣侈乞撿舉制度使上下不僣侈務節儉皆富民之本在於節儉民富也君孰與不足致太平之風無出此道雖聞已有施行更望聖慈垂意六唐太宗問禇遂良曰舜造漆器禹雕其爼當時諫舜禹者十餘人食器之間苦諫何也遂良對曰雕琢害農事纂組傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗以為然因言夫為人君不憂萬姓而事奢淫危亡之機可反掌而待也七唐太宗謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今魏徴殂逝遂亡一鏡矣八唐史論魏徴與文皇討論政術往復應對凡數十萬言其救過弼違能近取譬其實根於道義發為律度身正而心徑上不負時主下不阿權幸中不私親族外不為朋黨不以逄時改節不以圖位賣忠所載章疏四篇在徴本傳可為萬代王者法九唐明皇先天元年大獵於渭川侍中魏知古獻詩一篇曰常聞夏太康五子訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及反翻飛豈暇翔非熊從渭水瑞翟想陳倉此欲誠難縱茲遊不可常子雲陳羽獵僖伯諫漁棠得失鑒齊楚仁恩念禹湯咸熙諒在宥亭毒匪多傷辛甲今為史虞針遂孔彰明皇嘉之手制詔曰夫詩者志之所之以寫心懷實可諷諭人主是故揚雄陳羽獵馬卿賦上林爰自風雅率由茲道朕須自溫泉觀省風俗時因夏景掩渭而畋方開一靣之羅或示三驅之禮躬親校獵聊以從禽卿遂有針規正豫不逮自非誠欵夙著孰能繼於此邪賜物五十段十唐穆宗嘗謂侍臣曰國家貞觀中文皇帝躬行帝道致治升平及神宗景龍之間繼有內難明皇平定而興復不易而聲名最盛歷年長久何道而然宰相崔植對曰前代創業之君多起自人間知百姓疾苦初承丕業皆能勵精思理太宗文皇帝特禀上聖之姿同符堯舜之道是以貞觀一朝四海寧晏有房𤣥齡杜如晦魏徴王圭之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此明皇守文繼體嘗經天后朝艱危開元初得姚崇宋璟委之為政此二人者皆天生俊傑動必推公夙夜孜孜致君於道璟嘗手寫尚書無逸一篇為圖以獻明皇置之內殿出入觀省咸記在心每嘆古人至言後代莫及故任賢戒欲心歸冲漠開元之末因無逸圖朽壞始以山水圖代之自後既無座右針規又信奸臣用事天寶之世稍倦於勤王道于斯缺矣建中初德宗皇帝嘗問先臣祐輔開元天寶治亂之殊先臣具陳本末臣在童丱即聞其說信知古人以韋弦作戒其益宏多陛下既虛心履信亦望以無逸為元龜則天下幸甚穆宗善其對臣恭以仁宗皇帝聖德勤儉因御前親試進士以無逸為元龜為賦題乃知聖意所存深逺十一盧懷慎景龍中上疏其一曰臣聞孔子曰為邦百年可以勝殘去殺又曰苟有用我者朞月而可三年有成尚書云三載考績校其功也昔子産相鄭更法令布刑書一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子産吾其與之三年而人又歌之曰我有子弟子産教之我有田疇子産殖之子産而死誰其嗣之終有遺愛流芳史䇿子産賢者也其為政尚纍年而化成況其常才乎臣竊見比來州牧上佐及兩畿縣令下車布政罕終四考在任多者一二年少者三五月遽即遷除不論課最或有歷時未改便傾耳而聽企踵而望爭求冒進不顧亷恥亦何暇為陛下宣風布化求瘼恤人哉禮義未能興行風俗未能齊一户口所以流散倉庫所以虛空百姓凋弊日更滋甚職為此也何則人知吏之不久則不從其教吏知遷之不遙又不盡其力偷安爵祿但仰兹望養資望陛下雖勤勞之懷宵衣旰食然僥幸路啓上下相䝉共為苟且而已寧盡至公乎此國之病也此賈誼所謂跖盩之病乃小小者耳此弊久而不革臣恐為膏盲雖和緩不能療豈跖盩而已哉漢宣帝綜核名實興理至化黃霸良二千石也就增秩賜金以旌其能而不遷於頴川前代之美又古之為吏長子孫倉氏庾氏即其俊也書云事不師古以克永世匪說攸聞臣請州都督刺史上佐及兩畿縣令等在任未經四考以上不許遷察其課效尤異者或賜以車裘或就加祿秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能其政績無聞及犯貪暴者免歸田里以明聖朝賞罰之信則萬方之人一變于道致此之美革彼之弊易於反掌陛下何惜而不行哉奏乞立制度使元祐二年臣竊以數十年來風俗僣侈車服器玩多踰制度以致士民之家率多貧乏不守亷節夫為國之要在於富民富民之要在於節儉民既富矣君孰與不足臣欲乞選差官撿詳唐室至於朝廷令式參定制度隨時制宜務令簡當遵行可久庶幾上下有分不敢僣侈風俗自當淳儉太平可以馴致臣嘗觀唐史太和中僕射王涯奉勑詳定制度頗為精當終為權貴沮格不行朝論惜之然涯之所定亦甚煩密臣之所乞固須簡當可久遵行其王涯所定今亦録本進呈臣伏詳舊制三品四品官得衣紫衣朱竊見近時及朝班之內衣朱紫有極多著緑者甚少蓋是特推恩賜者頗衆臣謂服以章有德自古所重臣乞今後非品秩當得朱紫及舊著令例合得外乞慎賜服潞公文集卷二十八
