body:
  text: 潞公文集卷十二宋文彥博撰碑記墓志絳州翼城縣新修至聖文宣王廟碑記聖宋四葉上繼明之五年某以進士舉中甲科得大理評事宰是邑秋八月二十九日始蒞事故事守令始至則郡縣之祠廟悉詣之恭於神訓於民政之本也由是詢於邑吏質之縣圖載祀典享廟食者惟宣聖之祠焉翌日伸祠謁之禮巳事而退立於廡下觀其石記即後唐長興三年創是廟也嵗月滋久廟貌弗嚴屋瓦皆毁梁木其壞上不庇於風雨下不容於爼豆縣署直其北十數步日有敲撲之喧澮水流於東不三四尺嵗虞漂溺之患雖賢哉回也不改其樂君子居之何陋之有而守土事神者崇奉之禮豈不闕歟乃謀為僚規是改作方營善地將搆新宮而縣西北隅適有廢廟俗老承傳為湯王行宮事出不經禮無常祀既絶蘋蘩之薦鞠為荆棘之墟象設都亡廊無全陊獨有正殿巋然中立雖丹堊巳晦而甍棟頗崇異乎哉天將以斯室遺夫子耶不爾則胡為十室九廢而獨完兹中宇虛其正位者安所俟乎宜其即是遺構以正兩楹之坐起兹頽垣以崇數仞之墻踵其故以謀新材則易備變其本而加飾工不告勞命剃氏以芟夷集擾人而塗暨興廢起墜務實去華昔之湫陋者耽耽而雲廕矣曩之荒穢者殖殖而底平矣翌以東西二室增之屏樹閈閎凡屋壁之間堵其數百楹危昏中而戒事日南至而卒功動適其時不愆於素邑人張會元以文行稱於鄉曲纍舉進士敗於垂成運舛事違退而講授一日覩新廟之既成以殊像之未備乃率其徒躬營其事明年春募工於别郡得繪塑之妙者於是塑宣聖暨十哲之像逾十旬而告就八月上丁行釋奠之禮落之且曰能事畢矣不可無聞於後盍書以志故述其經始之因直謹夫嵗月而巳杜牧云稱夫子之德莫如孟子稱夫子之尊莫如韓吏部孟所謂生人以來未有夫子賢過堯舜遠矣韓所謂自天子至郡邑守長得共祀而遍天下者惟社稷與孔子社稷壇而不屋豈如孔子巍然當坐用王者禮以門人配自天子而下北面拜跪禮如親弟子然然則夫子之德之尊韓孟之言詳巳今兹為記是用略諸時天聖八年九月五日記觀文殿學士尚書左丞諡文莊高公神道碑昔者兩漢之盛也輔相以清靜寧民公卿以經術决事故文景顯肅之際為賢主為治世炳焉幾與三代比隆蓋公輔得人之效歟若夫本經術以熙治載清靜以鎮浮翊我昌運高邁於三五澤斯生民永濟於富夀而賦命不融齎志莫究愚於北海高公殄瘁之歎深矣公諱若訥字敏之其始齊之公族於春秋時甚顯逮漢而後名德軒冕赫奕相望從仕屢遷今為太原榆次人曾祖諱某贈太師王父諱某仕崇儀使考諱某仕右侍禁並贈太師中書令兼尚書令考封祈國公曾妣王夫人祖妣馬夫人妣閻夫人封魏晉秦三大國悉用公貴而追錫命也太師藏器勿耀天爵自高二令君雖起家登仕而位不充量濟美載德貽謀積慶必復其始至公嗣興公早有竒節挺然不羣祈公之捐館公始十嵗奉母夫人寓汲郡在陋安貧嗜學樂道天聖初舉進士中甲科調彰德軍節度推官秩滿改著作佐郎遷祕書丞太常博士三治劇邑所居不尚赫赫之譽去後人皆思之臺舉御史改監察遷主客員外郎殿中裏行未幾除右司諌直史館賜服五服遷起居舍人知諫院改刑部員外郎兼侍御史知雜事賜三品公迭居諌憲當職論事不煩細激訐以要虛名務舉大體中時之急病若揵為土豪緣戚里為郎得大郡公謂玷郎選輕郡寄亟論罷之內侍長居中任事恃恩而肆公率同列極言而斥出之復言今執政古三公之任所謂坐而論道者也今進對立侍裁移刻而罷於咨諏體貌之禮固有未盡宜復坐論以通上下之情以究都俞之美上以為識治體而深器之於是益有大用之意除天章閣待制知永興軍詔復留弗遣麟府宿兵高選外計乃遷禮部郎中河東路都轉運使上思公學術優深議論精敏亟召遷兼侍讀丁秦國憂纍詔奪情瀝懇哀訴祈終三年喪國朝故事官待制以上遭喪類卒哭起復今許終服自公始也服除還舊職尋改龍圖閣直學士史館修撰遷吏部郎中除諫議大夫權御史中丞理檢使上憫雨旰食因公奏事問雨暘所致乃推本洪範五事稽合時政及救旱之術上大感悟益嘉公之博洽數日擢拜樞密副使居二嵗以工部侍郎參知政事又二年由户部侍郎檢校太傅為樞密使公踐歷二府始終七年循守法度奉行故事簡靜慎重不輕改作常曰蒿目而憂世者非致治之心也每被顧問必傳經以對條理明暢極盡治亂之原上未嘗不前席以欣納故愚謂本經術以熙治載清靜以鎮浮有兩漢賢公卿之風為得之矣其在政府也凡僥幸干澤事從中出者請格而不行后妃之族當避權保恩請不預執政悉降詔為永法在樞府時屬盜發甘陵嬰城負固王師攻圍逾月未克時議欲開其自新之路許以容貸且使凶黨離解公謂貝於河朔兵屯素盛今不窮討後啓亂階威靈不振將為敵人輕笑當濟師易將必行天誅蠻冦雍管嶺外騷然承平嵗久武備闕習荆廣之甲若驅市人故屢戰屢敗公議遣大師㧾北兵及隴西之徑馬以往則計日可平或謂北兵不習南風賊必守險以老王師雖多馬恐不足施公曰賊狃數勝理必迎戰以我訓士精騎出其不意而夾攻之蠢爾雖衆胡能為哉二冦既平悉如公算又患兵冗而費浮議罷召募并汰疲老要在節用彊本人給家足為太平長久之策性冲淡不喜夸耀纍奏章祈解樞柄辭情切至確不可奪上重違其志久之乃除尚書左丞觀文殿學士同羣牧置制使不許外出且兼進讀蓋將用其所長以須爰邱乎公既釋重務遂所願自退朝即杜門燕居觀書為樂搢紳高其靜退以至和二年八月二十九日遘疾薨於宣陽里之第享年五十九上聞訃震悼趣輦臨墓既傷名臣之不愸又視其居處儉陋歎其清節者久之賻賵加等廢翌日視朝贈尚書右僕射太常諡曰文莊以是年冬十月已酉葬於開封府開封縣褒親鄉之原從祈公之兆禮也初公寓汲時秦國有疾公左右奉養藥劑必親遂精意於醫書且曰是術也前世名儒巨公能者多矣况人子奉親可不知耶因研究得其妙以是秦國終享夀康及公感疾之始自診其脈曰吾殆不起諸子泣請召國醫高手者公堅曰止雖和緩不可為已又戒其子毋輒奏以貽上憂吾死殆不得有所請及東首神爽不亂恬然以逝非達生知命安時處順之有素其能若是乎公既葬上追思之深親迂宸筆以表其隧曰儒賢之碑有以見君臣始終之義厚焉公以譽望凡朝之華選劇任必與焉同知禮部貢舉者再取士得人近特為最又為京西路安撫使入契丹國信使領吏部流內銓三班院間被詔定黍尺以協樂律之正制兵契以嚴軍師之興裁損祠祭服器復古之法今悉用之朝議推其精密愚與公布衣時為友自登憲署司外計居政府為僚故知公尤深公性資方介中立無黨惟道是信不以世俗毁譽為得失所學非苟記問而巳必窮其理適於用每談歷代治亂之迹貫穿明白如視諸掌聽者釋然更僕忘倦文集二十卷尤學之粹娶王氏封夀安郡夫人夙有賢範聞於族姻後公一年而歿以明年正月五日祔公之兆嗣子彥輔內殿崇班次保衡安石吉甫光祿寺丞規大理評事皆修謹篤能世其家長女適游奎次適祠部郎中祕閣校理林億次適太常博士張誼次適王宗哲彥輔及諸弟泣叙先烈見託論撰將附於儒賢之下以永其傳愚自視拙鄙而義不可辭姑用直書傳信無愧銘曰維高氏先蓋姜姓後表海以還歷祀寖久爵德世濟忠賢代有發源湯湯其流固長儲因積粹挺生文莊文莊嶽嶽照鄰先覺大器長才竒文奧學公初逢時奮自布衣絶塵遐鶩垂天迅飛白簡觸邪凛然霜威皂囊納忠彌縫闕遺曰黨曰附吾所勿與不激不訐罔干虛譽人不我知吾不為阻信道而往若省於度進直內閣聮侍邇英左右獻納據古援經帝御宣室雨暘是恤公陳五行沃心造膝乃預大政乃㧾中樞嘉猷辰告基命訏謨事必師古襲於常故毋作聰明毋越彛矩付之至當百職咸舉撓法撓賞慿寵怙權繩之以正金石其堅殱蠻於雍殄冦於貝多算隃度審於蓍蔡我思至言名遂身退斯言是踐其志克從毋處於外惟帝念功論思殿內勸講禁中師賓之地禮厚恩隆顯允君子宜錫難老方胡不然曾未華皓軫於天衷撫几震悼帝曰儒賢表其新阡寵以宸翰冠於碑顔崇封維屹扶樹維鬱令儀則閟遺芳永苾贈尚書祠部員外郎文府君墓志銘夫水之有原原出之深者其流長人之本祖祖德之厚者其嗣昌噫原深而德厚者見之於吾祖祠部府君矣府君諱鋭字挺之本姓敬當晉室以犯高祖御名改賜今姓取文之象也至聖朝以避翼祖廟諱遂不復舊有媯之裔遷育於姜子完之孫以諡為姓自時厥後胄緒益蕃或占數於平陽或派居於蒲坂八代祖太尉平陽王有大勳力於中宗載於國書可以覆視高祖晤太和中由鴻臚丞辟北都留守判官曾王父穟時以明經中第守汾州參軍未幾留判歸老於西河參軍榮侍於膝下且又嘉是山水樂其土風乃自河東縣之同果里徙居於是府君今為西河介休縣人也王父沼澤州録事參軍烈考崇遠長興中守遼州平城簿與晉高祖有豐沛之舊天福初龍興大夏鳳起晉陽遂以協贊之功亟升出宰之任授代州崞縣令稍遷并州太谷縣令雖幄中之助居多而綿上之封蓋薄方將偕隱以保天和屬劉氏偏霸於太原選用俊賢縻以要職而又兩宰劇縣載更郡轄而考終於家有子二人其長早亡府君即其次也始以廕補郊社署丞尋辟石州軍事推官太平興國中武車載駕王師有征後主率并民因壘太宗皇帝霈陽春之澤封歸命之侯凡劉氏之舊臣率度材而被用時府君方以疾退便於家居且以頥養為懷無復出處之意雖詔書搜訪州司敦遣竟以疾辭不克上道常以杖履浮沈於鄉里頗用文酒燕樂於朋友故與進士溫夢說詩僧崇果紹休輩有世外莫逆之契藥喜勿驗壞梁斯及以至道二年九月三日啓手足於晉陵里之第享年五十有三府君始娶王氏故户部郎中丕之女也生慶善之門稟柔懿之德天奪其算先府君而亡有子三人長子泊今為司勳員外郎荆湖南路轉運使次曰淳郊社齊郎次曰淵未仕而亡有女一人適史氏有子一人曰渭府君以長子之登朝遘慶凡四追命為尚書祠曹員外郎夫人追封臨沂縣太君泊娶耿氏有子一人曰彥博即府君之嫡孫天聖五年春登進士甲科今為殿中丞知并州榆知縣權倅西河郡事而耿氏早亡亦以彥博預殿閨之引籍遘農壇之展禮得援恩例追封扶風縣君載娶申氏封永樂縣君有子一人曰彥若應進士舉有女二人長適將作監主簿鞠齊卿故天章閣待制詠之子也次適進士成偉殿中丞元吉之子府君之次男淳始娶郭氏兾氏皆早亡今娶武氏有子四人長曰彥先次曰彥國其次皆幼渭娶王氏斯皆府君貽謀積德之至厚故子孫錫羡流光之寖昌也彥博之生也後不獲逮事捧遺硯以出涕瞻畫像而下榻嘗立侍於父叔因習聞於話言曰惟府君局量閎深性資端厚信行著於鄉黨仁愛洽於族姻希蜀嚴之沈冥達羲易之素履善教諸子俾紹家聲嘗曰扶陽之門滿籝非寶劉氏之室七業俱成吾素志也爾曹勉之惟以清白傳家不以業産為事識者以府君為林宗干木西河之後出也所不至者夀爾府君棄代之年權窆於里第之西原今嵗在作噩利即真宅即以明道二年十月十七日已酉得吉卜於靈石縣之孝義原祖母臨沂太君先葬於介休縣之西原陪祖考之舊封松檟美茂不復遷祔從古禮也禮曰銘者稱先祖之美旌孝孫之心也庸刻沈礎以識佳城銘曰王父之德柔嘉維則行有枝葉信著金石州黨胥化宗姻是式跌宕文石㴠泳典籍美璞中存含華內藴道屈當世慶流後昆祠曹追命密印推恩􅀈山南峙汾流東濔于嗟佳城兹焉寧止圓石勒銘徽音無已潞公文集卷十二
