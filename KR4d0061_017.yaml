body:
  text: 潞公文集卷十七宋文彥博撰奏議乞令團結秦鳳涇原畨部臣切見秦鳳涇原沿邊熟户畨部比諸路最多至秋成以來禾稼牛羊滿野以致餌冦誨盜臣乞下逐路經略使每至秋成以前散差得力知畨情使臣牙校賫畨字委曲曉諭部族逐急早收田稼憑附險固窖藏斛㪷收拾老小牛羊為清野之計其强壯人馬各令常切團結探候畨冦若來鈔掠量力禦敵取進止乞指揮諸路帥開報事宜臣切見西人康定慶厯中每犯邉即於諸路各張聲勢務欲牽制疲弊漢兵其實入冦即併力從一路而來故邉兵常苦寡少分布不足臣欲乞嚴切指揮諸路帥臣每探得事宜更相開報嘗須各作出師之備先為牽制賊勢庶幾賊兵亦自後顧不敢並力専從一路而出取進止乞令邊帥練兵約束諸將臣切見自慶厯初陜西四路之兵逐路始分數將每將馬步不下三二千人各有訓練務要精熟兼得兵將相諳使喚之際盡知人人所能則鮮敗事近聞諸將多不和同大帥罕能統制教閲部分各立異見寬猛之節不得中道狥情斂怨由此而生師克在和有異於是伏乞嚴戒逐路大帥講求軍法精加訓練約束諸將務在和同兵聲稍振邉冦自畏取進止舊法逐路分諸將者蓋欲居常則兵將相諳臨敵則指縱如意小警即量遣一將而出稍重即又加一將或嵗月更畨出屯外寨若遇大敵即諸將盡合為一軍大帥親揔而節制之此制軍之法頗得其要近時兵官多不原本此意欲罷舊制乞朝廷詳察奏西界事皇祐五年臣近准樞密院劄子節文秦鳳路奏探得西界首領王羅楊誥部領人馬於閏七月十四日夜往乾州堡放箭當夜却回見在吹籛谷住坐所據上件事宜干涉夏國畫時要人處置臣勘會乾州堡去古渭州不遠切慮昨來添修古渭州之時西界妄有詞說意在阻撓臣欲乞令樞密院檢會自古渭州以來如曽有西界文字及昨來傳求往秦州始末一宗文字盡劄録付臣所貴細得看詳取進止乞差譯語官臣切見秦州每有畨部過陳畨事及口說事理只憑本州逐塞引領譯語官翻譯其間多是回避事理改易情狀畨部漢官各不知覺緣此欺弊致失畨情臣切慮今秦州有屬户畨官知臣致任乞來公參或陳過畨字若只憑本處引領譯語官恐依前欺罔乞於涇原路譯語官內抽差二人於臣處祇應准備牙換翻譯以防姦弊取進止奏陜西鐵錢事至和二年陜西私鑄鐵錢雖嚴行禁捕抵法者甚衆終不能止絶蓋以鐵本至賤獲利甚厚以致見行錢貨薄惡者多物價增長稍禁行用或令揀選即市井囂然買賣難阻其弊已極須當制置若便變錢法即恐未能徒成驚擾不若使鐵價增貴即私鑄無利薄惡之錢亦將鎔為器用自然百物價平民不犯禁欲乞令陜西轉運使依河東路事體擘畫權住鐵冶三五年或恐傷冶户即官摧數年增起鐵價公私有利候錢法平定即弛鐵禁議者或慮鐵貴則農器鼎釡之屬民家乏用此必不然且農器鼎釡民家各各素有之物非日日市易而用或破碎即故鐵尚在創買者亦少設有小害須從大利乞早賜指揮陜西都轉運使疾速相度施行奏理正衙前事至和二年臣昨在陜西訪問民間甚苦者里正衙前里正法用第一等户鄉狹户少者至差第三等充是致差定之時更相糾决禁繫追呼動逾嵗月校計家資纎細不漏至於食器甚賤之物估直為業及充衙前藉為抵當主持場務稍有缺折則竭産償官猶不能足欲令陜西都轉運使相度轄下州縣有鄉狹户少處將比近三兩鄉合差一里正即可選力及人户充役且不致差遣頻併庶寬民力况目前纍有上言乞盡罷里正者今以三兩鄉合差一里正事亦酌中奏陜西衙前押木筏綱至和二年陜西衙前最苦者押木筏綱無不被刑破産臣在永興令通判職官周詢其弊皆言每嵗春初方自朝省分配到合要木植比至收買繫筏須及夏末以來僅得辦集正值黃河水泛漲之時常有飄失其勞苦費用動逾數倍遂擘畫於年前冬初沿河出木處縣邑官置買木場先勘會省轉向前分配文字約度常年須合應用木植預前收買如法安置比至春初省司配木植文字到來量事添備便可繫筏趂四月間水勢平緩之時駕放赴下納州軍極甚省功減費此只是永興軍一處通判職官等已如此擘畫其餘沿河出木州軍未曽行遣欲乞下陜西轉運使更相度經久施行奏永興軍衙前理缺陪備至和二年臣見永興軍枷固衙前催里缺折官物者不少遂一一根問多是主管倉場館驛清酒務之屬跡其缺折之由悉非侵欺盜用皆因陪備不充官中又不與體量處置如清酒務年計出賣煮酒而官不給煮酒柴或量給而用不足者般請麴未合使腳力及諸雜瑣細用具盡令衙前専副陪備又倉場貯納只令専副自辦鋪襯之屬館驛當東西大路使命如織供應館券多要本色省估之外亦是専副陪備被刑破産率由於此凡此數事惟永興軍方令官自擘畫粗有條理稍紆衙前缺折之苦其餘州軍亦乞更下陜西轉運司體量施行已上件事臣在永興日與傅永田京等方欲商議節次施行值臣被召赴闕切慮中輟故乞舉行奏王安論親事官張貴事至和二年臣今日酉時准內降劄子為王安所論事實有􅘫刀稱在角樓下埋藏為日晚欲就來早監取又恐隔夜人懼罪藏隱如何臣早來讀王安首狀內言張貴稱有刀埋在東北角樓下切恐有干連人懼罪隱藏欲乞差穩審內臣一名今夜且於所指通埋刀去處側近别作勾當名目覺察或令密使人巡覷照望至曉必不至别有擅去發掘亦不至張皇驚擾乞令勘官陳旭子細審問張貴所埋刀去處疾速奏聞兼臣早來詳王安狀內張貴稱已結連得三十人尋有劄子令軍頭司官員如獲張貴先且取問除見今指名收捉共七人外更有徒黨即就便逐急收捉免致走漏更乞下陳旭緊切推問張貴如實更有徒伴即密具姓名疾速聞奏潞公文集卷十七
