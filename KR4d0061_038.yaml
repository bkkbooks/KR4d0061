body:
  text: 潞公文集卷三十八宋文彥博撰舉官舉李綖皇祐二年臣昨准例奏乞國子監直講李綖改官僉署許州判官公事准中書劄子奉聖㫖李綖與權忠武軍掌書記候一年與改京官者臣于李綖本非素舊采于衆議謂有文行曾應制舉久為學官輒露奏章乞除幕職于臣竊知人之美為國有育材之漸今綖自太學講官權授外郡掌記誠似屈其資望切慮綖以學職近例更須二年改官或聞前例自學官奏辟皆得改授合入京官兼近歲陳執中奏辟鞠真卿充陳州通判亦以校年限未滿特授集賢校理伏望聖慈以綖在太學歲久文行為衆所稱特賜改轉合入京官僉書許州判官公事如改轉後本官犯正入已贓臣甘同罪取進止舉陳湜臣奉敕差充永興軍一路都部署安撫使切見太常博士陳湜久在河東陜西差遣深曉邊事軍政欲乞差本官管勾永興軍一路都部署安撫使司機冝文字只理本官合入差遣資序右取進止舉馮誥任允孚臣奉勑差充永興軍路都部署兼置制秦鳯路軍馬司公事緣秦鳯日近頻有蕃界事冝須藉經諳本處事體才幹官吏逐急差使一臣切見屯田郎中馮誥曾任秦鳯路都監及通判秦州首尾六年並准朝廷指揮令管勾蕃部公事深諳秦州東西路蕃情邊事本官見合入知州差遣臣欲乞差充秦鳯路置制勾當公事兼不妨本官待闕差遣亦無僥幸只候沿邊置制稍有倫序却令發付本任一臣切見太常博士任允孚自慶歷三年差管勾秦鳯路經略司機冝文字及通判秦州至去年方替在彼十年深諳事體臣今欲乞差本官管勾秦鳯路置制司機宜文字右取進止舉邵叔元臣切見三班奉職李昌來臣處公參云奉宣差權秦州伏羌寨監押切緣伏羌是秦州西路最大城寨控三都谷文嬴開兩路自來屯兵之處及體當西路事宜全藉得力寨主監押兼向來多近上或帶職班行充寨主今來寨主是殿直謝育又差李昌權監押恐不能彈壓蕃漢公事臣勘㑹秦州三陽寨押監殿直邵叔元在秦州差遣十餘年深諳彼處蕃情邊事兼有心力欲乞就差邵叔元充伏羌寨監押勘㑹東路治坊寨監押已及二年却及差李昌權治坊監押取進止舉曹弼臣切見秦州隴城寨監押侍禁曹弼好人材有膽勇方略在秦州差遣首尾十年深諳邊情今欲滿替勘㑹秦州寧逺寨在西路極邊兼寨主尹寶臣自到任一年有餘欲乞就差曹弼充寧逺寨主取進止舉張度臣切見自來節度使赴任例奏薦得門客一名今有太學進士張度孤寒有文行曾經省試下第在臣門館多年況近制奏薦門客更不理選出官張度欲乞特賜一試銜名目取進止舉孟辨臣切見提舉北京金新隄職方員外郎孟辨文學中第廉幹在公恬于進趨確然有守加以素負才武頗懷忠義曾有臣僚知其所能舉換右職伏望聖慈許召赴闕量其人材特賜擢用舉楊宗禮臣切見右騏驥副使楊宗禮頃自廣南知州安撫却監因言馬政先朝特召為郡牧都監到任已及二年偹見勤幹兼創擘畫右天廄坊充孶生馬監漸有倫叙欲乞留宗禮再任藉其經度庶有成效取進止舉錢長卿等臣等奉聖㫖選舉官兩員與王存顧臨編修經武要略刪定諸房例册及今本院都副承㫖提舉臣等切見著作佐郎錢長卿大理寺丞劉奉世各有學術勤于編綴欲乞差充本院編修經武要略刪定諸房例冊官取進止舉李端卿等臣切見權河北監牧使周革近丁憂去職本路馬政方有倫理切要素知牧事之官相繼整齊切見群牧判官李端卿纍經本司任使詳知坊監利害兼資序已深乞差充河北監牧使兼覩都官員外郎都水監丞張竚處事精敏乞差權監牧判官如逐官向去職事曠敗臣甘妄舉之坐取進止近知李端卿以家貧纍重纍乞外任都水監內外丞額外員數甚多必可减那此一員舉劉庠熙寧六年六月臣切見龍圖閣直學士知太原府劉庠向為諌官屢陳讜議纍經外任咸有美稱今領太原一道緝治兵防拊綏中外紀綱振舉人情恱服臣雖遙領河東與庠義均聮事知其善狀理合薦論伏望聖慈特與不次升擢仍令再任所貴方面得人朝廷增重取進止舉范純仁年月同上臣切見工部郎中直集賢院知和州范純仁名臣之後能世其家忠義不回流輩推服伏望聖慈召還禁近以備訪問必有正議仰禆聖政取進止舉王大方年月同上臣切見供偹庫副使安肅軍駐泊都監王大方勳臣之後敏于從事纍經繁使悉有美稱臣今保舉堪充升擢任使舉徐保申年月同上臣切見供偹庫副使徐保申纍更邊任熟曉兵政廉良謹厚不憚勤劇見任江南東路駐泊兵馬都監將欲任滿伏望聖慈就差充河陽兵馬鈐轄替王臨滿闕舉吕公懋年月同上臣切見都官員外郎吕公懋秉心堅正蒞事精敏勤職安分衆謂滯淹伏望聖慈特賜不次升擢任使舉蘇液年月同上臣切見著作佐郎蘇液才資雋敏性質剛果昨在樞府供職尋以臺章去官衆謂非辜事亦尋白伏望聖慈特賜升擢任使舉張利一熙寧六年六月臣切見皇城使達州刺史衛州鈐轄張利一久更邊任深曉事機求之輩流不可多得昨在雄州以不約束屬吏致引惹生事原情實非已事然而料度敵情應答邊機皆有倫理故北人頗憚而愛之今降為散官內遷間職北敵頗得其計邊人深惜其去伏望聖慈體察早賜牽復知邊要州軍取進止舉李師錫熙寧七年五月臣切見河陽通判李師錫才資朴茂處事幹勤前為陜西轉運判官深曉鹽馬之法切聞以議論寡合託以慢公非時差替近又以前任按察之誤與轉運使一例降官原情頗輕降奪差重伏望聖慈體察早賜牽復取進止舉蘇轍熙寧六年六月臣念伏䝉聖慈從欲均逸便藩當求時才助宣邦教切見權留守推官蘇轍博通經術深知治體見任陳州州學教授今已嵗滿欲望聖慈就差充河陽州學教授如臣所舉不如狀及犯正入已贓甘當同罪取進止兼河陽纍有前例奏差學官近向經奏留教授陳安民再任自後奏充國學直講本州見今闕官舉髙惟幾慶歷六年臣切見益州路提㸃刑獄高惟幾財幹明敏長于治繁臣頃任河東都轉運使惟幾通判麟州用兵之際供億百端悉能幹辦昨任益州路轉運判官日適值歲飢臣在益州首先勸誘人户發粟賑濟遂謂高惟幾出巡外郡勸誘人户出粟一如益州之法甚濟飢民績狀可奬其髙惟幾伏乞朝廷特賜升擢任使以勸勞吏如經擢用後本官犯正入已贓臣甘同罪取進止潞公文集卷三十八
