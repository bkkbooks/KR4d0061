body:
  text: 潞公文集卷十六宋文彦博撰奏議乞知縣縣令不得閑慢公事差出慶厯八年縣令為親民重任舊制不許差出葢慮妨闕政事近嵗以來諸路職司官多是將閑慢公事託以為名差遣出入頗妨本縣民政大抵皆是自便私故或即避見本任繁難朝廷累有約束未絶其弊倖臣欲乞今後知縣縣令除許差推勘重難刑獄及應副軍期差使或權知繁劇郡縣外更不得以閑慢公事差出仍令今後凡差出知縣縣令並須依舊例具事由奏知如差訖不奏或依前以閑慢公事差出知縣縣令其所差職司官吏並從違制分數定罪被差之官亦行㫁罰所貴縣務别無妨闕民政得以修舉取進止此事最闗民政承前雖有約束終未絶其弊今乞嚴行指揮仁宗皇帝賜手詔皇祐元年朕據宸極之尊託億兆之上懋謹盈成之戒豈忘勵翼之懐然而監於猷為未臻古治動於精祲靡致善祥比來星文屢有謫見夙夜思省匪敢寧居葢慮徳政闕修刑賞差濫人有寃滯而無控雪之路民已匱困而無寛恤之實官局具設而職務或弛典章備存而綱紀不振科役煩重肆成暴刻軍政簡惰莫為經制教令輕出有所未安賢智在下遺而弗舉姦倖妄求而不抑惠澤旋壅而不流有一於兹足戾和氣朕深惟廟社之重祇荷祖宗之承欽畏天命詢勅人事嘉與近輔交修儆闕庶答靈戒以底休平宜令中書門下樞宻院將此十二條於軍國庶務中推求實事有合更張振舉者宻具條上朕當悉心詳究即議施行咨爾股肱咸體予意答御札手詔皇祐元年臣等各以非才忝居大任不能禆輔聖政爕和隂陽以致星文屢有變異下飾人事上貽聖憂陛下曲示包容未賜罷免責以來効使之極言詔㫖丁寧睿思寛大跪受伏讀兢慚失圖恭以陛下堯舜用心禹湯罪已欽若天戒增修聖政弭災召和宜集休應聖詔曰徳政闕修刑賞差濫臣以謂刑不為貴近而屈賞不可僥倖而求則無差濫矣刑賞不濫則徳政自修又曰人有寃滯而無控雪之路民已匱乏而無寛恤之實臣以謂人有寃滯必由郡縣及按察之司節級陳訴若猶未伸又許披鼔撾訴固無壅遏之理然更須州郡官吏常得其人為之伸理則民絶寃滯矣今冗費無藝國用窘乏故嵗一不登下民艱食雖欲恤之而力不足也若减不急之務罷無功之賞及兵藉官吏之浮冗者稍澄汰之則庶幾國用不乏則可以有恤民之實矣又曰官局具設而職務或弛典章備存而綱紀不振臣以謂為官擇人不使僥倖者求而得之久於其任考其殿最而升黜之無使屢遷速易不為苟簡之政則職務焉敢廢弛祖宗之法備在典册舉而行之似若甚易但不為權倖所撓則為至難苟上下一意守兹典章堅如金石行此號令信如四時則綱紀振矣又曰科役煩重肆成暴刻軍政簡惰而莫為經制臣以謂前之所陳减不急之務罷無功之賞澄汰兵吏之冗則國用不乏國用不乏則可以省科役之煩重州郡官吏常得其人雖有科役亦不至於暴刻矣慎擇將帥稍假威權撫馭士卒不務姑息勿使貴臣驕將撓於其間則軍政自肅而有經制矣又曰教令輕出有所未安賢智在下遺而勿舉臣以謂令出惟行慎乎始出出而不慎故行之未安近年以來兹弊頗甚由議臣輕建言而須必行行之無效而終無責或雖有嘉謀而事無近效人之多言横為沮議朝廷不能持之故多中變條其事狀此類尤繁舉賢任官宰相之職宰相不能悉知其人但當慎擇䑓省長官及州縣大吏使如近制各舉所知庶幾無遺才矣又曰姦倖妄求而不抑此正今之所患臣等繼日議之矣又曰惠旋壅而不流臣以謂朝廷推恩靡不下究然恐郡縣之吏不稱朝廷之意或逋負之物合除而未除流竄之人可釋而未釋如此類者更宜申明聖詔曰將此十二條於軍國庶務中推求實事有合更張振舉者宻具條上朕當悉心詳究即議施行有以見陛下求治之心勤切之至所恨臣等空疎不能上副好問雖然敢不罄竭愚短粗有所禆然今所陳乃其大畧葢慮繁詞終成虚語徒煩睿覽無補大猷臣等欲將十二條事舉一兩條細述合更張振舉事件逐時面奏委曲敷陳所兾言之必行行之必當斯亦舜禹臯陶吁謨都俞之義也臣等不勝區區聖詔曰徳政闕修刑賞差濫臣等近奏以為刑不為貴近所屈賞不為僥倖所求則無濫矣臣等請畧舉一端如往年蘇舜欽劉巽以進奏院賽神輒用官錢即皆坐除名去年曽奭宋永宗賽神亦用官錢其罰當與舜欽輩均而曾奭等止停見任近日史昭文以不覺察手下人吏取受稍塲錢物衝替未得與差遣尋有監稍塲官閻繼隆等却為昭文所發亦是不覺察専典取受一例衝替而昭文即時却與差遣其同事馮經亦連茹牽復而繼隆等衝替如故此葢昭文曽奭輩以親近而從輕罰舜欽繼隆等以疎遠而受重責又去年親事官作過皇城司官吏當坐重責然皆是近臣貴戚止於降秩補外才逾年即皆復職或更遷官往年張沔以保州及李敡事降黜數經大赦至今未復舊職言體則皇城司事為重議罪則張沔等輩為輕升擢廢棄理似未均不惟刑罰失平實恐貴倖壊法臣等以謂今後用法理當振舉更務均平賞典之濫則如近日司天監周琮李用晦止以選課日辰便乞轉官任子醫官别無勞績妄乞額外轉遷如馮琦潘象蘓惟和沈遇明之輩賴陛下聖㫁皆與裁抑然未悉如先朝之制及前後條貫更欲申明遵守聖詔曰人有寃滯而無控雪之路臣等謂人有寃滯必由郡縣按察之官節級陳訴若未申雪又許檢鼔院撾訴計無壅遏之理今欲更敇約轉運司提刑司凡有理許並令仔細究詳如事理稍渉寃枉即選官就近覆勘勿令煩擾淹延免致貧窮無資不能詣闕者抑而無告聖詔曰民巳用匱而無寛恤之實又曰科役煩重肆成暴刻臣等以謂國用窘則科役煩科役煩則民困匱民力既困國用自乏雖欲恤民不可得已臣等請言其國用窘乏之由恭惟祖宗以來置兵與吏及賞賚賜予皆有定制量入以出故財不屈乏自康定用兵之後添募新兵幾四十萬數年以來雖逃亡减廢之外猶不减三十餘萬毎嵗所費衣粮錢物等共約三千萬貫匹兩石束賞賚之數不在焉兼自慶厯二年後來添給二虜金帛每嵗共四十餘萬匹両加以頻遭水旱復除租賦則國用不得不窘故國用窘則科役煩科役煩則民力困今將恤民之困窮寛民之科役正在省冗費而已省冗費之大者在减冗兵臣等巳甞奏述欲於今冬别立㨂兵之格宻降付逐路轉運使俟至春首依常年例計㑹帥臣同共依新格擇選老弱以减冗費其次則罷不急之土木停無功之賜予抑僥倖之求請省員外之冗官衣服用度務從敦質多方節約諸事簡儉年嵗之間漸期足用國用既足則科役不煩則是恤民之實矣聖詔曰官局具設而職務或弛典章備存而綱紀不振臣等以謂官得其人職務自舉選才任官正是臣等之責若官須擇人不甚拘以資地事須責實當時校其殿最三載考績必行黜陟百官修飾孰敢懈弛臣等請畧舉其弊只如省府之官及外計之任近嵗以來遷改頗速有如假道豈暇舉職所以務為一切苟簡之政而職務不得不弛臣等欲乞更頒詔勅約束中外之官必須二年之外方許遷替考其殿最而升降之若特勅擢才則不在兹限所謂典章者朝廷之大法祖宗之舊制舉而行之執而用之豈有綱紀不振哉葢近嵗已來縁貴倖之臣墮大法壊舊制者多矣臣等畧舉其尤者祖宗之制官有定員今員外而置官者多矣如勾當皇城軍頭司及醫官使副之比是矣又俸禄之法各有定制等級賦與固不可差今則有任觀察使而請留後俸者如此之類其徒實繁臣等欲乞今後更不溢舊額而置官逾本官而受俸一守祖宗舊制不為貴倖所侵則綱紀振矣乞特頒一詔勅處分聖詔曰軍政簡墮而莫為經制臣等甞謂慎擇將帥不務姑息勿使貴臣驕將害之軍政自肅矣聖詔曰教令輕出有所未安臣等甞謂慎乃出令令出惟行若輕出之必有未允則數易屢改此為政之大弊若近日錢令鹽法為弊不細而建言者謀之不臧有責此所以致輕改作而易受弊也往年建言諸州招刺義軍去嵗却揀配諸軍人心騷然其始不能詳慎致不數年便有改易臣畧舉此數條葢事之稍大者聖詔曰賢智在下遺而弗舉臣等甞謂舉賢擇才輔臣之職輔臣之不能悉知衆才惟當慎擇臺省長官州郡大吏使如近制各舉所知庶幾無遺才矣然臣等敢不益勵蠢愚博求才智將期得士之美上副任賢之心詔曰姦倖妄求而不抑臣等以謂近臣貴戚醫工卜祝及諸司人吏因縁請託妄求㣲勞希求内降如此之類盡守舊制一切裁抑則官邪之蹊可以漸塞聖詔曰恵澤旋壅而不流臣等嘗謂凡有推恩靡不下究猶恐州郡之吏不稱朝廷之意或逋負之物當除而未除流竄之人可釋而不釋臣等欲乞應經前年大赦合放負欠物色如省司以未見保明文字州郡以未受朝省指揮至今尚行催理者速令勘會依赦蠲除編配之人除屬揀選路分外有已經量移情理輕者令具元犯奏聞㸔詳依赦釋放取進止潞公文集卷十六
