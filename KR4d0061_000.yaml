body:
  text: 潞公集别集類二宋提要臣等謹按潞公集四十卷宋文彥博撰彥博事迹具宋史本傳是集凡賦頌二卷詩六卷論一卷表啓一卷序一卷碑記墓志一卷雜文一卷自十四卷以後則皆奏議劄子之文核其卷數與陳振孫書録解題同惟尚缺補選一卷考葉夢得序稱兵興以來世家大族多奔走遷徙於是公之集藏於家者散亡無餘其少子維申按維中乃文及甫之字稍討求逮輯猶得二百八十六篇以類編次為略集二十卷是葉氏所序者也非原本陳氏所著録者又非葉氏所序本今所傳者又較陳氏之本候其一卷也彥博不以詩名而風格秀逸情文相生王士禎稱其婉麗濃嫵絶似西崑嘗掇其佳句載之池北偶談其文章不事雕飾而議論通逹卓然經濟之言奏劄下多注年月亦可與正史相參考葉夢得序稱其未嘗有意於為文而因事輒見操筆立成簡質重厚經緯錯出譬之賁鼓鏞鐘音莭疏緩雜然並奏於堂上不害與嘒嘒簫韶舞百獸而諧八風也斯言允矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:174470b4fcb34883b73a22be137aa64cc504f4b66995e4c800fcc1c33384111d
