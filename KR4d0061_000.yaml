body:
  text: 潞公集别集類二宋提要臣等謹按潞公集四十巻宋文彦博撰彦博事蹟具宋史本傳是集凡賦頌二巻詩六巻論一巻表啟一巻序一巻碑記墓誌一巻雜文一巻自十四巻以後則皆奏議劄子之文核其巻數與陳振孫書録解題同惟尚缺補選一巻考葉夢得序稱兵興以來世家大族多奔走遷徙於是公之集藏於家者散亡無餘其少子維申按維中乃文及甫之字稍討求迨輯猶得二百八十六篇以類編次為畧集二十巻是葉氏所序者也非原本陳氏所著録者又非葉氏所序本今所傳者又較陳氏之本候其一巻也彦博不以詩名而風格秀逸情文相生王士禎稱其婉麗濃嫵絶似西崑嘗掇其佳句載之池北偶談其文章不事雕飾而議論通逹卓然經濟之言奏劄下多注年月亦可與正史相叅考葉夢得序稱其未嘗有意於為文而因事輒見操筆立成簡質重厚經緯錯出譬之賁鼔鏞鐘音莭疏緩雜然並奏於堂上不害與嘒嘒簫韶舞百獸而諧八風也斯言允矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:45d5cab2095a92438f109430a6642439bd1310527477402609ab63e5640e6183
