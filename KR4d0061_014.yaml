body:
  text: 潞公文集卷十四宋文彦博撰奏議奏為修開先殿乞循制度事臣某昧死謹䟽上皇帝陛下臣某誠惶誠懼頓首頓首臣聞狂夫之言聖人擇焉臣遭逢聖神敢獻狂瞽伏惟天地之大徳特貸欽鉞之嚴誅則㣲臣幸甚臣伏覩今月十四日詔書太平興國寺僧紹宗縁化修葢外所有太祖神御殿令三司差係官工匠重修又云庶重修於宏麗獲時薦於芬馨有以見陛下奉先思孝之道高出百王復又盡給國財不煩民力此乃陛下敦崇儉徳勤恤民隠之意也天下幸甚臣切以載營寳殿嚴奉聖容仰佇靈游是為别廟臣聞清廟之制理在去華茅屋采椽本貴乎克儉丹楹刻桷乃譏其崇侈漢書藝文志曰墨家者流出於清廟之官是以克儉由此觀之則清廟之尚儉明矣臣伏恐監工之官未詳詔㫖惟務宏麗不稽典故乖清廟尚儉之文累烈祖恭徳之美臣伏望申勅有司凡所營修循以典制經始勿亟必順天時臣按月令云孟春無聚大衆孟夏無起事工又曰孟冬可以造宮室皆不欲妨農事而違天時也臣竊計今之力役固應不减千夫雖用官工不妨民事然而聚大衆起大功作事不時恐乖令典伏望預計徒庸漸儲材用俟良月而興作亦不日而考成神之格思宜錫純嘏臣又風聞羣僧籍籍道路云云皆謂既建太祖神御殿庭則本寺佛殿鐘樓即應次第官修事之然否雖未審知臣忝陛下風憲之任為陛下耳目之官苟有所聞理當先事言之庶幾上達宸聴葢欲杜其萌漸臣伏覩景祐三年八月十三日所降聖㫖云太平興國寺佛殿鐘樓并戒壇院舍宇等官中更不修葢令開封府及僧録司告示僧俗諸色人并許縁化錢取便興修明命既行遠邇胥悦皆以謂陛下省不急無益之務軫愛民節用之心自後巳有僧紹宗化錢興修漸成輪奐臣伏慮羣僧黨扇希望官中兼修佛殿鐘樓不復化縁營造伏乞申舉景祐三年先降聖㫖其興國寺佛殿鐘樓任令僧俗縁化興修所兾絶其希望之心固其縁化之志况佛寺者非急之務何須速成國帑者有限之財不可虚費景祐中昊賊未萌逆節朝廷未議兵事尚且愛惜用度不修佛舍今則戍重兵於西鄙一日之費何啻千金苟旬時之間昊賊之首未即梟於藁街臣恐事邊之費未免重困於民臣愚以謂宜節營寺之浮費以濟偹邊之急用邉既實則狂冦何憂乎不殱芻蕘之言願賜詳擇干冒天聴臣無任進退屏營之至乞令審官院選差㳂邊州郡知縣事康定元年臣伏見西邊用兵緩急有民間科率應副軍期全藉州縣官吏必得其人臣欲乞應是陜西河東近邊及當路縣分自來只差縣令處乞令審官院並選差有心力幹事京朝官知縣如本院闕官差注即乞外移合入西川官充兼有流外官見任本縣簿尉處亦乞令流内銓選差有出身幹事選人充逐縣簿尉所貴緩急之間易為集事凡有科率必得均平則人户安居不至勞苦奏乞主帥便行軍令後奏康定元年臣聞穰苴出師首誅莊賈孫武教戰先斬愛姬當事而行未甞稟命葢將權不可以不専軍法不可以不峻兹所以攻必克而戰必勝者用法嚴也自古有將權不専軍法不峻而行師必勝者未之聞焉臣切聞去嵗以來用兵西鄙或禁軍小校臨陣而先退邊壘偏師望敵而不進而統師之臣即時不行軍令悉以事狀上聞皆令隣郡置獄取勘下法寺詳案定刑臣以謂失閫外之制隳軍中之令臨事不㫁稟命不威豈曰軍容同夫兒戱復恐推勘之際據引枝蔓萌其苟免之心奏報之間淹延時日啟其幸生之路縱不至此亦慢令稽誅無以勵衆乃老師驕兵之弊也臣不知朝廷所用將臣必欲不令専制悉上稟於宸算乎復不知將臣不能用軍法皆取則於朝廷乎儻朝廷用將而不令専制則臣所謂失閫外之制矣古之遣將也君推轂而命之曰閫以内者寡人制之閫以外者將軍制之此非徒然也葢委任責成之道不得不重今而多輕之故臣所謂失閫外之制矣苟將臣不能自用軍法則臣所謂隳軍中之令矣人之常情孰不畏死敺億萬之衆冒矢石之衝刑之不嚴何以督戰兵法曰畏我者不畏敵畏敵者不畏我豈非嚴刑故對敵而伍中有不進者伍長殺之伍長不進什長殺之夫以什伍之長尚得専殺而統帥之重不能誅一小校以厲士卒臣以謂隳軍中之令矣議者或曰今所遇之冦未為大敵所興之師未至深入軍中之法未可専用將校有犯所宜奏裁苟如議者之言臣以為過矣冦非大敵兵未深入尚且狼狽先退逗撓不進儻遇大冦深入而將校有犯必須上聞則穰苴之戮莊賈非大敵也止於㑹軍而後期孫武之斬美人非深入也惟以習戰而衆笑戮其君之寵臣愛姬亦未甞素稟而先啟終於齊師勝晉呉人入郢孫武穰苴皆為名將者委任専而法素行也以區區霸主猶知任將之道豈巍巍聖朝不及於是且國朝著令凡禁軍將校有退奏裁此則施於平居無事之日邊州守戍近郡屯聚則用之可矣今昊賊亂常蜂蠆有毒防邉之兵逾數十萬將權不専軍法不峻則何以御之臣伏望陛下出自宸斷稍假將權凡有偏裨小校臨陣先退望敵不進如此之類罪犯灼然但合該軍法者不須置獄並許本部統帥對衆便行軍令訖然後奏聞如此則師旅畏威進退從令或守或戰必有殊功兵者國之大事陛下居廟堂之上與宰輔大臣計之審矣豈容疎賤輒有輕議然臣承乏憲署職左司聪苟有見聞安可緘黙陛下勿以臣之此言徒習老生之常談耳遂忽而不省臣熟思之任將治兵之術何莫由斯道也愚者之慮幸賜采擇干冒旒冕臣無任乞河東依陜西例㸃强壯康定二年右臣於去年二月初曾上言乞於河東路每三丁㸃一丁充强壯緩急為守禦之備自後朝廷差吳遵路等於河東路㸃差到强壯共一十四萬三千餘人内十三萬三千餘人是主户九千餘人是客户是皆兩丁内㸃一丁充强壯臣遍巡歴到諸州軍切見所㸃到强壯太多而不精兼頗妨奪農事臣檢會咸平中曾降勅㸃差强壯本路除晉絳慈隰麟府六州不㸃差外共㸃差到强壯四萬四千餘人今來雖添晉絳慈隰四州㸃差强壯即比咸平舊幾及三倍况本路主客人户共三十一萬三千勘會纔及陜西人户之半昨來陜西所㸃弓手只十萬人以此况之即河東所㸃集太多而妨農也臣欲乞依陜西體例每三丁㸃一丁充强壯猶可得八萬餘人所貴務農作者不致妨廢習武事者頗得精専如允臣所奏更不行鈔㸃丁口數目而去留之並不搔擾動衆謹具奏聞伏候勅㫖御前劄子慶厯四年五月西界雖累曾差人請和近却不住據延州及環州等處奏稱賊馬入界作過雖逐度逼逐出界及殺奪到人馬切慮賊計多姦且以通順為名遷延至秋别圖大舉今來已入夏月邊上須是早作准備仰文某更切體認今來已是夏月去防秋不遠如邊上有應干守禦未備事件並仰疾速究心處置早令了當免致臨時倉卒悞事此劄子親自收掌不得下司付文某四月二十四日答奏臣准御前劄子節文西界累差人請和切慮賊計多姦且以通順為名遷延至秋别圖大舉令臣體認今來已是夏月去防秋不逺如邊上有應干守禦未備事件並仰疾速究心處置早令了當免致臨時倉卒却有悞事者臣職在疆埸日料賊計雖聞累有歸順之情深慮必是遷延之計聖慮所及宸算無遺臣惟知夙夜防虞常若冦至不敢終食之間懈於為備但患才拙不能上副倚寄致煩聖念屢賜戒勵内省不稱伏増惶懼本路沿邊要害城壁樓櫓自去秋以來增修各得完固以至甲仗戰守之器添補並及分數臣今一依聖㫖丁寧更切躬親檢閲守禦之備訓士養馬磨礪兵器及遍指揮諸塞增葺城壁戰守之具及更差官分頭㸃檢比至防秋委得不悮大事乞復昭化縣驛程慶厯六年去年臣僚上年减廢利州昭化縣驛程臣聞行路之言皆為不便臣昨親自經由相度誠為不便昭化驛去利州雖近又因東有桔栢津大江之阻西有木瓜原重山之險夏秋二時雨潦留滯行役之人進退無據古來置驛良因於此今既廢驛即經過使命不免褁粮留宿其如過軍稍多即宿食有所闕乏臣欲乞依舊驛支給券料所費甚少所濟則多取進止乞選差川峽州郡知州慶厯六年臣切見祥符中先帝軫念川峽逺民精求循吏以為審官院依資次差移官員多不得人故特頒詔書令馮拯以下各舉川峽知州通判臣切以西川近年以來生齒繁庶比祥符中數倍全藉長吏安輯稍不得人即煩朝廷西頋臣以為川峽知通若盡須舉差恐難得人所有益梓利三路内卭蜀嘉眉彭漢陵綿果閬遂合劍州興元府十四處户口繁多屯兵稍衆所有知州知府臣欲乞今後令審官院揀選差官須是歴任内無私罪升朝後有舉主年甲未高者方得差任如任内别敗闕得替日與先次優便差使或别有殊尤治狀灼然可驗即升陟酬奬所貴遠方得人兼舉先朝故事取進止乞諸州供錢撥充交子務慶厯六年益州交子務所用交子嵗獲公利甚厚復又民間要藉使用葢比之鐡錢便於齎持轉易近因秦州入中糧草兩次支却六十萬貫文交子元有未封樁見錢准備向去給還客人深慮將來一二年間界分欲滿客人將交子赴官却無錢給還有悮請領便至壊却交子之法公私受弊深為不便伏乞朝廷指揮本路轉運司於轄下諸州軍内毎月須管共收聚諸般課利錢三五萬貫撥充益州交子務准備給還客人交子錢免致向去壊却舊法官私困弊取進止乞罷將校舉留慶厯六年唐末及五代已來方鎮守臣毎有替移或召赴闕其間倔强武臣多是妄託軍情不時受代因致䟦扈國初懲方鎮之弊盡去此態稟朝廷進退約束無敢違異臣竊見近日以來㳂邉征鎮揔兵帥守累有本轄將吏例狀舉留者此風不可啟其漸欲乞下諸路轉運使今後更不許諸軍將校使臣等列狀舉留本轄帥守取進止乞封示兩制等議汎使事文字慶厯七年今月十七日崇政殿䝉賜聖問以北邉汎使忽來恐有邀求之事深可預防作何回報切以鎮撫四夷宰相之職以臣之愚短待罪宰司不能有所建明以致上煩宸念然臣自聞北虜聚兵雲朔及聞有汎使來告西行夙夕深思多方迎料但不欲先事張皇預有泄漏恐非示以閑暇鎮静之理須虜使之至萬一妄有邀求或即别懐狡詐則臣之思慮有素可以隨宜裁制臣今雖與陳執中等同署奏狀上答聖問示不敢周悉開陳以候節假開日細具面奏兼臣兩日以來密探外議皆云朝廷百僚只為議汎使事傳聞外方深似不便或恐學士已下進日議狀論汎使事乞令左右封收密示兩府免致漏洩傳布中外謹具奏聞謹奏潞公文集卷十四
