body:
  text: 潞公文集卷九宋文彥博撰論序賓以賢論前志曰六經之道同歸禮樂之用為急施於國不可斯須而忘用於身不可造次而闕忘之則紊上下之序闕之則乖孝悌之風聖人知其然也乃曲為之禮事為之防既養老於大學仍校年於天下所以揉民於孝悌習俗於醇厚者矣故五帝憲德載之惇史三王乞言詳於先籍是知年之貴於天下也久矣古之盛王未有遺年者焉而饗禮燕禮節文尚疏上庠下庠制度猶簡至於兼虞夏之禮養隂陽之氣先習射而上功次序賔而以賢享燕而有儀禮律大備使觀之者亹亹而知其當周之盛乎大雅所陳亦既詳矣竊迹前事敢試論之夫養老之禮示天子必有尊也習射之事蓋聖王之所務焉若夫安上而治民化民而成俗鮮不重於此矣故禮有養老之制焉有射燕之義焉子曰君子無所爭必也射乎然則射之為義盛矣哉是故王者將欲行養老之禮必先舉習射之典前諏以協吉先置以戒期乃率羣臣躬行其事和容繹志揖讓周旋比禮樂以居多取正鵠之必中貍蘩之節發心循聲鍭矢之均足以觀德廑有存者擇而用之升之於膠序之中與其噎鯁之事侑袒割之虔儀參揔舞之下綴雍雍然皆當世之令人濟濟焉悉置行之吉士不賢者遠有德者升用能列四世以稱首監二代以增郁得賢之盛丕昭於往圖講禮之備俯煥於來葉仲尼因而憲章詩人得以歌詠者其在兹乎國家紹休三后之基登閎百代之制無文咸秩墜典聿修帝命式於九圍德教加於百姓尊更老以崇孝悌恢雍泮以興儒學固以超八九之休崇軼三五之步驟寧使夫序賓之道専美於有周者哉仲尼學文武之道論粵夫緯兩儀炳三代著經國之具美垂振古之妙範移風易俗顯化成之猷與世作程布時郁之制者此用文之淵懿也尚七德勵五兵定保大之茂勳備有征之洪略弔民伐罪助天討之常戡難定功振刑威之法者此尚武之震服也若乃文德之綿縟武經之禁戢著是二説非聖神孰能行之懿子貢之嘉議仰宣父之上智謂文武之道未墜於地當世生仲尼也稟上智之性蘊將聖之德道猶江海而學奧彌盛明並日月而訓言益煥律天時之動靜襲水土之深厚祖堯舜欽明之德憲文武方䇿之政歷聘七十之國授徒三千之衆性與天道而仰者彌高學而時習則誨之不倦為木鐸則世振其聲教佩象環則服旌於道義紹素王之德理稟神明之溫粹且謂學於文也子以四教文行忠信著矣國重六經禮樂詩書備矣故曰夫子之文章可得而聞遠人不服修文德以來之刪詩書正義始典墳之素定禮樂明述作同和之制讃易象洞窮理盡性之旨修春秋列屬辭比事之傳灼敘百日之儀矩誕布千載之軌範此用文之盛矣謂學於武也紹止戈之前訓得安民之勝術故曰我戰則克祭則受福百年訓刑可以勝殘去殺又曰不教民戰是謂棄之著筆削則亂臣以之懼任司寇則正卯為之誅示足食足兵之文壯非威非懷之詠此乃用武之盛矣若夫相須之盛節未墜之常道故漢志曰文德者帝王之利器威武者文德之輔助文之所加者深則武之所服者大德之所服者大德之所施者博則威之所制者廣故夫先聖鍾睿明之德適弛張之用昔者相魯公會於夾谷曰有文事者必有武備豈不知至聖備用乎噫生稟自誠之性存存而有成學該稽古之理循循而勿倦著日新之要道隆功倍之廣業故曰未若丘之好學也歟昔賢所謂兵者刑也刑者政事也為夫子之徒實仲由冉有之事若此則聖人勿學而能矣今言學者蓋由垂世立教化民成俗大聖兼該故文武並用若夫唐虞之興化本由文武之道姬旦之致治蓋拘文武之迹若俾仲尼以文武之道致文武之迹夫何難矣則知禮樂征伐出於天下之有道者非聖人達於極摯孰能備矣譎正論孔子曰齊桓公正而不譎晉文公譎而不正愚嘗詰注疏家流止云齊桓公正而不譎者以其伐楚而責包茅不入問昭王南征不返有以見臣節而尊王室也故稱其正焉晉文公譎而不正者謂天王狩於河陽因而朝之以臣召君非禮也故稱其譎焉以愚觀之則所謂只知其一未知其二也夫聖人之道言以尚辭語無重出故云一字為褒貶者取其簡而當也至於品藻諸弟子但云柴也愚參也魯由也唁而巳若謂齊之正焉但云齊桓公正可矣謂晉之譎焉但云晉文公譎可矣復云正而不譎譎而不正者其故何哉愚嘗議之蓋有以也按春秋曰齊侯與蔡姬乘舟於囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之明年春齊侯遂以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海惟是風馬牛不相及不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之以夾輔周室賜我先君履東至於海西至於河南至於穆陵北至於無棣爾貢包茅不入王祭不供無以縮酒寡人是責昭王南征不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濱也且齊侯之始也以姬之忿而侵於蔡侵蔡得利因而伐楚楚既問罪乃託為勤王之師夫然則測其始志得不謂之譎乎及責楚之罪則為正矣既得其正乃為不譎矣夫晉文公之始也伐原以示信大搜以示禮一戰而霸可謂正矣及其天王將狩於河陽君子譏其以臣召君又朝王而請隧王不許焉曰王章也未有代德而有二王亦叔父之所惡也噫晉之始也正則正矣及其此也臣節何在如此則始雖正今乃為譎矣愚謂聖人之意以齊桓有管仲之佐雖始譎終乃復正故正而不譎矣以晉文公季年無良臣輔弼始雖正終乃復譎故譎而不正矣先師之旨不其然乎春秋何以見仲尼之志論子曰吾志在春秋行在孝經夫春秋之義竊嘗聞焉仲尼之志未之見也愚也不敏敢試議之夫仲尼生姬周之末處鄒魯之間聚徒三千大闡儒教憲章文武祖述堯舜門牆數仞仰之者雖繁堂奧彌高升之者斯寡故自有生人以來未有如夫子聖者也然有聖人之才而無聖人之位故栖栖然遊聘於七十國曾不一遇夫子知道之不行也身之不達也而又覩周道陵夷皇綱絶紐禮樂隳壞彛倫攸斁妖災因釁而作民俗染化而遷隂陽為之愆度七曜因而盈縮君臣之禮廢父子之恩缺君子在野小人升用四裔交爭中外共貫幽王以暴虐見禍平王以微弱東遷征伐不由天子號令出於權臣下陵上替僣逼斯甚夫子乃喟然歎曰文王既沒文不在兹乎於是因魯史而修春秋舉得失以明黜陟著成敗以彰勸戒其惡者不得不貶善者不得不褒闡揚大道用振頽綱故一字之褒寵於華袞之贈片言之貶辱過市朝之撻是以有德者雖賤而必伸敗道者雖貴而必屈附勢而匿非者無所逃其罪懷才而獨運者無所隱其名斯所謂聖人達而賞罰行聖人窮而褒貶作者矣故知聖人之褒貶所以代賞罰者也觀其褒貶則仲尼之志見矣故孝經緯曰孔子云欲觀我褒貶諸侯之志在春秋崇人倫之行在孝經斯則其義明矣其後何休以此語序公羊傳則變其辭云吾志在春秋而行在孝經也是使後之學者觀之稍迷因為之論庶幾辨惑者爾何以措刑論夫刑法之制有自來矣然歷代沿襲其制頗異夫刑之用小則禁姦邪大則戡暴亂考諸上古又亦不然夫上古之時世質民淳上布希夷之化俗無爭競之心故結繩而為政畫衣而為刑政甚簡而民自治刑至薄而人不犯也其後聖人因於天討遂制五刑上至兵甲下及鞭撲列五等之輕重乃刑罰之大端也自兹以降源流實繁然夏商周之代漢魏晉之朝或以此而興盛或以此而陵夷其故何哉蓋刑者不可久用久用則民殘民者邦之基邦基既弱國將若之何斯則其猶兵之不戢將自焚乎其鑒不遠在秦皇之世矣然刑之欲措必將有道以撫其俗則庶幾於太古之風矣且人之所懼者刑也所慕者化也當主上無為致治革煩弊之政敦清淨之風行仁愛以及下布善教以懷民國泰時阜無遠不服蓋上之好善民必從之故孔子云為政焉用殺子欲善而民從矣君子之德風小人之德草草上之風必偃也又曰善人為邦百年可以勝殘去殺矣又孟子云善政不如善教善政則民畏之善教則民愛之善政得民財善教得民心以是而言則措刑之道其用善教乎故周之成康世稱其治漢之文景代美其能者蓋遵用於斯道也是以周漢之歷祚遐永者亦由是矣今我國家連衡五帝方軌三王股肱惟良朝綱具舉民躋富夀之域時返淳朴之風六合晏然四海寧謐中外奉職咸為外臣時平俗泰國富刑清雖周之成康漢之文景固不可同年而語也斯所謂得善教之良術矣堯湯水旱何以不為民患論夫隂陽舛度而水旱失常當其為害未有不因其所由也蓋法度失於下則災變見於上其或上失其道國無其人或讒邪得路而日興或忠良含憤而被逐或兵甲縱暴而弗戢或刑罰苛刻而無當或土木之工不息或聚斂之法太重由是男怨女曠民不聊生墜於塗炭蹐地無歸所以怨憤之氣積而災沴之患作矣歷代而下未或無之而堯湯之朝莫斯為甚一則九載而滔天一則七年而闕二字浩浩沃日赫赫流金禾黍蕩盡農時靡登而遐邇無菜色上下無離心海內晏然域中清肅其故何哉愚雖不敏竊議斯言夫堯舜之水旱者非政教之所失非寃憤之所致也蓋時之所及不可得而移易也然卒不能為患者蓋備之有素焉當二時之臨御則孜孜求治宵旰忘疲敦清淨之教革苛弊之刑教民勤稼穡之務化下絶澆漓之風賦斂尤薄國富刑清百姓由是阜康六合於焉平泰明哉之謠作樂只之頌興及其水旱之作沴也而國方富強民方康夀時既隆盛又何患害之能及焉故古語有之曰國無九年之儲非國也家無三年之儲非家也然而當堯湯富庶之代民俗安阜之時其畜積復何止於九年三年哉是則以九年三年之儲畜禦九載七載之災沴不亦可乎而又畜於稔嵗濟於凶年此治國之大術爾抑又洪範九疇以農為本良以食者民之天民者邦之本食足則民盛民盛則邦興如此則縱有災沴患將奚為聊舉斯一隅則其他可知矣進無為而治論臣頃因奏事親聞德音謂古稱無為而治當先有為而致無為臣雖即時仰對曰虞舜垂裳而治者亦皆先有為而後無為誠如聖意臣退而伏思曰陛下有堯舜求治之心而臣愚無臯夔致君之術夙夕慚懼啓處不遑又以奏對之際蹇訥未周謹尋前典所述虞舜之德著於簡牘仰塵鑒觀庶幾愚忠上禆聖政仲尼曰無為而治者其舜也與夫何為哉恭巳正南面而巳先儒之解以謂任官得其人故無為而治考於虞書則舜之治也流共工於幽州以其心狠貌恭足以惑世也放歡兜於崇山以其掩義隱賊黨於共工也竄三苗於三危以其貪冒食貨崇侈不才也殛鯀於羽山以其頑嚚傲狠治水無功也四罪而天下咸服兹所謂去邪不疑而罰當其罪也於是詢四嶽以謀政治闢四門以求衆賢明四目達四聰以廣視聽於天下命禹作司空以平水土棄為后稷以播百榖契作司徒以敷五教臯陶作士以典五刑垂作共工益作朕虞伯夷作秩宗以典三禮夔典樂以教胄子龍作納言出納朕命惟允既命以官因戒敕之曰各恭其職乃能立天下之功然後三載考績三考黜陟幽明庶績咸熙兹所謂任賢勿二而官得其人也夫明四目達四聰去四凶命庶官其勤至矣得不為之先有為乎及夫庶績熙熙天下服垂衣裳正南面而已得不謂之後無為乎臣究觀經史之載舜之至德也有大功二十舉十六相去四凶也十六相謂八元八凱稷契臯夔之倫去四凶則朝廷無姦邪之黨舉十六相則左右皆賢哲之輔如是而天下不治者未之有也故後世聖帝明王莫不勞於求賢而逸於致治勞於求賢則先有為也逸於致治則後無為也恭以陛下紹祖宗之丕基行堯舜之至化黜邪遠佞去四凶之志也求賢審官舉十六相之意也然而一日萬務尚勞宵旰兹乃臣愚不稱職之效也臣以為方今之務正在謹守祖宗之成法使爵賞刑罰不失其當耳爵賞當則姦邪無功者不敢僥幸而希進刑罰當則貴近有罪者不敢請求而苟免紀綱正而朝廷尊號令行而天下服如此則陛下高拱穆清之中無為而與虞帝比隆而下視三代之盛矣潞公文集卷九
