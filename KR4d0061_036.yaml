body:
  text: 潞公文集卷三十六宋文彥博撰辭免免節使請受歷頭元豐七年臣昨於去年十二月二十七日奉制命依舊開府儀同三司河東節度使守太師致仕近淮西京留府准尚書户部符依元豐祿令出給到節使請料錢歷頭伏念臣遭逢朝廷久更重任祿賜優厚叨竊固久本遂致仕尚以節使優賜實難當克欲望聖慈特賜指揮止用舊令以本官請受支給庶安愚分取進止繳納文榜臣昨准河南府給到致仕請俸歷頭一道却開坐見任使相則例并給到一月請受俸錢榜一紙臣必謂所司差誤不敢請領亦曾審問所司堅稱新條當然即時遂具奏陳以謂休致老臣不敢冒請厚祿乞依舊制致仕官請受自後本府被省符勘㑹往復遷延亦已半年今准河南府别給到依舊制致仕請受歷一道已令勾當人請領其前來出給到文榜却令繳納訖謹具奏聞辭免男恩命元祐元年八月臣近䝉聖慈除臣男貽慶司封員外郎男居中充宗正寺主簿仰荷聖恩不勝感戴緣臣男貽慶自省郎乞白波輦運到任方及半年男居中係臣陳乞西京勾院皆以便于私計兼輦運司職事自可往來西京時得省覲所有上件告命不敢祗受已具奏乞寢罷未奉俞㫖謹再録奏聞伏乞早降指揮取進止臣男勾當西京勾院居中以臣亡父某此月二十三日私忌每歲就寺齊祭兼所給假滿今已先次令發回本任臣于西京有居宅家廟歲時須要人照管貽慶等因官兼遂私便才候臣一向平復並令回本任又臣近准尚書省劄子奉聖㫖以臣乞免臣男貽慶與理轉運判官資序及男居中授宗正寺主簿不許辭免尋具劄子陳奏以貽慶近䝉聖恩賜金紫章服今又特升資序恩命稠疊固不可當及授居中宗正寺主簿于臣私計不便並乞寢罷今再准尚書省劄子奉聖㫖依前降指揮不許辭免伏緣居中見任西京勾院臣先以恩例陳乞切念臣家廟在彼今來若得居中守任彼中就便主辦歲時享祀誠為私幸兼臣即目見有兒孫四人守官在京于老臣左右不闕奉養其貽慶理任資序于義固不敢當所授居中宗正主簿于臣私計實為未便伏望聖慈察臣懇切許遂私志干冒天威不任戰越之至取進止又臣近准御批臣所奏劄子為乞免臣男貽慶居中所授司封員外郎及宗政寺主簿已依所乞今却准尚書都省劄子奉聖㫖臣男貽慶與理轉運判官資序居中不許辭免切緣貽慶本令隨侍臣至闕下入殿日給伏䝉聖恩賜金紫章服無功賜服義不可當纍辭不從黽勉祗受今既許免郎官却歸本任又更䝉特升資序到任未久升陟無名必致人言愈不敢當乞賜寢罷所有居中先乞西京勾院本為便于家廟歲時主辦享祀今若授宗正主簿即于家私甚為失所今日假滿已令發歸本任伏望天慈下從人欲臣不任臣位居師保任處台司當以亷退表率周行豈敢冒竊過恩以致人言伏望聖慈矜察所有貽慶居中所授恩命必不敢當又臣近再具劄子陳免臣男貽慶與理轉運判官資序男居中授宗正寺主簿䝉封還臣所上劄子准御寶批居中以降指揮罷宗正寺主簿依舊西京勾院所有貽慶依前降指揮不許辭免今來居中遂免宗正主簿上感聖恩特賜從欲所有貽慶以近䝉恩賜金紫章服今又特升資序實以恩命稠重于義固不敢受苟或冒竊必速人言是以不避斧越之誅再三干冒天聽伏望聖慈察臣懇切特許寢罷此乃聖恩保全老臣晚節取進止又臣近纍具劄子陳免臣男貽慶與理轉運判官資序及今月二十八日簾前面罄懇誠決不敢當今尚未䝉俞可伏望天慈早降指揮寢罷無任䖍切之至若臣男到官日久自有勞效朝廷法當酬賞即不敢辭免明堂禮畢賜物元祐元年九月臣據本家指使報准諸司糧料院告示以臣近遇明堂禮畢依宰臣例支賜銀絹衣帶鞍馬切緣臣久病家居不獲陪祠赴宿衛所有上件支賜義難虛授伏望聖慈特賜指揮寢罷取進止又臣近具劄子陳免明堂禮畢依宰臣例支賜銀絹衣帶鞍馬准尚書省劄子奉聖㫖不許辭免臣昨以久疾家居既不獲陪祠宿衛復叨恩賜實難虗受于義決不敢當伏望聖慈特賜指揮寢罷庶安愚分取進止又臣近以明堂禮畢䝉恩依宰臣例支賜纍具劄子陳免及今月二十八日簾前面陳誠懇今尚未䝉俞可于義決難虛受伏望聖慈早降指揮寢罷無任䖍切之至又臣近纍具劄子及簾前面陳誠懇辭免明堂禮畢依宰臣例支賜纍奉聖㫖依已降指揮不許辭免臣今不敢屢違恩㫖若全受即傷亷半給即有例臣久以使相守藩在外雖不陪祠宿衛亦䝉依宰臣例給賜一半臣已令管請受給使人只依任使相比宰臣例請受一半餘乞回納左藏庫伏望聖慈聽可取進止又臣近䝉聖恩以臣男貽慶升理轉判官資序及明堂大享臣在病假不獲陪祠宿衛依例錫賜臣纍具懇辭終未䝉開可臣忝公輔自當稍知亷恥以表率縉紳今若不顧義理貪冒恩賞寧免人言之責必貽福過之灾所有臣男升資懇祈寢罷并臣經大禮支賜只乞依例給半臣不憚再三之瀆祗祈天監察其誠懇必賜矜從臣無任臣以前件恩賜決知非宜必望聖慈從其所請乃所以保全老臣晚節免賜銀合元祐三年九月臣昨日奏劄子辭免御封所賜銀合今䝉批降聖㫖不許辭免臣伏思忝冒實難當授容臣俟簾對日口陳所以不可虛授之理伏望聖慈察其誠懇必賜追寢謹奏免差人內都知管勾葬事元祐四年正月臣以妻王氏自亡伏䝉聖恩特差勾當御藥院老宗元傳宣宣問仍傳聖㫖已差人內都知管勾葬事恩眷隆厚必不敢當伏望聖慈特賜寢罷取進止免致仕奏薦恩澤元祐五年五月臣伏望聖恩以致仕依條與五人恩澤外更特與一名官伏念臣向者䝉聖慈過聽起于休退俾忝國論無補毫分昏耗疲癃纍章特請復還故棲天幸已甚更䝉推恩固難當克臣有堂姪曽孫常去年明堂大禮後曾奏乞恩澤以雖是本族同居之親為服紀已絶尋别奏常之親叔安雅得假承務郎授命數月未曾出官而身亡臣念其本房孤遺並未有得官者今祗乞特授常一近下名目外其餘恩澤決不敢當蓋臣前時致仕已得恩澤于義固不可再授恩澤伏望聖慈從其誠請取進止又臣伏䝉聖恩以臣致仕依條與五人恩澤外更特與一名官臣即劄子奏陳以臣前曾致仕已得依例恩澤今來于義不當再授更不敢陳乞止有堂姪曾孫常去年明堂大禮曾用例奉乞以服紀已絶尋别奏常之親叔安雅得假承務郎不幸才受命數月身亡臣念其本房孤遺並無食祿者只乞特授常一近下名目外餘恩澤決不敢當伏䝉聖慈不許辭免伏念臣寵祿過分私門䝉恩已多無補朝廷久自愧負豈可更兹僥幸義實未安必難當克伏望聖慈特賜允臣所請取進止謝賜銀元祐五年四月伏䝉聖恩特賜銀五千兩即具劄子辭免不敢克當尋奉御批不許辭免又䝉特降中㫖宣諭不允臣不敢再三上瀆聖聽已祗受訖臣無任再辭致仕恩澤臣近准尚書省劄子奉聖㫖文某致仕依條與五人恩澤外特與一名官尋兩具奏陳臣前後䝉恩澤已多不敢克當臣有同居堂姪曾孫常一名昨遇明堂大禮奏乞推恩為服已盡礙新條不行别具陳乞常親叔安雅授假承務郎被恩之後不數月未經參選身亡臣以常見令孤遺房下並無食祿者止乞授常一近下名目外餘乞寢罷今再准尚書省劄子奉聖㫖文常特與假務郎餘依前降指揮者臣無任感恩荷戴之至所有臣今來致仕依條合得五人恩澤纍具辭免難以祗受更不敢陳乞上件恩澤謹具奏聞潞公文集卷三十六
