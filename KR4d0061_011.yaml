body:
  text: 潞公文集卷十一宋文彥博撰序送張大丞赴闕序袁宏曰帝王之道莫大於選賢選賢之義各有其方也故周有俊造之科漢有賢良之舉莫不取經國宏才濟民遠略然後授之以職而使不失其任也膺是選者實難其人大丞狀元炳山嶽之靈蘊經綸之業才識敏茂聲華藉甚始以大司徒論秀而升於太學俄以春官氏辨材而揚於王庭狗監誦子虛之賦恨不同時天子覽平津之策遷為第一卿士大夫莫不嘉歎而自策名桂籍解褐仕路闕載佐郡皆有治聲天子嘉其能而自麟臺郎改丞奉常雖行路之人悉以慶慰然縉紳之士咸稱其位不充量也方屬芝檢召賢之日葵邱代戌之秋嚴助巳别會稽賈誼重歸宣室則公之是行也排金門升玉堂固其宜矣然鴻鵠之志一舉萬里非燕雀之所能知也某以忝窺奧隅獲丐餘重片言之譽東陵殆侔西山半面之榮鄭璞僕逾周寶建兹於邁豈其無言躑躅燥吻聊為之序送龍昌期先生歸蜀序井絡之區炳岷嶓之秀是以異人間出俊乂鳳集長卿導清源於前子雲扇芳塵於後歷此而降鴻碩頗繁然或以浮誕相高流蕩忘返者十室而九其勵志墳典逰心聖奧蓋亦鮮矣達斯道者其惟武陵先生龍君乎先生陵陽人也藏器於身不交世務閉關却掃開卷自得著書數萬言窮經二十載浮英華而沉道德先周孔而後黃老楊墨塞路辭而闢之名動士林高視兩蜀遂不遠萬里上書公車纍呌天閽久而不報乃喟然嘆曰道未亨矣吾其歸歟因假道閬川獲挹眉宇是故經籍奧義得以咨焉或撞鐘待問則多多而益辦或時衡高論則亹亹而來逼搢紳之流靡不推服且以堂有慈親貧乏甘㫖遽軫南陔之思遂謀西轅之役摻執之際烏得默然因舉酒而言曰夫古之人患於不明經也苟明一經取朱紫如俯拾地芥耳何况於先生之經明行修乎但老氏所謂大器晚成也爾行矣自愛先生其志於斯言藏器於身不涉世務閉關著書開卷獨得楊墨塞路辭而闢之名動士林高視兩蜀不遠萬里纍詣公車上書自薦寄食上都久而不報遂復喟然嘆曰命未泰矣吾其歸歟因假道閬川獲挹眉宇仰碧雞之雄辨鄙吝頓袪聽黃馬之劇談座客皆靡方以陟岵在念戒塗有期送君河梁聊復贈言勉哉是行以保遠大贈清河先生序祕校清河君器識淹雅文行淵懿學有師法名高士林游五經之郛超然深詣馳六藝之駕邈矣遠至載丁家艱未充英彀濡遲之闕有識所同天聖初某始到都下接諸公遊首得清河君以文相會以道相合行藏遊息相得甚歡未幾豫忝榮名則霧露之潤朋友之益從可知矣豫從弟彥若嘗師於清河君授以經義教之藝文雖未能傳其家法亦庶幾得其一技前年春彥若復忝科級旋為外諸侯奏闕總郡學講授之職則清河君之善誨又可知矣今豫之季弟彥伯又得師事君一日彥伯謂豫曰某依張先生之門垂三年矣愚冥之識頗有開悟嘗於羣弟子之末預聞先生之言夫業文者必始於通經通經者必在於講貫故先師曰學而不講是吾憂也以是羣弟子嘗請於先生願聞講習始則講大戴禮終則講左氏春秋論叙精敏曉譬􅀈明學者所疑渙然開釋先生之於五經無不通者將與羣弟子請於先生願講尚書一經以重煩而未白也豫應之曰昔與清河君遊亟聞其談經也於典謨訓誥誓命之文禹貢洪範之說尤所精達豫遇有所疑就而質問若叩洪鐘大小必應未嘗不虛往而實歸一行為吏十嵗於兹不聞益友之高論久矣今將與爾皆就學焉翌日躬請於清河君君亦重違豫之勤請巽辭以從曰虞夏商周之書歷代寶以為訓昔嘗學於斯文勉與諸君評之莫逆於心喜可知也將布席以發論當聞善以相告好古博雅與我同志者願聞來學二月日太常博士文某白藥凖序此下二序熙寧八年北都作豫曽苦頭眩治之多方彌嵗不解會國醫龔世昌診脉問狀乃云鬲有寒痰久之使然非他苦也授豫香芎散并其方服未半劑而愈遂不復發豫既神其效又觀其立方有法不與常類方用九物物别為之解凡藥性之寒溫味之甘辛并其主療略具於左雖簡而備使觀之者有據服之者無疑無疑即有效猶夫任人各知其才之所長用之無疑事罔不濟乃知古之良醫治病必考於本草而立方方藥既精厥疾必瘳班固云經方者本草石之寒溫原疾病之深淺陶隱居云道經載扁鵲數法其用藥猶是本草家意張仲景最為衆方之祖悉依本草近世庸醫鮮通本草求其方藥之驗固亦難矣豫嘉龔醫之方専用本草之意因採仲景并外臺千金及諸家經驗方共若干輒加注傳於門內以備處療謂之藥凖以其依本草立方則用之有凖云節要本草圖序余嘗以近世醫工雖處方有據而用藥不精以至療疾寡效蓋古醫用藥率多自採故桐君著采藥録備其花葉形色别其是非真假用之决無乖誤服之咸得痊愈而又擇郡國地産之良及春秋秀實之候今則不然藥肆不能盡識惟慿采送之人醫工鮮通本草莫辨良楛之雜加之贋僞遂以合和以之療疾宜其寡效唐室之盛置藥園生本草圖欲悉知其形色氣味用藥之精且慎如此嘉祐初余在政府建言重定本草圖經凡數年而成例䝉賜本然藥品繁夥畫形繪事卷帙頗多披閲匪易因録其常用切要者若干種别為圖䇿以便披檢簡則易辦人得有之按圖而驗辨誤識真用之於醫所益多矣潞國公寬夫記潞公文集卷十一
