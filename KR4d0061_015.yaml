body:
  text: 潞公文集卷十五宋文彦博撰奏議乞差嘉眉益利屯兵救應淯井監更不差秦州兵慶厯七年臣今覩梓州路奏稱淯井監夷人作過事體不小乞依慶厯四年例於秦鳳路差發兵馬赴本路救應事臣勘會慶厯四年夏瀘州界夷人作過是時臣任秦鳳路都部署經畧等使准朝㫖令臣發禁軍兩指揮赴瀘州救應臣以秦州去戎瀘四十餘程地遠必赴救不及枉有拖曳兵甲臣雖知不便當時以朝㫖丁寧不敢稽留異議遂發禁軍兩指揮赴瀘州未及中路夷人果巳退去其上件兩指揮兵士只到遂州駐泊是時川界州軍見此兵士經過人情頗亦驚恐兼為遂州官吏不曉軍政不能平心撫馭動有猜忌幾至生事臣知益州日鑒此舉動之失曽具利害擘畫開奏以謂戎瀘些小夷人作過只是本處白芳子弟及寧逺兵亦自可禦遏若賊勢稍大則計會梓䕫益利兩路就近差那兵甲可以討撃葢蠢爾小蠻來則禦之不可窮其窟穴豈煩逺自秦鳳興師空自勞弊兼恐别有驚擾况嘉眉州皆是益利鈴轄司屯兵之處若發兵救應乘舟下水不三四日便至瀘州赴救之勢最為神速臣之奏章必樞府可以覆視伏乞更不自秦鳳發兵只令速計會益利鈴轄司相度量差兵甲由水路赴瀘州策應甚為允當取進止臣比欲候假開日面奏又恐樞密院以梓州路所奏急切已入文字乞依所奏須至先具此奏聞乞下田况選擇官兵使臣揔兵赴瀘州仍令稟梓州路官指蹤事慶厯七年臣伏見自去秋已來日官所奏星文變異皆云蜀中稍須防備近覩梓州路所奏淯井夷人作過若只是十州五團夷人即計其事體必不致大本路便奏乞自秦鳳發兵救應臣却恐因此張皇别致生事兼慶厯四年自秦鳳發兵往彼不惟無益於救援而幾乎别生他事臣鑒此失遂於前日奏乞不自秦鳳發兵只委益利鈐轄司相度就便發兵伏聞已依臣所奏欲乞更速下田况令選擇官兵使臣搃領赴瀘州每事令稟梓州路官指蹤不得輒分彼我致有不和取進止慶厯四年秦鳳所發兵到遂州只為本處兵官不能平心撫馭事分彼我以致軍情怨憤乞早罷兵招安夷人慶厯七年瀘州土風瘴毒至春夏尤甚祥符二年秋夷人作過官軍討伐至次年正月詔曰瀘州三月即苦瘴毒如戎人尚敢旅拒量留兵阨其險路令孫正辭等自二月領兵分屯近郡臣以謂今來已是三月本土氣候方惡乞宻諭本路兵官轉運使早令依常例招安打誓了免致遷延瘴癘之地人心不寧兼祥符中孫正辭等以蠻事未了奏請添兵真宗以邊徼窮僻供億非易不許其請仍詔正辭等如蠻人不受招安已經誅翦畏服勿窮追之又以丁謂招撫䕫州令㰱血為盟刻石柱為記事付之及令責招安小校云若夷人安集則賞否則部送闕下未幾夷人果就招安悉皆平定臣作益州嘗詢采戎瀘事體多云本處招安將甚有狡猾者平居無事則間諜夷人興起事緒意在差使招誘率皆遷延玩冦即所利甚多官吏乍到或上下䝉蔽不知其姦臣欲乞令本處兵官一面用兵威迫脇誅翦更須督責招安將用心招誘早令安集免致宿兵生事取進止臣以夷人作過雖不大其如西蜀久安若用兵多日恐别生事乞親平貝州慶厯七年十二月臣立朝最孤特蒙陛下㧞擢俾與大政内省叨冒何階論報今覩貝州妖賊嬰城已逾旬日近差明鎬往彼經度必應非久平定萬一更致遷延未即擒戮朝議以北都地重未欲令昌朝親去貝州處置軍事陛下若不以臣非才乞賜驅䇿上禀睿算庶幾早平妖孽况臣累經邉寄久在兵間理合請行不敢緘黙又臣以貝賊嬰城已逾半月遂不度愚懦輒敢請行少圖報効上寛宵旰伏䝉聖慈保全孤拙未賜允俞仰戴洪私感極以泣臣每見貝州事宜文字逐時與中書樞密同共商議從長施行遇假故不入偶有所見遂入劄子奏聞愚者千慮粗伸禆益如或更數日間未見平賊次第伏望采臣前奏如或可行只乞出自宸衷取進止臣先奏劄子䝉聖恩不令降出後日入對不敢面謝此劄子亦乞留中御書批答詔卿所乞往彼知卿報國忠孝恐比並中書宻院臣僚慮别有毁謗與卿不便文字不欲降出如有所見逐旋宻具奏聞徼納貝州宣勅慶厯八年閏正月臣昨奉差充河北宣撫使令臣自齎宣五道候到貝州相度合勾抽狄青替王信即發付上件宣命臣至貝州相度得更不勾抽狄青所有宣五道今欲送樞宻院收管毁抹取進止乞繼上奏封細陳事理慶厯八年臣讀唐史見白居易為翰林學士因事進諫語甚切直憲宗不悦謂宰相李絳曰白居易小子是朕㧞擢致名位而無禮於朕朕極難奈李絳對曰居易所以不避死亡之誅事無大小而必言者葢酬陛下㧞擢耳陛下欲開諫諍之路不宜阻居易之言憲宗曰卿言是也由是言多聴納臣以居易被憲宗㧞擢纔為學士能盡忠極諌以報恩遇而况臣非才寒進孤立無黨獨䝉陛下誤聴特力㧞擢位至宰相犬馬之誠堅於報主然自待罪兩府已逾二年畧無謀猷上禆神聖雖則日奉天顔常親黼座所奏覆者率多冗細事務常程文書徒煩睿聴無益治體以此為宰相職業真所謂素餐尸禄齪齪小謹而巳豈陳平所謂宰相者上佐天子理陰陽順四時外鎮撫四裔使卿大夫各得任其職之義乎房喬杜如晦唐之賢相太宗猶常責之曰公為宰相當須開耳目求訪賢哲有武藝謀畧才堪撫衆者任以邉事有經明徳修立性明悟者任以侍臣有明幹清慤處事公平者任以劇務有學通古今識達政術者任以治人此乃宰相之禆益也比聞聴受詞訟日不暇給安能助朕求賢哉斯言之責誠為至當臣毎侍丹扆累聞徳音常以求賢致治為切務推誠納諫為至徳臣愚不能上副聖意而陛下至仁未忍以大義責臣而臣獨不内愧於心乎臣復自念性本樸忠言多蹇拙幸得進對咫尺天威凡所敷陳或未詳盡臣嘗觀唐宰相趙憬奏章欲上書論事其畧曰稽顙丹陛仰對宸嚴蹇訥易窮遽數難辨理詳則塵凟頗甚言畧則利害不分切聞貞觀開元之際宰輔論事或多上書所兾獲盡情理時徳宗嘉納之今臣之愚猶憬之志此後有面陳口奏頃刻之間或蹇訥有所未盡事理有所未周即欲繼上奏封細陳理道上禆睿聖訪納之勤下盡㣲臣區區之藴因不敢妄陳偏見亦不乞留中不出惟兾聖慈特賜詳擇潞公文集卷十五
