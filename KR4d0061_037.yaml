body:
  text: 潞公文集卷三十七宋文彥博撰辭免免賜公使錢元祐五年六月臣準尚書省劄子三省同奉聖旨文某特依前任宰相支破添賜公使錢仍令河南府管勾支用者恭惟聖恩眷念老臣極為優異荷戴之深如負山嶽然自來前宰相知判州府則有犒設軍兵延待賔客以其本任不足故有添賜之名今臣以疲老蒙聖恩從請得遂休致間居西洛則無延客犒軍之理若授添賜極是無名臣必不敢祗受伏望聖慈許從寢罷又臣近蒙聖恩特依前任宰相例支破添賜公使錢臣以致仕退居里閭受賜無名乞行寢罷今準尚書省劄子奉聖旨不許辭免者然臣伏蒙聖慈矜憫羸老得遂退間優賜無名不可冒受必賜俞允河南府申狀西京留府右都廳準元祐五年六月四日尚書省劄子文某劄子奏近蒙聖恩特依前任宰相例支破添賜公使錢臣以致仕退居里閭受賜無名乞行寢罷今準尚書省劄子奉聖旨不許辭免者然臣伏蒙聖慈矜憫羸老得遂退間優賜無名不可冒受伏望聖慈必賜俞允謹奏六月四日三省同奉聖旨令河南府將所賜公使錢附本府公使庫收管應緣文某合用公使錢依例支用右劄河南府者右本府已帖公使庫照會去訖又辭免公使錢臣伏蒙聖恩依前宰相例支破添賜公使錢恭惟聖慈垂軫老臣至為優異然臣以受之無名又無前例即所賜自臣為始更啓後人之例殊不自安纍奏乞行寢罷今又準河南府公文奉聖旨令河南府將所賜文某公使錢附本府公使庫收管應緣文某合用公使錢依例支用者臣既遂休致即無合用公使授受之間誠為不便況臣間居逸老翛然自適乃聖恩所賜餘年恩禮至厚又菽水不欲纍于公私創開此例致後人攀援伏望聖恩必賜寢罷進奬諭詔劄子臣向以使侍中充樞密使到院後每嵗依例支公使錢三分之一嵗合支錢三千三百餘貫臣謂雖有舊例既無犒設所用終是無名竟不敢請纍章還納蒙先帝從允賜詔奬諭今具録進呈許免公使錢詔元祐五年據某省中書準樞密院劄子奏卿因進呈宗室公使錢文字嘗言樞密使帶節使不當例受公使錢今檢去年八月臣所奏劄子上進伏望許從寢罷事朕日則萬幾晨訪近輔而卿因録先朝之奏草載辭舊府之公錢乃謂在外則有犒軍之常在內則無享賔僚之事顧敢受于私意願悉還于縣官朕惟德盛者必約諸身計逺者必體于國故曾子輕楚人之富何慊義之所在汾陽佐藩市之求衆謂忠之尤至勉從嘉舉重集褒懷所請已從故兹詔示想冝知悉允詔勑省所劄子奏辭免依前宰相例支破添賜公使錢事具悉卿舊德元老弼亮四世勤勞帝室厥功茂焉朕咨謀始初復起自洛雍容大政亦粵四年惓惓告歸誠請莫奪朝廷推尊禮之意有司賦公飬之錢而屢剡忱辭重開後比惟授受之恤有亷高之風翛然燕居願無塵纍靜言審計義不忍違惇史善猷勿殊內外永綏眉壽朕有賴焉所請宜允答詔劄子臣伏蒙聖慈依臣所奏辭免支錫公使錢者厚賜無名固當避免大君有命得遂允從仍降詔音過加天奬捧承至重榮幸兼深臣無任辭免男恩命臣據西京進奏官李平狀申臣男貽慶除兵部郎中臣男及除集賢殿修撰聞命之初不遑啓處緣臣男各以解官持母服將欲服滿遽蒙朝廷特此優異除授退量忝竊實難克當俟四月從吉各令赴闕躬自陳免謹先具奏聞又臣于三月三十日伏覩進奏官李平狀申蒙朝恩特授臣男及集賢殿修撰臣以恩出望外難以克當即時具劄子奏免至今未蒙從允今月十一日蒙朝廷降到誥命必不敢承受兼臣男及亦自具狀陳免所有誥命已送河南府收掌伏望聖慈早賜從允伏候進止又右某近蒙聖恩特授臣男某集賢殿修撰尋具劄子陳免伏蒙特賜詔書不允者臣竊以恩命過恭懼不敢當纍具懇辭未蒙矜允恭承詔諭益重戰兢伏望聖慈俯從愚誠特賜寢罷兼臣男及亦再具狀陳免次又臣近纍具陳免聖恩除授臣男及集賢殿修撰恩命事伏蒙再賜詔書不允者切念臣向者起自退休再叨重任充位纍嵗訖無少補幸繄聖度再遂謝歸慙負厚恩自知無以塞責至于所得奏薦恩例皆不敢當即蒙矜許令仍以臣謝事無爵可加而使臣男及敘進職名復此忝冒實難祗受兼臣男已纍具辭免伏望聖慈深察至誠早賜寢罷取進止又臣男及持母服初除得遂西臺間局以便飬親極為優幸更蒙進職事出無名必不敢當伏望聖慈追寢進職之命必期得請又臣纍具狀陳免臣男及加集賢殿修撰恩命三奉詔書不許辭免屢煩訓諭恐懼不遑然義有未安不可輒已緣臣去嵗獲解重任再遂退休自以居位無補不敢更當自得恩例臣嘗懇辭皆獲俞允今者臣男及敘遷撰職復以臣致政無爵可加為名實非臣之素願所以不避冒瀆再三必祈寢罷伏望聖慈察臣懇欵特賜矜從又臣男及所進職名決不敢祗受俟臣男服除之後任以繁難年嵗之間稍有積效朝廷過推恩典謂之疇庸猶可恭授今即不然伏望聖慈特寢前命俾安愚分庶息人言臣無任瞻天候命惶懼之至又元祐五年十一月臣伏覩告命除臣男及集賢殿修撰知河陽者聖恩深厚感戴不勝切緣臣男已蒙假守藩郡私計便安極為僥幸不敢辭避所有加職之命不緣績效忝冒過優實難祗受他日若因繁難任使稍著勞效焉敢固辭伏望聖慈特許寢罷取進止臣男及已有奏狀辭免所加書殿之職伏望聖慈從允又臣以衰老致政居洛有子孫五人蒙朝廷優假並得西京差遣令便侍養臣以謂尸祿者過多遂乞臣第七男及便近州郡俾之宣勞以報後祿今蒙聖慈差知河陽并再除集賢殿修撰得郡既便加職難當尋奏乞辭免所加職名伏望聖慈未賜俞允臣以為因自乞郡仍加職名在于私誠實難當充伏望聖慈鑒其懇切許罷職名臣無任皇恐候命之至又右臣近具劄子奏免臣男及所加集賢殿修撰職名伏奉詔書不允者老臣無狀久忝厚恩愚子何知繼叨寵命既難虛受須至固辭伏蒙聖恩特降詔旨曲加敦諭未賜俞從仰戴聖慈不任感荷惶恐之至謹具奏謝臣男所加職名已别具劄子奏乞許賜寢罷又右臣以父子遭逢蒙朝廷擢用寵逾涯分理合再辭伏蒙薦降詔書未從所欲仰荷聖眷俯激愚𠂻臣無任惶悚之至又臣向以休致居洛子孫五人並除洛中差遣臣以尸祿者過多不遑啓處遂乞第七男及補郡自試尋蒙恩差知河陽并再除集賢殿修撰得郡已便加職難當尋再乞辭免職名疊蒙賜詔不允在臣父子之分尤不遑安伏望聖慈許罷職名必若年嵗之間治郡稍有成績或委繁難驅使朝廷因而推恩敢不祗受臣無任懇切之至取進止賜馬詔書元祐六年七月勑某省熙河蘭珉路奏據溫溪心差蕃部青宜賖囉阿角四以蕃書詣范育欲以騮􅀈􅀈馬一匹送與卿事惟我宗臣名震四裔遐荒僻壤知獻厥誠朕以張闕拒羌之獻不如旅獒昭德之致已勑邊吏答賜所直其馬今以賜卿至可領也故兹詔示想宜知悉奏狀右臣伏準今月三日蒙賜詔書以熙河蘭岷路奏據溫溪心差蕃部青宜賖囉阿角四以蕃書詣范育欲以騮􅀈􅀈馬一匹送與卿事已敕邊吏答賜所直其馬今以賜卿臣勘會舊例邊帥在任蕃人或有獻馬並以官物優答其直其馬納官臣今蒙聖恩以馬賜臣實恐有異故常特啓新例臣決不可受伏望聖慈特賜寢罷已行之命謹具奏聞賜到答詔勑某省所奏伏蒙詔書溫溪心欲以馬一匹送與卿以勑邊吏答賜所直其馬今以賜卿臣恐有異故常特啓新例伏望特寢已行之命事具悉種羌獻誠屬我大老雖異康侯蕃庶晝日三接以彰裴度勳德名聞四裔兹豈故常奚煩謙避所請宜不允熙河蘭岷路經略安撫使司公文準元祐六年七月二日樞密院劄子熙河蘭岷路經略司奏據溫溪心差蕃部青宜賖囉阿角四賫到蕃字稱溫溪心文字上告熙州經略使范龍圖東京有箇文相公自家如今獻送騮􅀈􅀈馬一匹告龍圖好生照管將馬疾早送與文相公去下本司看驗得係駼􅀈􅀈大九嵗已送蕃部司餵養伏乞朝廷詳酌指揮候敕旨三省樞密院同奉聖旨今范育依例佑價以物作朝廷指揮回答仍修寫蕃字送溫溪心馬以準朝廷指揮差人管押送與文相公去也所有馬仍令學士院降詔賜與文某今劄付權發遣熙河蘭岷路經略使直龍圖范朝奉指揮差人押送文太師交割準此右勘會本司近差管勾河州西原堡左班殿直李震管押拂林國般次赴闕己帖李震因便管押上件馬一匹赴致政太師衙送納去訖伏乞照會收管奏收臣以西藩溫溪心送馬一匹與臣蒙朝廷支賜馬價與溪心及蒙降詔賜馬與臣令熙河經略司報知溪心臣以事異故常不敢受賜奏乞將馬納官蒙再降詔書不允臣今以事小不敢頻有煩瀆依詔命祗受已别具表謝次潞公文集卷三十七
