body:
  text: 潞公文集巻三十二宋文彦博撰陳乞乞罷男機宜臣男宣徳郎守太子右賛善大夫管勾永興軍一路安撫使司機冝文字恭祖昨以臣被詔赴闕將帶隨行結絶本司文字今並已了畢欲乞依例隨本使罷任朝見歸班取進止臣男㳟祖慶厯中自鳯翔府僉判罷任赴闕臣方在政府首尾五年並不令就差遣今來忝升朝籍須逐日赴朝叅與百官同幕次恐渉謗議只欲令于審官院依例就一合入逺闕庶免逐日與移朝官相接合具奏知乞差使臣臣隨行合差指使三員臣昨丁母憂已發遣使臣兩員歸班今却差侍禁葛宗望殿直吕世良充隨行指使所有逐人各係合入親民羌使欲乞各理為親民羌使取進止其葛宗望吕世良並係充短使合入親民羌遣人數乞依例各支與大添支請受乞張熈恩澤臣昨丁母憂河南府差教練師張熈管勾墳營塟事首尾二年有餘幹事得力欲望朝廷量賜恩澤於本人牙職上遷補一資取進止乞郭宣恩澤臣有隨行教練使郭宣隨臣勾當近二十年有行止得力今者因臣忝恩移鎮欲望朝廷改補一三司大將名目且在臣處驅使取進止乞門客張度恩澤臣有門客教授張度累舉進士南省下第先于皇祐五年以臣奏薦䝉恩授試將作監主簿不理選限自後本人又曾鏁應省下今來兼係先朝皇祐二年明堂已前到省舉人合該免解欲望聖慈念其乆歴科塲家貧親老未霑寸禄乞補一三班差使名目量與減年轉補取進止請假劄子臣昨暫請服藥假兩日伏聞特降中使就臣私第傳宣撫問臣已于今月二十六日早赴樞宻院管勾本職公事訖謹具奏聞謹奏已具狀附傳宣中使奏謝去訖謝男貽慶換授文資及章服表元祐元年臣某言伏䝉聖恩除臣男供偹庫副使兼通事舍人同勾當軍頭引見司貽慶充奉議郎守尚書都官員外郎并賜緋魚袋者仍覩告詞謂老臣弼亮三世粗有微勤以愚息乞換文資特推寵命舉族知幸受恩若驚臣誠榮誠感頓首頓首切以朱紱身章文昌郎位皆為殊選悉畀非材仰戴丘山如臨淵谷此蓋伏遇陛下仁深育物道廣納荒既不棄于菲葑亦兼録于閥閲致茲䝉陋過有忝塵敢不嚴以教忠勤於從政力著涓微之效仰酬覆燾之私臣無任陳乞堂弟大同西京差遣臣先准勑于西京立家廟四室臣多在闕下守官或外守方面則西京常有子弟兩三人在彼守官以奉家廟四仲祭祀今以臣諸子並丁母憂解官持服並無子弟在西京守官奉祀今月臣親堂弟朝請郎大同近因相州僉判得替欲望聖慈乞差充西京一合入差遣所貴家廟嵗時得人奉祀取進止奏程珦葬事臣竊聞太中大夫致仕程珦身亡珦素履清介守分安貧乆歴外任皆有聲稱身沒之後家事索然只有一子程頥素藴學行見推士林向為邇英講官因縁經義開陳治體上資聖政今其父之亡窘于襄事伏望聖慈特賜矜憐優與賻恤以周其急伏候進止奏孫男扶掖臣有長孫男右通直郎永世自來每遇臣入殿扶掖近䝉恩除權發遣提舉三門白波輦運公事奉聖㫖令候扶掖了日朝辭今來本任闕官日乆春運是時及已差官管押牌印到京多日臣近有以次孫承事郎康世自西京來迎接臣到京欲乞令康世暫權扶掖替永世交割管勾赴任取進止奏富相公薨乞與免納馬價錢元豐六年十一月臣勘㑹武寧軍節度使行尚書左僕射同中書門下平章事鄭國公富某于今年閠六月二十二日因患身薨所有前後未納馬價錢見䝉省符催理今來任罷請受無可尅納謹具劄子奏聞伏望聖慈下有司依例特賜除放謹奏潞公文集巻三十二
