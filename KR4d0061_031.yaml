body:
  text: 潞公文集巻三十一宋文彦博撰進尚書孝經解臣伏以皇帝陛下間日御邇英閤令講官講尚書又閤之南壁張孝經圖出入觀覽有以見陛下祖述堯舜憲章文武以至徳要道孝治天下臣今輙於尚書諸篇録十篇及孝經諸章中節録六章進上以備禁中清閒之暇研䆒義味或時令講官節録䟽義進入上資聖徳稽古求治之意臣伏讀尚書序云孔子生於周末覩史籍之煩文懼覽之者不一遂乃討論墳典斷自唐虞以下訖于周舉其宏綱撮其機要典謨訓誥之文凡百篇所以恢宏至道示人主以軌範也帝王之制坦然明白以其上古之書謂之尚書然則後代聖帝明王莫不祖述寳為大訓恭以皇帝陛下聰明文思稽考古道日御邇英延訪經義方命講官講解尚書孜孜不倦所以聖徳日新比隆堯舜臣以叨侍經筵輙于尚書三十二篇采其切于資益聖治冝于重復温故者凡十篇録進篇别有後序所以發明本篇之大㫖所兾便于乙夜之觀堯典堯之聖徳蕩蕩難名而此篇極簡要亦仲尼舉宏綱撮機要之理如篇之所載者克明俊徳以親九族平章百姓恊和萬邦分命羲和典掌四時使民務農利用厚生允釐百工庶績咸熈斯皆後世聖帝明王所以祖述而模範之臨文而三復之故摘其目以叙之舜典虞舜之徳重華恊帝故列于二典後世作者雖三王之盛不可及已篇之所載命禹作司空而下至于四岳十二牧官得其人庶績咸治流放共工驩兠竄三苖殛鯀四凶人而天下咸服故曰舜有大功二十兹所以重華恊帝大禹謨禹稷臯陶共事舜帝君臣同寅咸有一徳故矢厥謨成厥功曰俞曰都乃君唱臣和之羙其謨則有后克艱厥后臣克艱厥臣罔滛于逸罔遊于樂任賢勿貳去邪勿疑罔咈百姓以從已欲斯皆上下交儆以成聖功舜禹之所以為聖帝明王以此臯陶臯陶曰允廸厥徳謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永禹拜昌言曰俞臯陶曰在知人在安民知人則哲能官人安民則惠黎民懐之臣以舜禹之時君臣謨議之恊恭後王所冝為法益稷此篇所載禹戒舜曰慎乃在位帝曰俞然禹言受其戒禹曰安汝止惟㡬惟康帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞帝庸作歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事惰哉帝拜曰俞臣謂斯言可為深戒伊訓篇云嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠惟上帝不常作善降之百祥作不善降之百殃臣以尹之斯言愛其君忠于國可謂至矣有臣如此時君固當尊禮其人信受其訓洪範天地之大法其類有九而敬用五事曰貌言視聼思兹乃人君尤當慎思之蓋人君言動則左右史書之為法不可不慎也故臣以此篇五事為重無逸此篇周公以戒成王曰君子所其無逸先知稼穡之艱難文王不敢盤于遊田以庶邦惟正之供自今嗣王其無滛于觀于逸于遊于田故成王服其訓戒乃為令王至唐開元中作無逸圖置于禁中出入省覽以為龜鑑臣亦嘗録此篇為圖以進以助聖覽伏望曲留睿意立政周公告于成王曰王左右常伯常任凖人自今立政其勿以憸人其惟吉士蓋有天下國家所切者任人得賢則治非賢則亂周官王曰若昔大猷制治于未亂保邦于未危唐虞稽古建官惟百夏商官倍亦克用乂明王立政不惟其官惟其人又戒庶官欽乃攸司慎乃出令以公滅私民其允懐推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱非其人惟爾不任成王稽古建官為治之本後之帝王所冝詳慎奏孝經圖事臣以官忝師保得侍邇英伏覩閤中有仁祖命學士蔡襄所書孝經圖張于南壁以便觀覽有以見仁祖孝徳在躬推廣以及天下恭以皇帝陛下天資聖徳行在孝經嘗聞令講官偹録經義進于禁中臣伏望陛下日省而時思之又進尚書二典義劄子臣伏覩尚書序曰仲尼討論墳典斷自唐虞以下訖于周所以堯舜二典為書之首篇垂世立教示人主以軌範帝王之制坦然明白可舉而行堯舜二典並云曰若稽古帝堯帝舜以謂二帝並能順考古道而行之乃知人主之聖必由稽古恭惟皇帝陛下日御經筵集講官説尚書蓋聰明文思稽考古道垂意于安天下之安天下幸甚臣以衰殘忝位保傅得侍經閣為幸已深又不自揆輙于二典之中采掇事義數條兼以訓傳或理有切近治體亦以愚短之議附之庶㡬粗有所補夫以齊之覇國而孟軻陳堯舜之道於齊王之前欲勉進之今臣遭堯舜之時陳堯舜之道固其宜矣臣愚不勝區區之誠謹録以上進堯典堯典曰乃命羲和欽若昊天敬授人時羲氏和氏世掌四時之官臣某曰王者尊居億兆之上所敬而畏者惟天為大故欽順之乃命官分職恭授民時分命羲仲宅嵎夷曰暘谷平秩東作宅居也東表之地稱嵎夷晹明也日出于谷而天下明故曰暘谷羲仲居東方之官平均次序東作之事以務也申命羲叔宅南交申重也言夏與春交治南方之官所居平秩南訛敬致訛化平秩南方化育之事敬行其教分命和仲宅西曰昧谷平秩西成昧冥也日入于谷而天下冥故曰昧谷居治西方之官掌秋之政萬物收成故平叙之以助成物申命和叔宅朔方平在朔易在察也北稱朔易謂嵗改易于北方平均在察其政以順天常臣某曰帝堯上以敬順天命下以恭授人時使此羲和氏之四人各居其方以布四時之令春序其農疇興作之功夏致其生物化育之事秋秩其百糓收成之宜冬察其一嵗豐儉之實使乆于職官修其方民變時雍庶績咸治帝乃命舜歴試諸艱舜典舜典曰欽哉欽哉惟刑之恤哉舜陳典刑之義勸天下使敬之敬之流共工于幽洲象恭㴞天足以惑世故流放之放驩兠于崇山黨于共工罪惡同竄三苖于三危三苗國名為諸侯號饕餮貪也殛鯀于羽山方命圯族績用不成殛竄放流皆誅也四罪而天下咸服舜曰咨四岳有能奮庸熈帝之載奮起庸功載事也訪于羣臣有能發其庸功廣堯之事者使宅百揆亮采惠疇亮采惠順也求其人使居百揆信立其功順其事者誰乎僉曰伯禹作司空僉皆也帝曰俞咨禹汝平水土惟時懋哉俞然也帝曰棄黎民阻饑汝后稷播時百糓衆人之難在于飢汝后稷播是百糓以濟之帝曰契百姓不親五品不遜五品謂五常遜順也汝作司徒敬敷五教在寛布五常之教帝曰臯陶蠻夷猾夏㓂賊姦宄猾亂也夏華戛也攻刼曰冦殺人曰賊在外曰姦在内曰宄汝作士五刑有服士理官也五刑墨劓剕宫大辟服從也言得輕重之中正帝曰疇若予工僉曰垂哉帝曰俞咨垂爾作共工帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞虞掌山澤之官帝曰咨四岳有能典朕三禮僉曰伯夷三禮天地人之禮也帝曰汝作秩宗主郊廟之官帝曰䕫命汝典樂教胄子胄長也謂元子以下至卿大夫子弟以歌蹈之舞之教長國子中和秪庸孝帝曰龍朕堲䜛説殄行震驚朕師堲疾殄絶震動也言我疾䜛説絶君子之行驚動我衆汝作納言出納朕命惟允納言喉舌之官聼下言納於上受上言宣於下必以信帝曰咨汝二十有二人禹契益伯夷䕫龍六人并四岳十二牧凡二十二人欽哉惟時亮天功各敬其職惟是乃能信立天下之功三載考績三考黜陟幽明三年有成可以考功九載則能否幽明有别黜退其幽者升進其明者庶績咸熈考績發明衆功皆廣臣某曰舜既紹堯熈帝之載以謂治天下者必先任人人有善惡必須審知故曰在知人在安民故曰知人則哲安民則惠黎民懐之苟不知人則賢愚善惡混淆不分葢善惡不可並用惡人道長則善人道消當須屏去姦惡可以登用善良故其始也先去四㓙而天下服然後咨詢岳牧而用禹稷臯䕫而下二十有二人天下大治又命龍作納言戒勑之曰朕堲䜛説殄行震驚朕師汝作納言夙夜出納朕命惟允䜛邪之人專在譛毁善良舜深疾之納言喉舌之官出納王命必在忠信故舜受命而切戒之隋唐以來納言之名不改隸門下省至于本朝頗循唐制以侍中為門下省官長侍郎為貳並為執政官所選益重必恊僉論又曰三載考績三考黜陟幽明古之任官必在于乆乆則有功可以考其績効故先朝之法省寺監官並以三年為一任循古之羙法也義當遵守如其籍才不次任用則難拘常制臣學術荒淺不足以發明但以狂言聖擇兾有少補潞公文集巻三十一
