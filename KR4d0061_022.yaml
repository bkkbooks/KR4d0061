body:
  text: 潞公文集巻二十二宋文彦博撰奏議論保馬熈寜六年諸州郡坊郭第四户縣郭第三等鄉村第二等以上户生計從容皆須養馬以代徒步之勞其物力高則養馬愈多此皆不待官中勸率召募固巳家有而户畜矣若先時更使等第畜馬定以匹數須壯嫩及格尺者居常任民乗騎出入嵗時亦不得勾㸃煩撓一旦官中須要給以元契之直可旦暮而集人自樂輸比之急暴而科買利害不侔矣以四等以上人户類出役錢所出役錢之多悉在上等人户今若蠲減上等租税則下等户所出不充頋役之用必見闕事民既知緩急必取馬於民安得不家牧户畜以應一日之督責哉丁産薄法以三嵗一造今非其時又頻嵗災傷民流徙者衆今若非時重造徒成搔擾若伺候至豐年行之未晩赴河陽陛辭日面奏陛下憂勤庶政切於致治乃尭舜用心更願陛下廣開言路兼采博納使下情上達收攬權綱無使權臣賣弄爵人於朝須協公議與衆共之任官令久於任候所職成敗明著而後賞罰用人當兼取羣材同濟時務若専任一才即朋黨膠固者希時而並進孤忠自立者望風而歛退更望法天地簡易之道守祖宗盈成之業使上下安静則不治而自治近時新進纎佞之人多是妄有更張興作以為進身之術陛下今不采納臣愚忠異時必當自驗臣惟望聖明早悟即天下之福臣今朝辭赴任方曕戀軒陛更無劄子進呈伏恐有本任指揮事乞賜聖㫖乞令諸路帥臣與副縂管同議邉事熈寧六年朝廷毎差諸路副縂管所降宣命指揮凡事並與都縂管商量施行訪聞近年以來逐路都縂管凡闗兵馬公事及邉防機宜多是於經畧司安撫司一面行遣副縂管皆不預聞况本路都縂管如有邉事須合出兵或不能自行即遣副都縂管領兵出入若本司公事及邉防機宜素不預聞臨事倉卒必不周詳復又不素假以事權臨時節制偏禆亦恐未甚仰服兼陜西諸路因康定中自鈴轄巳下分定將官訓練兵伍葢欲兵將相諳便於指蹤號令然副總管實副大帥盡䕶諸將不曾分作次第將官亦聞近年以來副總管亦分作第一將即與偏禆一等事體益輕尤為非便今欲下逐路經畧安撫使都總管凡兵馬公事及邉防機宜常須與副總管詳熟同議亦不得别作一將却與鈴轄都監等比所貴事體異於偏禆緩急倚以出兵可以節制諸將餘依前後宣命指揮仍務協和各副朝廷任使之意乞免夫役熈寧六年十一月臣檢會河陽逓年准勅差春夫赴鄭州榮澤原武等縣界開修河隄及去年差夫直赴開封府界白馬縣修隄功役地理遥逺人户供送褁費不易切縁本州諸縣人户累年併值水旱災傷民力疲困乞權免來年差往諸處春夫一次所貴民力不致失所謹具奏聞伏候進止又臣檢會河陽累據諸縣人户陳狀併值夏秋五料災傷乞免向去一料春夫州司體量得人人户即日委是大段疲困已三次奏乞朝廷體念特免向去一料春夫及先權住來年一年變修石岸一百步所貴稍寛民力兼臣檢會元初擘畫改稍木岸作石岸一宗文字所相度官亦無大段利害祇且畧依上言臣僚施行仍却於順水不向着歸岸每年變修一百步石岸顯是不至𦂳急所差夫采石却甚勞苦若權住一年極無妨礙兼臣於十一月十二月兩次被㫖赴濟源禱雪祈雪所過河陽濟源兩縣界以秋末至冬中久無雨雪田疇乾旱種麥全少况此兩縣在本州稍為富庶尚乃村落蕭然例有菜色若不减重役必不聊生以臣愚短固無仁恵可以下蘓疲瘵上寛宵旰惟是重叠力奏朝廷特賜體念矜恤伏乞檢詳本州前後三奏并臣今來劄子早降指揮取進止乞罷河北預頋車牛熈寧七年臣勘會本道所管八州内懐衛屬河北西路近累准西路轉運司牒准朝㫖逐將下合用大平車一百六十乗并牛畜於逐將所領軍馬住營州軍預令民間結保承認遇兵行日量支僱錢隨軍前去民間聞之將謂官軍不測便有舉動頗亦驚擾况河北人户例有車牛乃是民間日用之物兼逐將所須車牛其數不多緩急或僱或差旦暮可集不悞軍期乞更不須預令民間結保承認免致先有煩擾取進止澶魏博州三將合用車牛東路轉運司並不曾行下逐州必是別有擘劃亦恐民間煩擾若遇兵行於民間僱倩車牛人情不敢避免即未明所出車牛之家至時更合備人力隨行否此一事人情所憚如不用逐家人力隨行亦乞明降指揮乞免人户折變蠶鹽錢熈寧七年臣檢會近准大名府牒為人户今嵗大段災傷困乏其蠶鹽錢只乞特許並免折變合納見錢候向去豐熟却令依舊已於六月二十九日具劄子申奏去訖至此未奉聖㫖今又據懐衛州狀申逐縣人户各為災傷乞將蠶鹽錢送納本色見錢州司勘會今年夏税已係全放今體量得人户委係累年併值災傷貧困不易所有蠶鹽錢伏乞詳酌指揮者臣勘會上件逐州府人户委實大段災傷必是難以了納切慮别致逃移欲望朝廷檢詳臣前奏及今來懐衛州所申事理早賜指揮許將人户今年蠶鹽錢並免折變只令送納見錢候向去豐熟却令依舊折變所貴災傷貧民易為了納取進止乞體探西北遣使相過事熈寧七年臣見諸闗報探到事宜西人北虜遣使相過稍頻深虜奸謀詭計以利相誘牽制邉兵乞令河東經畧司麟府軍馬司専委火山知軍於下寨子常切體察西北遣人相過情狀取進止下寨子屬火山軍在西北兩界之中内殿崇班燕復是火山軍人有心力見在麟府守官可委之同察乞嚴誡河北安撫司探報事宜熈寧七年臣近累據雄霸州廣信安肅軍闗申到體探事宜並皆尋常閒慢事節兼久應驗今來北界既頻有生事不比常時乞朝廷嚴諭前項四州軍及沿邉安撫司精選勾當事人比舊日優與物入深體探務要的當事宜不悞邉防准備取進止論修樓櫓事熈寧八年河北平壤其城池樓櫓之設尤嚴於他道凡遣使行邉所以督責於守臣按察之吏者必先焉夫豈以有事整完無事則廢弛哉比者命安撫使以修完屬郡之城壁周相其摧壊褊狹將易而新之使士民有以容兵械有以施誠善矣苟慮事計材趣期會於嵗月之頃無不完者此固足以代守國之險而嚴禦戎之備也命方行而反令依倣制度造則熟材堆積葢藏於官舍之中以俟樓櫓之大壊而易之未見其利也北京樓櫓之當修者九百餘所凡八千餘間若欲概修於數月之間雖盡鳩天下之良工亦不可卒焉必就在次第而修作之舊材之中尚有可用者亦兼取焉然猶要之一二年僅可完矣今乃以成熟之材委積於虚閒之處敵來而后立患至而后興無乃不及於事乎今若據樓櫓見在區數内有痺下不及制度并欹側朽弊者計其數且修其半仍間隔一座折一座所費城上不至遽然空缺年嵗之間便得周遍完備神宗諮訪詔熈寧九年三月朝廷通好北國幾八十年近嵗以來生事彌甚代北之地素有定封而輒起釁端妄求理辨比敕官吏同加按行雖圖籍甚明而詭辭不服今横使復至意在必得朕以祖宗盟好之重固將優容敵情無厭勢恐未已萬一不測何以待之古之大政必詢故老卿夙懐忠義厯相三朝雖爾身在外乃心罔不在王室其思所以待遇之要禦備之方密具以聞朕將親覽付某臣於今月十日准入内供奉官裴昱至賜臣實封手詔一道詢及疆事令臣密具以聞臣今具手劄一道進呈答奏臣伏奉詔書詢及疆事臣以衰拙昏惷何足仰承聖問然以久當柄任䝉國恩深義激於中敢不罄露庶伸補報之萬一夫敵人之情貪利忘義從古以來載在書史者詳矣自真宗朝與通好所以息民幾八十年未甞犯順惟慶厯初乗我西事未弭故有邀求餌之而已當時載立誓書亦古尋盟之義也厯觀前代中國與四裔通好未有如今之悠久葢朝廷謹守信誓至雖瑣瑣細故亦不剏生變改是以敵人亦不敢輕有希求自數年前累來望理白溝館地及要拆去舖屋况誓書之中明載雄州所管白溝兩朝遵守已久且信誓之詞質於天地神祇吿於宗廟社稷此而可渝何以享國今蕭禧重來又决於雄州北亭交割禮物其意欲以雄州北亭為界其如誓書何誓書若不為慿即代北之地止以圖籍照驗宜其不以為據原其貪心亦因慶厯初西事未平之際求黄蒐之地朝廷容易棄與之又致今日妄有侵理誠如聖詔所謂虜情無厭勢恐未已臣亦慮因此妄起釁端聖意謂萬一不測何以待之臣以為中國御逺守信為上必以誓書為証彼將何詞以亢縱騁詭詞難奪正論臣又以事理度之事固有逆順理固有曲直順而直天必助之逆而曲人不與之若虜人不計曲直利害肆其貪狠犯順之心朝廷固已嚴於預備之要足食足兵堅完城壁保全人民以戰則勝以守則固止此而已臣又聞用兵之道兵應者勝不得已而用之此所以天必助之大抵中國之兵利在為主以主待客以逸待勞理必勝之亦應兵之道也臣伏詳詔書曰思所以待遇之要御備之方切料聖意慎於舉動尚慮發言盈廷各有異論或曰先發制人意在輕動或曰乗其未備襲取燕薊事不審處恐將噬臍非王師萬全之舉也伏願陛下垂意熟察之今朝廷分置將官整齊械器固得之矣然將校偏禆更須慎擇其人又河朔頻嵗饑荒粮餉用度窘乏尤索計置若兵連未解物力殫屈即誤金湯非粟而不守守尚不可况用兵出師而粮餉不給何以取濟國大事切要先事而辦乃無後艱至於不急煩費事須裁節在臣本道者亦當續次奏聞臣識淺才薄思慮不周伏望聖慈稍垂省覽寛其罪戾臣無任惶恐之至臣慮蕭禧之來亦議及白溝况白溝載於誓書明白河朔城壁非要害之處亦當且後之所貴専力於合修之處臣頓首上奏河北近西山州軍城壁未須添展枉勞民力葢萬一有事軍民皆出山寨不肯入城葢山寨之中易得薪水出入自便當時沮臣議者謂今之西山林木伐盡無險可恃本以山為險非在林木况巖谷之間戎馬必能散掠景徳間山寨之名至今頗有存者可以檢問潞公文集卷二十二
