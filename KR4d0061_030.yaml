body:
  text: 潞公文集巻三十宋文彦博撰奏議奏黄河事臣竊見朝廷指揮都水監令於黄河沙堤第四鋪開分水口分水入孫村口入故道以紓北流决溢墊溺之患水官以開第四鋪口恐水勢東流太猛下流舊堤乆廢未甚完固且於第三鋪閘口漸減水勢入孫村口入故道今開第三鋪口所減黄河水勢東行已甚湍急乞速降指揮下大名府并恩州督責上下官吏旦夕分頭赴河上照管横隄順水隄金新隄及二股河下靣恩州地分隄防並須完固勿令小有踈虞取進止奏賜儒行中庸篇并七條事太宗淳化三年二月詔以新印儒行中庸篇賜中書宻院兩制三舘御史中丞尚書丞郎給諫等人各一軸注先是御試進士日以儒行篇為論題帝意欲激勸士人敦修儒行故特命雕印至是首賜新及第舉人孫何等次及宰輔近臣䑓閣臣僚并銓司選人聖㫖諭令依此修身為治仍各於聼事所展掛終身遵奉之真宗太中祥符二年十一月帝作文武七條其文臣七條一曰清心謂平心待物不為喜怒愛憎之所遷則庶事自正二曰奉公謂公直㓗已則民自畏服三曰修徳謂以徳化人不必專尚威猛四曰責實謂專求實效勿競虚譽五曰勤察謂勤察民情勿使賦役不平刑罰不中六曰勸課謂勸諭下民勤於孝弟之行農桑之務七曰革弊謂求民疾苦而釐革之以賜京朝官任轉運使提㸃刑獄知州府軍監通判知縣者武臣七條一曰修身謂修飭其身士卒有所法則二曰守職謂不越其職侵撓州縣民政三曰公平謂均撫士卒無有偏四曰訓習謂教訓士卒勤習武藝五曰簡閱謂閱觀士卒識其勤惰勇怯六曰存恤謂安撫士卒甘苦皆同常使齊心無令失所七曰威嚴謂制馭士卒無使犯禁以賜節度使以下至刺史及諸司使以下任部署鈐轄知州軍縣監押駐泊廵撫者又以禮記儒行篇賜親民釐務文臣其幕職州縣官監務使臣仍並賜勑戒勵令崇文院刻板摹印送閣門分給之初帝謂宰臣曰群臣上殿者朕各以所職戒之漢制刺史以六條問事魏有五條晉有五條武臣有諸葛亮七戒朕作著辭思以朂勵諸臣又先朝嘗賜近臣儒行篇可并以賜之八年利州路轉運使臧奎請令諸道州府軍監縣以所賜七條刻石或書於公署之㕔壁從之臣伏覩先朝賜臣僚儒行中庸篇及文武臣七條所以激勵士大夫修飭行撿及中外臣僚謹奉官箴其出外任者朝辭日各賜一本仍令閤門丁寧宣諭凡在臣下靡不恭授而奉行慶厯中先朝以乆罷賜七條儒行中庸篇嘗降詔書申明然而後來臣僚乆不受賜無所警䇿至有士行不完進取無恥官守失職苟簡無功臣欲乞舉行此法依例於朝辭日閤門給賜及宣諭誡勵之臣愚以為敦奨士類鎮靜風俗激勸官吏治守忠亷斯乃為治之大本循致太平之道故敢竭此區區仰於宸聼庶禆聖政伏乞付外施行取進止臣昔任河東路轉運使每廵按部下州縣守令㕔事屏風並無書寫七條雖間有刻石者亦無幾又文字細暗難以朝夕披閲用為訓誡進故事十門元祐四年八月臣伏以皇帝陛下聰明文思嚮學求治間日御邇英接儒臣講經義順考古道聖徳日新臣得陪侍講筵實深慶幸今輙率愚筦之見於先朝所纂册府元龜中帝王門類内節録十門分為十巻上進以偹乙夜之觀庶㡬塵露之微粗禆聖徳臣不任區區之誠奏勤恤民隠事元祐五年五月臣於四月二十九日至西京見本京進奏官申狀録報皇帝太皇太后詔書以歴日災旱宿麥㡬盡秋稼未立上軫聖念引咎歸已特减常膳有以見聖心焦勞得堯湯罪已應天之義然臣尚在都下每見西來使命詢其雨澤稼穡次第多云近已得雨苖稼滋茂臣既出京到洛見縁路民田宿麥秋稼悉如聖詔所及深慮向去小民艱食即聚為寇盗伏望嚴勑監司覺察守令勤恤民隠勿致煩擾及督責廵檢縣尉屏除賊盗令境内清肅人戸安居救荒之政各在䆒心諸事預防庶無後患奏乆旱乞不追擾事元祐五年五月臣聞化國之日舒以長蓋不奪農時不妨民力故日力有餘而嵗收有望臣竊以自春以來時雨愆亢人情惶惶謂必艱食至今月八日大雨霶霈庶民鼓舞急於田事老㓜就功力穡有秋正在今日臣慮州縣親民之官不知農事之急以小小詞訟勾追證逮禁繫淹延至於隨司門留亦有拘繫頗防農作臣欲乞下諸路乆旱郡縣當此農事急切之時民間小可詞訟爭闘一切且罷追擾除事干人命及刼賊急切公事即依常施行奏西邊事元祐六年八月臣近得趙卨書云金城疆界未定止縁新壘侵占稍多虜情未易棄捨至今遷延若非朝廷堅守大信終始覊縻必恐再開邊隙民力豈易堪邪臣又見卨之奏草云宥州累牒稱蘭州等處將自來無人守把城寨設計暗差人騎守把却稱是元豐年修築乃是昏頼之詞騐此南界邊官不欲夏國與朝廷通好况延州是自來有事計㑹之所今又一向就利自黨此等事情何處分雪若又一向固拒全不聼采夏國亦慮難盡臣子之節今來賊意已窮兼稱無處分雪必恐作過此隙一開邊吏邀功之人乗間盗利冐昧朝廷恩彼誠自甘其心生靈何所負耶臣重惜朝廷頓累年恩信一旦爭尺寸之利而失安邊之大計臣詳趙卨之奏甚切亦恐邊吏爭小利以邀功賞為國生事臣伏覩二聖臨御以來威撫逺人皆得其心邊境不聳中夏安寧今來夏國有此赴訴趙卨又有奏陳臣雖未知其詳伏望令三省熟計而審處之若事未明白未能便决定可否聞且令趙卨徐報之如唐郭元振之答土畨論欽陵之請無直塞其來意且為計以緩之使其惡意不得頓萌亦御戎之中䇿也臣又料此賊計見朝廷以其恭順不疑其心自去冬今春以邊儲有限直罷西邊戍兵數萬即謂邊偹已觧恐乗此作過臣以為不得不過慮也謹具奏聞潞公文集巻三十
