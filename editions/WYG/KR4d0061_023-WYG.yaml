body:
  text: 潞公文集卷二十三宋文彦博撰奏議言運河熈寧九年臣勘會自去年秋於衛州界王供埽次下開舊沙河取黄河行運欲通江淮舟楫徹於北河極邉自今年春開口放水後來漲落不定所有舟栰多是輕載官船木栰其數至少瀕河官吏至於衆人無不知其有害無利枉費功料極多臣勘合所開運河在臣部内兼御河穿北京城中過始初猶未審知開置仔細今即目覩利害所繫甚大苟雷同緘黙年嵗間必須破壊却御河久來行運至公私受弊乃是臣坐觀而不言之罪臣按御河上源止是百門泉水其勢壯猛相次至衛州以下可勝三四百斛之舟四時行運未嘗阻滯公私為利其河道大小亦如蔡河之類其隄防不至高厚亦無水患今來取黄河水入御河大則吞納不得必至决溢小則緩慢淺澁必至淤澱却河道凡上下千餘里必難嵗嵗開淘此必然之理據本府通判并諸縣申檢視到御河因透入黄河水淤澱處甚多今來冬初已見淤澱却河道阻滯舟船處甚多若謂通江淮之運即益見其有害無利自江浙淮汴入黄河順流而下又合於御河計每處所運江淮之物必不能過一百萬斛臣勘會前年自汴入黄河運粳米二十二萬五百餘石至北京下卸據押茶綱供奉范九臯稱九月一日到運河口為淺澁無水住滯數日遂至黄河順流下至北京馬陵渡般卸茶入城水路快便早得了當止用錢四千五百四十餘貫和僱車乗搬至城中臨御河倉貯納若搬一百萬斛至北京只計陸脚錢一萬五六千貫若却要於御河裝船搬赴沿邉無所不可用力不多所費極少臣勘會得開運河口并置閘口去秋至今年四月終已役過一百一十四萬六千餘工五月後至冬閘口所用人工不在此數自今年正月後至九月終已使過物料一百二十餘萬錢粮計七萬七千餘萬貫石十月後至閉口所費物料不在此數又特置河清兵士六百人每嵗衣粮約用二萬七八千貫石匹兩所置河清六百人乃云諸埽各取七人可充六百之數諸埽即未銷添填此乃欺誕之語如七人是諸埽額外剰數即便合省罷减得嵗費衣粮諸埽既是缺人相次便須添填其六百人終是剏増請受只要時下欺誑又稱費用物料全類汴口毎嵗所要稍草樁橛竹索就小計之合用百餘萬數假使黄河入御河無决溢淤澱之患毎年搬得及一百萬石其費與順河而下至北京止費脚錢一萬五六千貫搬至御河其利害明白可見臣又勘會去年冬都水外監丞更擘劃於北京黄河新堤第四埽第五舖開置水口放水入御河以通行運此䇿尤為乖踈其所欲置口處乃是熈寧四年秋河下注御河之處是時朝廷選差近臣并判水監官督役修塞所費不貲僅能閉塞大名恩兾之人被害尤甚以至回移人使驛亭道路迄今瘡痍未平今又建言欲於其處開置閘口道黄河水入御河都水監差官計會轉運司并大名兩通判同詣第四埽相視衆皆知其不可然不敢斥言其害恐忤建謀之官止是遷延之計囘報水監云候修御河隄防完固方議開置河口况從來御河隄防宛入蔡河之類若欲吞納河水須至於汴岸増修猶恐不能制畜葢地勢傾瀉為害不細瀕河州縣之人為未見定議至今憂恐及朝廷委清强官相視利害早令議定可否庶使人户安居取進止又臣以開引黄河透御河不便已具劄子開陳切以今水監之官尤為不職皆不熟計利害容易建言惟望僥倖恩賞多從其請便為主張中外雖知其非不敢異議以避沮害之責事若不效建言之人都無譴罰如前時兩議清汴已有勞費並無成功朝廷置而不問范子竒乞冬月不閉汴口是年汴水蹙凌上下救䕶晝夜打凌不勝寒苦終致府界蹙破汴岸止是夏秋水大容有决溢之理即未甞有冬深决溢之患後來朝㫖却令冬前閉口顯是因不閉汴口致蹙凌壊堤當是止罪縣界隄防之官而子竒全不責問仍不害其進用士論不平無如之何臣謂今之水官更當澄清慎擇况朝廷物力未豐不當更容狂妄之人横費生民膏血伏望聖慈垂察不保明濬河第一熈寧九年臣本司准都水監牒保明范子淵乞酬奬濬川功効尋㸃勘所取到逐州縣地分河水漲溢及後來减退事狀即與范子淵所奏稍異難議雷同保明巳别具本司奏訖臣詳濬川司所濬河身始末盡在水底深淺固難詳騐又只慿本司使所轄河埽使臣及都大提舉官供析保明至於所屬州縣亦望風畏憚不敢異議欲乞今後濬川司所濬河道别差不干碍公正敢言臣僚覆行定騐所貴不誤朝廷行賞不保明濬河第二范子淵所奏去年濬川退出分數地土今年夏末又却多渰浸了其去年用杷疏濬退出地少今年不曽用􅐡却退出地多顯是自因秋深河水減退故本司不敢扶同保明况濬川司所置官屬頗多占破人船不少别司官心知利害率不敢言言之必以為沮害功利故且緘黙人情如此恐非朝廷之福臣今因都水監牒要保明方敢依實公言伏乞朝廷詳察不保明濬川第三臣昨奉聖㫖令保明濬川司疏濬過河事尋取責逐地分州縣的實事狀並皆不同及為疏濬過處其河水次年却依舊泛溢渰浸民田兼次年不曽用杷却亦水退即河水長落决不由杷之疏濬雖河瀕至愚之人悉皆曉知所以臣不敢雷同保明及為衛州剏開運河不便亦具奏聞縁此事理備見水官不職枉費才力兼多是狂妄希賞只如所開運河云有五利其一曰綱運出汴對過沙河免涉大河風濤之險且汴口在河陽界内沙河口在衛州王供埽下自出汴口由黄河下水相去尚近百里豈是出汴對過沙河既通徳博舟運亦可免得數百里大河之險且沙河口在衛州西南徳博在大名東北上下相去遼逺即與沙河水陸道路都不相干不知因何免得數百里大河之險只圖朝廷聴信遂興力役乞朝廷詰問水監官即見虛實猶恐飾詐即乞將水監官所陳事狀付臣容臣子細開折聞奏臣自再到大名有水監官輕妄擘畫河事甚多如欲决黄河大小吳埽地放水淤田及欲於嵬固下埽開直河并放清水如此等情猶頼定奪官力議罷之不爾即為害不細所以乞慎擇水官望朝廷垂察奏黄河水勢臣本司於七月九日據衛州申管勾運河於良弼申今月四日沙河水漲沬過上東水偃尋下牐板攔絶不住沫過牐板透入運河行流本司為今六月七日大名府御河連倂添漲日夕救䕶僅免决溢尋牒衛州火急閉塞牐口續據衛州申尋捲埽於上東水口閉塞了當有些小津漏見劄填次本司為穿府城水大闗梁下不通舟船切慮運河牐口依前固䕶不定透黄河水入御河即為害不細已奏乞指揮都水監速差官就運河牐口固䕶今月十九日却據澶州申據臨河縣申十七日午時詣遥堤上巡覩見水自西南來波浪𦂳急問得人民言説衛州樊店西黄河口决一概水東北行流十六日夜二更以來到本縣衝注二十餘疃人户觀此水勢及民間所説為害不細縣司已急於沿河差船令佐親監轄救渡人命去訖又據衛州黎陽縣申今月十五日御河水渾濃漲猛水色與别日不同認是黄河漲溢沬岸通流入御河至三更御河水一沬出兩岸見今北來將及南門本縣令佐都監即是救應隄口城門至十六日南門西門堤口節次破决水頭一併向城流注遮塞不定遂𦂳切一向固䕶城壁官物者本司即時火急再行文字轉指揮府城以上縣鎮官吏嚴切固䕶隄防如水勢大必不可防遏即令本地分官吏究心詳審計較利害相度踏行有自來分減水勢舊河道處即便火急開决分減水勢無致奔衝直向府城為害去訖伏乞更賜指揮都水監選委公心知河事官赴衛州相度調集人兵物料固䕶隄防取進止今據衛州十四日狀申水勢沫過埽背於運河上約後行流救䕶不定及稱河勢危急處係運河上約衛州屬河北西路仍乞下西路轉運司疾速應付人兵物料再奏運河利害熈寧十年臣於去年冬奏衛州王供埽下開堤取黄河水作運河置閘引水入御河深為不便以為大則决溢小則淤澱尋聞差官定奪利害今來果致黄河水入運河防遏不住沫過閘口衝注下流州府縣鎮為患甚大切慮定奪所未知得今來運河之害乞指揮定奪所下衛州及大名路安撫司取索自七月四日及十四日後來申報决溢一宗文字㸔詳定奪潞公文集卷二十三
