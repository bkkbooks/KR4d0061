body:
  text: 潞公文集巻十宋文彦博撰表啟謝奏陳濬河等事不當特放罪表北京臣某言今月三日准中書劄子以臣奏陳濬河事不當奉聖㫖特放者自天有命跼地無容恩厚如春感極以涕臣某中謝臣忝縁薄藝蚤㑹熈辰被任最隆舉時鮮比竭忠圖報始思謝國之深析理乖方終致論事之過既從吏議合置嚴科仰荷聖慈特從善貸斯葢伏遇皇帝陛下堯仁廣被漢度兼容寛假老臣矜憐舊物敢不氷淵在慮益慎於所為山岳戴恩尚期於有補謝男貽慶換授文資及章服表元祐元年臣某言伏䝉聖恩除臣男供偹庫副使兼通事舍人同勾當軍頭引見司貽慶充奉議郎尚書都官員外郎并賜緋魚袋者仍覩吿詞謂臣弼亮三世粗有㣲勤以愚乞換文資特擢寵命舉族知幸受恩若驚臣某中謝竊以朱紱身章文昌郎位皆為殊選悉禆非才仰戴邱山如臨淵谷此葢伏遇陛下仁深育物道廣納荒既不棄於葑菲亦兼録於閥閲致兹䝉陋過有忝塵敢不嚴以效忠勤於從政力著涓埃之効仰酬覆幬之私溫卷啓某啓近者輒貢荒蕪仰塵藻鑒飾倭傀之鬼强見於南威崇培塿之邱敢希於東嶽葢非知量是謂黷尊在愧靦以良多實尤戾之莫逭必謂對咸池之下罔聽庸音投苦海之中姑務大噱豈意某官不遺末學特録下材雖則賦謝太沖獲張司空之歎賞文慚僧孺得韓吏部之振揚剪拂增榮頋盻倍價重念某悛悛甚鄙碌碌非能至於窺闕里之崇墉跂龍門之峻坂實霄壤之有隔亦秦越之甚遙抑又安世當年未識車中之半面鬷蔑此際亦無堂下之一言幸䝉某官靡間孱㣲俯加誘掖方愧仲由之率爾無所取材寧期夫子之循然不與其退何兹善遇允謂非常固當益勵於進修所兾不辜於賁奬銘肌刻骨敢忘咳唾之恩墮膽抽腸少謝羽翼之賜過此以往未知所裁又恭惟某官地紀英儲天章毓瑞藹蘭猷而遠馥韜玉徳以中溫王沖早顯於貴逰荀羨果膺於禁選標儀秀徹固巖瞻之允歸衿度淵閎豈蠡測之能際寵崇八柱望峻十連練達兵機動資於雅掾登降帝右日奉於咫威綺紈無簡貴之矜竹素有游藏之好詞庭掞藻俊域飛英加以精鑒外融靈機内照雲覩雅推於世範月評素擅於談宗冠葢風趨日有龍門之讌纓縷輻凑比聞烏巷之游增戚里之光輝聳名流之欽挹以故漢閨羣彦咸跂踵而願交魯掖諸生皆曳裾而請見若某者才局素淺志尚非高矧䝉濁以裝懐復惷𠖇而成性食金致誚負乘貽譏遠謝子綸非清平之佳士近慚佛助無艶發之英才徒以甫在髫齡便從庭學彫蟲事巧敢逭壯夫之羞竊牘工文無顧偶年之忌録廢牋而且廣補購篋以厪全蘭成射策之年始遊天邑賈誼登朝之嵗獲預賢書幸齒諸公之間職由談者之誤萬塗争騖效駑駕而雖勤六組齊驅盤蟻封而遂困既中罹於擯衂故益事於研修常稽七激之文用廣日新之業今者國家飾一封之馳傳總六服以搜材家家之璧充懐俱求善價紛紛之抱亘道歴贄名卿伏遇某官與進下流曲成㣲品輒隂漫於許刺思仰簉於魯堂儻録謏材特充外素雖未遷於幸舍詎敢恃於蒯緱所兾盼睞生輝翦拂增價麝性雖烈獲登范氏之香銓李味不甘亦預唐賢之果録捐軀有報指水可旌數日前曾贄蕪編上塵藻鑒美芹快炙實自享之過豊藏疾納汚諒曲容而無忤惟干犯之為戾在啟處而靡遑蘂茹之懐􅭪焉如失上知南京晏侍郎啟伏念逖阻藩房迅更時籥青綸猥𨽻方類於窘拘絳幰前騶寖踈於望拜仰瞻熒座俯鬱丹衷恭惟某官雅望冠時清談鎮俗丕賛景炎之運懋宣寅亮之功越在夙齡親逢聖旦照蜺光於近署騰褭足於夷塗代邸方開早協諮謀之選周儲肇建復膺調䕶之求六飛嗣止於宸居一徳弼成於睿化民瞻允屬帝簡滋隆亟遷内相之榮旋領中樞之重導揚基命罄敷將順之規獻納嘉猷顯著彌綸之績矧平䑓之近輔實興王之創封妙簡皇僚謹司留籥契君陳之分正尹兹東郊紹申伯之於宣式是南國行聞圭覲拱竢節趨入調伊鼎之和克協傅梅之用舉斯含植咸切傾祈某嚮侍庭闈幸闚幕府仰鈴齋之秘邃猥預階升晞文席之峻嚴曲容隅坐被尊光之委照寛䝉凟之深尤元冲术參無補狄籠之闕曾晳父子並依邱仞之崇銘琢厚恩鋪完充革未路亟嬰於隨牒俶城遽邈於圖居屬罕遘於飛郵仍久乖於奏記惟増蘂茹若在薄深仲呂戒辰長嬴首序伏兾仰縁宗社善保寢興尹氏秉鈞克永維毗之寄樊侯賦政益崇明哲之資謝陳龍圖諫議惠渚宫集啟代人作伏䝉龍圖諫議特賜手書兼辱貺所著渚宮新編二策者發青泥之封捧緗袠之卷得璠璵之秘寳識愧郢人奏韶武之大音聴慚俚耳仰䝉恩頋伏積怔營竊以楚謠漢風宗淡雅而尚質魏製晉造漸辯鹿以彌文代􅑤寖更情忘逾廣自匪紛披盛藻管綜衆流達三變形似之言軼七子殊軒之迹則何以陪金閨之士宣美於當年儷平䑓之蹤貽範於來葉恭惟某官帝宮甍棟清廟光輝懐器望以幹時厲風猷而軌俗學臻靈匱該冡璧以採珍文掞神庭浹龜沙而流譽親逢清運登踐紫階蘊輯寧幹翼之才未施於柄用禁宻圖書之職式邇於帝暉所以出觀陜服之風坐鎮漢陽之地賴恢崇於遠畧永覊制於四陲頃以掌命西垣建麾南郡肅政治以多暇因紀詠以立言俄及嵗時積成篇卷垂諸不朽比峴山而名高競以相傳致洛都之紙貴乃纓紳之圭臬述作之龜枚豈謂猥見暗投俾之窮覽與尺題而狎至并覺恩榮㑹羣俊以討論少明宗致奏議納忠而款至賛頌美徳以雍容序引紀事以精􅀈風什縁情而妍麗貽之千載勒成一家誚陸氏之蓬山終多蕪累探張融之玉海徒美名稱永秘緹緗用資稟學某庸虛有素鑒局無聞適沐聖風偶塵官牒𨽻曲䑓而引籍守㣲國以於宣雖務勉修尚多於秕政惟虞刺舉莫遏於謠言豈謂龍圖忘禮秩之殊垂提奬之徳惠之珍牘貺以高文而復上列天朝敷聞宸聴丹雘致飾期修蟠木之容刻畫為功欲掩偻傀之醜鏤肌膚而不㓕摩頂踵以難酬伏限城守不果躬詣門地卑情伏增悚感依詠真切知歸之至知秦州謝兩府啟伏奉勅差知秦州已於某月某日到任者古秦之封中夏為蔽久所擇守難其得人自慚拙愚寖服華寵出涖邊絶訖無勲勤敢希上恩乃俾易地即政之始觀風有殊山川曠夷𦍑漢叢會俗尚不一師屯且繁邇復拓固封圻建宅城堡守備之戒當有遠謀事役之興劇於他道所任益重非䝉克堪葢遇某官協亮天工搃持政柄慎牧師之選切方面之安啟言至公汲用平進謹精措置勉罄樸忠圖靖塞虞講求民理庶幾修職無玷於人潞公文集卷十
