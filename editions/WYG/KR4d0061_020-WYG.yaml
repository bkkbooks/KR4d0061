body:
  text: 潞公文集卷二十宋文彦博撰奏議言青苗錢熈寧四年臣位忝三公職當論道事有所聞深虧聖政黙而不言則上負陛下眷倚之重近日以來中外喧傳以諸路散青苗錢深為不便臣比不知本末今訪知其由深可驚駭不近人情有玷聖化無甚於此臣謂此事豈可不達聖聪皆云朝廷主張及諸路所差之官承稟風㫖威福州郡故無有敢言於朝廷者臣會見河北轉運司牒聞折提舉常平官約束條目云所散青苗錢每十户以上結成一保須第三等以上有物力户充甲頭此乃是恐向去收納不足勒令上户填納又欲散與坊郭人户其錢不得過抵當家業所直價錢之半且謂之青苗錢却攴與坊郭户皆是廣圖利息不頋道理兹豈常平散歛之舊法朝廷救濟之本意此法於鄉村之民行之惟舊夏秋成熟折還斛㪷絲帛即謂之舉放若祇今納本利見錢即謂之課錢將新抵舊遷延嵗時諸般折還未嘗了足以其利債負官司不許受理今乃官自為之從古以來未嘗有此豈當聖朝而行此法殊乖理道况聞鄉縣之民有窮迫之甚者即皆願請錢一時聊濟窘急向去必難填償此乃下民從來常態州縣既以逋欠必從散行催督追呼笞責何所不至兼聞諸路州縣之民猶有積欠租税貸粮并預支紬絹錢數甚多將來一并催納何由取濟所散官錢又成積欠提舉之官徼兾旌賞務成功利剥下媚上何恤於人州縣承風不敢申理臣恐縁此煩擾必致興起事端所有提舉官乞下本路勘驗事件狀特行朝典以戒非理聚歛之臣書曰商鑒不逺在夏后之世臣不敢以逺事證之且以唐開元末用宇文融楊慎矜王鉷等二十餘人建中初用趙賛陳京之策百萬褎歛剥下害民歸怨於上當時執政議臣以奸佞結黨専財利媚上方被寵信不敢指言其非惟張説陸贄苦言之不䝉聴納仍遭疎斥馴致禄山涇師之亂鮮不由斯禮云與其有聚歛之臣寧有盜臣信不誣矣方今朝廷清明表裏無事以天下之廣財賦所入比之􅖤符以前其増有及倍者亦可謂無遺利矣若以用度稍乏自當减節冗費省罷不急之務不作無益之事濟之以儉示民不奢百姓自足君孰與不足易曰節以制度不傷財不害民此之謂也夫與治同道罔不興與亂同事罔不亡陛下視開元之末與建中之初所用宇文融楊慎矜趙賛陳京之法治之道邪亂之事邪兹固不言可知誠可為聖朝之商鑒近時以來中外臣僚上言興利者甚衆大抵希時倖進妄作者多徒自紛紜必寡成事伏願一切罷之惟内外計臣尤須慎選州縣長吏得忠厚亷良之人䑓閣近臣無憸邪朋黨之士則不治自治太平可期陛下可以垂衣端拱而化成矣臣愚不識忌諱發於至誠昧冒以聞伏增惶懼隕越之至言市易熈寧四年臣近因赴相國寺行香見市易於御街東廊置义子數十間前後積累果實逐日差官就彼監賣分取牙利且果蓏之微錐刀是競竭澤専利所得無幾徒損大國之體祇歛小民之怨遺秉滯穂寡婦何資况宻邇都亭北使所館豈無覘國之智將為外人所輕伏乞嚴勅有司趣令停罷使毫末餘利均及下民恵澤分沾必召和氣取進止又臣近言市易司於御街東廊設义子差官監賣果實分取牙利損大國之體歛小民之怨乞行寢罷至今涉旬未聞施行亦不䝉詢詰未審聖意以為何如退省僣狂伏增惶懼臣竊慮陛下以其事小故不足恤而臣愚以為所損甚大决不可為區區盡言葢由於此且京邑翼翼四方取則魏闕之下治象所觀今乃官作賈區公取牙利古所謂理財正辭者豈若是之瑣屑乎周官泉府歛市之不售貨之滯於民用以待不時而買者各從其故價亦不如是之規利也凡衣冠之家網利於市搢紳清議衆所不容豈有堂堂大國皇皇求利而不為物論所非者乎斯乃龍斷之事孟軻恥之臣亦恥之復不忍聚歛小臣希進妄作侵漁貧下上玷朝廷不勝憤悶輒致屢言伏望聖慈俯垂詳擇若以臣言非當甘從誅責言洮河熈寧四年臣竊聞議論欲至來春進築河州漸恢逺畧臣竊思之以為未可葢熈州初城猶未完固西畨内附尚要撫綏積粟未豐屯兵雖衆未宜多事恐累成功臣以為且須增固熈城使有保民之利安存畨部彌堅向漢之心倉廩豐盈士馬壯健以守則固以戰則强根本既深枝葉自茂然後洮河之役可以指頋而就今欲務速臣竊深憂古人謂欲速則不達見小利則大事不成又云勞於服逺不若修近斯言可鑒在理必然夫趨時希㫖人之甚利犯顔違意人之甚害中人之情鮮不為利多是頋身謀而諂説豈肯為國計而危言臣所待罪之所地兼將相若括囊無言仰屋竊嘆辜祖宗之奬擢負陛下之倚任是敢因事極論違衆立議庶幾萬一有補涓毫陛下以臣為納忠報國幸賜采擇以臣為害成沮事甘俟誅夷臣無任惶恐隕越之至謹具奏聞奏降𦍑事熈寧四年李憲到臣處具説趙卨為降羌去住事有所未便者臣以朝廷務推恩信不使一物失所許其去留自便如天地之大曠然無間在於人情必當感悦書之史册固為盛事更復何疑但令帥臣分明曉諭羣羌知朝廷恩意欲去欲住各從其願於理甚安不當改易前命若但令只詢問去年正月以來捉降到西羌尤為簡便為連日節假并宴未及面奏伏慮遲延先具此奏聞候至六日與中書同呈文字次環慶等路皆不云未便必恐巳行前命兼河東經畧司奏捉到易浪昇結願歸夏國已牒宥州去訖又云結勝却不願歸西界亦當不須强遣皆如朝廷指揮言修中太一宮熈寧四年臣伏見修建太一宮為民祈福臣聞太一天神之貴者天道貴質凡所營繕謂宜簡質不務雕鏤之巧不事金碧之華不重費不太勞不日成之明神安之䖍潔之誠内充天人之心交感神應之福其理必然臣又見累年以來禁中營造不已般運木石鳩集丁匠殆無虛日既有専切提舉修内司復置都大提舉内中修造司誠恐所司各以宏麗取悦上心一作未畢一作復興新舊相形不極不已國財民力豈易支供臣伏見陛下督責水官以利農畆必思夏禹卑宮室盡力乎溝洫勵精庶政勤恤民隐必思漢文罷露臺思百家之産臣伏願陛下亟勅中外應不急營造一切權罷即國用無窮民力稍寛臣又見繼聖堂祖宗燕射之地今為造弩樁所運斧斤置鑪鍛喧煩䙝凟理恐非宜詩云維桑與梓必恭敬止况祖宗之舊跡乎欲乞將置造弩樁移置他所或歸之有司則重明麗正之廷加之嚴潔奉先思孝之地益以光顯臣職在樞院主調兵匠官忝論思義當獻納區區之誠伏望采擇論本朝兵政熈寧四年臣向因進對䝉詢及㸃民兵利害臣與吳充即時畧具大㫖上對然而天威之下頃刻之間固未詳悉臣退而復思自陛下臨御以來焦勞庶政以兵者大事尤所垂意三四年前樞密院檢録得開寳初至治平中内外兵馬大數頗甚詳備遂議酌中定為永額比至道前即差多方慶厯中即頗减内壯根本外䕶邉陲去冗留精適用損費蒐補訓練皆有條理又以三路隣於羌敵即有屬户蕃兵弓箭手之類以至次邉州軍盡置義勇緩急調發以應征防若守將處之得宜經久必無闕事兼向時諸路郡縣額外増置弓箭手亦欲防虞盜賊如此紀綱臣以為深協方今之宜頗得預備之理設有未至或有廢墜即當彌縫振舉之可也恭惟太祖太宗之定天下也止用此兵真宗仁宗英宗之守天下也亦用此兵累聖相承而無異人厯年彌久而無異法故臣以為協當今之宜得預備之理有未至而廢墜者彌縫振舉之可也今陛下以睿聖之徳承祖宗隆盛之業中原之人不識兵戈者幾百年厯觀前古致治未有如此之安且久也故生齒繁多逾於二漢封疆廣逺過於三代所謂民不改聚地不改闢施之仁政而不煩擾之則太平之效又何如焉陛下必欲舍此而别求治道以致太平更易兵制以張威武固非臣愚所及况臣備位樞府所主惟兵不能上副盛意委曲經畫尸禄之責所不敢逃伏望聖慈察臣前後累上章奏聴解樞機之重柄并還將相之印綬得以散秩俾守外郡從愚臣知止之分全朝廷退人之理臣不勝大幸然臣久䝉天地之恩敢効犬馬之報竊謂兵民猶水水能載舟亦能覆舟禁暴戢兵武之七徳不戢自焚自古所戒凡更制維御之方深願慎之重之區區之誠庶補萬一冒犯宸聴臣不任隕越惶懼之至潞公文集卷二十
