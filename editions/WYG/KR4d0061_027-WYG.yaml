body:
  text: 潞公文集巻二十七宋文彦博撰奏議論監牧元祐元年臣竊以修復馬監指准今東西兩路支配不盡保馬所差之官今遍陜西河東京東西兩路相度卒未見了當乞令速且取索京東西兩路支配外見存馬數并沙苑馬約度可置得㡬坊監先次於近便舊有坊監處興置所貴早見就緒兼免保馬乆在民間頗有搔擾取進止又今已新復馬監切見光禄大夫新差知潞州崔台符熟知馬政勘㑹相州有安陽兩馬監今當興復須得知州依例總領欲乞改差台符知相州所貴馬政速見就緒况相州地望在潞州之下兼是鄰封又洺州衞州各有兩馬監亦合興復與相州相接凡事取則相州易成績效取進止論取士臣聞於詩思皇多士生此王國濟濟多士文王以寧從古來為國治民者多士則興乏賢則衰此理之必然也士所以多由養育有素故有秀選俊造之目等級升之漸至於官得其人國無不治臣以朝廷育才取士之法數十年來有所未至向時應進士舉者自執巻為儒便知自重謂之應將相科亦白衣公卿登科之後其在髙等者知朝廷必將不次進用率皆益自奮勵進修徳業以副時望所至於公卿將相為名臣者多是其人近嵗以來稍異於是登甲科者縉紳罕聞其名朝廷罕得其用蓋由士子修藴無素朝廷勸奬未周臣亦聞禮部别定貢舉條貫然慮於激勸士行儒風猶有未至臣欲乞先時降詔開諭使人人知朝廷育才取士之意使各自勉勵向去科選得士必多濟濟以寧當由於此奏尚書省六曹行遣迃滯事元祐元年臣竊見尚書省二十四司主判郎官轉移遷改頻數不定往往未知本案事務及文書義理以致行遣迃回稽滯中多所請多不得可否之報臣欲乞令左右司郎中員外㸃檢勘當使逐案行遣文字明白簡易可否公當不致留滯定為式例庶得永乆遵行况左右司主本省綱轄亦乞委得覆視刑部尚書蘇頌素推熟知前代及本朝䑓省典故亦乞委之同共詳定取進止答奏臣伏䝉聖恩特差中使降手詔省詢訪仰披訓㫖俯集兢榮㳟惟太皇太后陛下坤厚博載天光大明自聼政以來發號施令及進賢退愚時政迃隆或因或革大小惬當中外欣悦所謂宗社無疆之福太平浸隆之時矣而猶謙勤退託以臣遭遇累聖乆竊重任又謂其犬馬之齒加長宜有重言曲賜下問乃詢黄髪采蒭蕘之義臣敢不勉竭愚忠粗禆虚佇夫治體之大莫大乎任賢納諫近者所用輔相所擢諫憲皆乆積時望大恊人情必能弼直獻納上副陛下求治深切之心以至罷去市易國有四民商居其一既罷市易之法商賈得遂其業減損青苖青苖本於常平法以嵗之豐儉出入之本在利民既以額配夫常平本法今除其額配之令民遂即時皆便矣停養保馬漢有保馬之法為害尚輕比近嵗霍翔之法配在保甲農民甚於塗炭罷之為便免納役錢三代之法民之力嵗不過三日今不用其力使之納錢農民固難得錢免故為當寛保甲按閲之頻遂農民耕種之業三時務農一時教戰今講於農隙事既師古民不失業此則市井畎畝之人歡呼之聲必已逹於天聼矣豈在老臣條陳而後詳然上之數事有損無益不可乆行而亟罷者本非朝廷所圖皆是近年以來臣僚急進僥倖成風率務妄起事端自來總領粗有微効則過求恩賞事若有害曾無責罸欲其省官省事民安政治不可得矣為今之要當革此弊自去年以來斥去聚歛之臣頗寛農商之利四民樂業萬國歡心無名之人多已削除有常之用當要豐足今之户部實主邦計尚書侍郎郎中員外未聞精擇乆任唯見屢遷數易欲使何人專任其責國之大計安所望哉此乃朝廷所宜先而不可忽也又謂臣之所知堪大任者臣素愚昧艱於知人然累玷鈞衡之任惟在薦賢以圖報國方其當軸任人極於慎揀㧞十得五安敢庶㡬及出領外藩將踰一紀朝中多士罕有識知雖有所聞莫更所試輕議論薦恐未審詳然熟聞士論謂樞宻直學士劉庠端正已有守雖已在近職乆從外補臣向在樞宻庠在太原邊事民政鎮静不擾光禄大夫前吏部侍郎蘇頌性行淳和學問該博於本朝故事多所詳記若偹顧問議論當有禆益朝奉大夫京西路提㸃刑獄劉奉世才力精明所守堅正向為樞宻院檢詳及中書檢正頗得時譽若並召還左右宜有所補更乞聖明詳擇或更有新進可副揀求容臣博訪别具奏聞况天下之大必有多士寘於周行然自數十年來養育人材有所未至蓋郷里舉選不兼取文行禮部復試類收膚淺之學今若條理學校貢舉之法庶幾取士得人以次擢升大任則濟濟以寧如周之盛方朝廷大推仁政勤恤民隠親民之官專在守令臣謂宜申戒吏部慎擇其人政得以和民受其賜前代銓衡授官之後多赴政府引騐問其所長或采其已試之効而遣之間有昏謬不才類多退落如此則郡縣得人政事修舉又用人之法當各因其才器孔門四科分政事文學之品須盡其所長而受其職職乃無曠前朝選試文學之士即寘於舘閣育才之地漸進用之惟學士待制皆主侍從偹顧問議論以禆時政今則盡補外任謂宜略定員數留充左右供職乆當察其器識緩急識執政闕人便可僉議進擢臣䝉詔㫖詢訪敢不傾盡所藴但以老昏言無倫理不任隕越惶懼之至所問夏國事宜不欲雜於此奏謹具别劄開陳所兾便於詳覽謹奏又元祐元年臣伏讀聖問有可禦西夏之術臣去年夏始聞西人欲求内臣以為方國家多事務早安静奏乞朝廷恢天海之量廣示開納御四夷之術覊縻而已由此可以息兵止固吾圉外夷懐服中夏安寧則太平之風浸隆浸乆兼曾繳進神宗專令臣男貽慶齎賜臣親書詔一本所貴審知神宗本意止務安邊不欲輕舉皆是邊臣希望功賞為國生事僥倖萬一以致兵食困匱才力殫耗必料此詔已經聖覽今復䝉下問所禦西夏之術臣愚何足以仰副虗佇臣切見西人自去年以來凡數次入朝即未見修嵗時常貢之禮亦未聞請常賜之物度其奸心必有所待當此之際朝廷亦須有以待之邊臣亦必有以制之若更如向時种諤徐禧軰料敵不精謀攻失䇿致誤邊事即闗中之民其心揺矣自靈武永樂王師不振之後兵勢民力尚未完復狡羌竊發必能制乎即如向時种諤軰皆云西人亂弱狂計所誤朝廷於此固當熟計而深念之事欲羙成計須先定當責成邊臣審料賊勢精選諜者宻窺賊形必先事以待之使賊計不行邊壘有偹此亦困羌夷之善䇿為人謀之小勝或西人欵塞請覲詰其所由出於善意即導之使來俟至延安帥臣宻察亦當得其要領先時奏聞廟堂之上可以預料而審度之俟至闕下知其所來必有所為因其所為之可否或議或詰審而應之可者即從否者即已議其疆土須廟堂之上衆謀大同苟有後艱同任其責或取與之間謀有同異即各述利害理須明白後或不應謀果不臧自任其責廟謀一定邊計粗寧天下小康當髙枕矣伏惟陛下聖明逺大之計固已先定出於衆知豈俟臣之過慮然采蒭蕘擇狂言亮其誠而不責其妄幸甚臣無任臣以為事有利害者必䆒其利害之極而斷其取舎之當其理得無容更相顧望議論不决乃欲遺賊於君父則安用大臣奏吏部三類法元祐二年臣觀六典三銓之法以三類觀其異優者擢而升之否者量而退之所以正權衡明賞罰抑貪冐進賢能今之典選一守定格選格中有以多舉主有軍功者為上多舉者或善請求有軍功者或容冐妄如近時買人頭得賞官者極多有同配官故多失才亦容濫進臣欲乞委吏部尚書侍郎大略依三類之法定本選之人合入知州通判知縣縣令考其才徳功効為上中下三品送中書門下覆騐可否定訖判選官引對一經聖鑑物無遁形更有去留孰不激勸又判銓之官亦當上體朝廷委付之重以衡鍳自任處之不疑間或以人才髙下絶異者特以名聞而進退之乃為穪職取進止御批元祐元年予宫中閲故書得卿神宗時所上親書奏章見卿論議切於治要至誠憂國忠義可見深用嘉歎卿平時所藴如此况當兹艱難之際想多憂勤予佐助機政斯愈年矣雖勉旃聼覽以天下之廣萬務之繁深慮不逮顧我元老宜有諮詢如近者黜陟臣僚因革庶政公議可乎夏國未附禦以何術卿之所知賢人堪大任者亟當論薦用柬求并所訪事可條具聞奏切待至言以補闕失故兹遣示當體予意潞公文集巻二十七
