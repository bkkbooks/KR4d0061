  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_008-1a, image: WYG1100/WYG1100-0642a.png}
body:
  text: 潞公文集巻八宋文彦博撰挽詞慈聖皇太后挽詞仁皇當宁久聖后配天崇厚徳符坤象先朝定震宫尊榮三代禮擁佑兩朝功徽範并慈訓皆留信史中聖孝攀慈範神逰兾少留重明縁積慶隂徳在貽謀制服從恩重因山變禮優白雲何處去雪涕望嵩丘榆輴漸出金門逺蘭膳深悲玉座空奕葉舜華推至孝前朝文毋繼清風栢城欝欝依嵩北石闕隆隆鎮洛東白髪老臣何以報日期西去掃山宫英宗皇帝挽詞乾徳符亨㑹天飛出慶寧繼明光五葉啟聖協千齡方保瑶圖永俄悲玉殿青定知遷寳座還集太微庭厥初丕命集咸慶長君賢恭儉敦堯徳憂勤損舜年象耕蒼野地龍御鼎湖天帝錫宣英號鴻休耀信編在隠推龍徳重明協帝華蓼蕭均澤及四海襲威加就日心方切騰天馭已賖攀髯不可跂淚目送雲霞濮安懿王夫人挽詞令淑王藩表恩榮代邸尊䔍生為聖嗣善述在神孫吉兆慿崧麓真歸傃濮園賔天雖日逺國本自靈源昔重間平樂中推輔佐功徳容咸有裕善慶果無窮以義情雖奪於親禮更崇洛郊春向晩薤挽變凄風神宗皇帝挽詞千齡逢聖旦六葉嗣昌辰睿智天攸縱章程日又新車書通絶域雨露洽殊鄰民罄華封祝帝思蒼野廵龍髯攀不及鳯翼附無因望斷喬山路憂深祀國人含生䝉聖徳率土被堯仁罔極何由報徒能損百身元豐聖政洽隆平溢牘聫萹載頌聲皇武惟揚昭七徳帝華克協麗重明喬山去日乘龍馭蒼野􅂒時見象耕億兆臣民䝉澤久損身思報一毫輕老臣逢聖運受眷獨優隆覲禮超羣后官儀極上公皇慈矜舊物帝念録微功一酌堯罇異臣致政後赴闕謝辭䝉恩親御垂拱殿特賜宴仍取御罇别酌一醆面諭云知酒量未退可飲盡玉音洋洋猶在於耳今兹號慕無以勝任三篇説命同臣受命判河南府䝉賜御詩一章自後得請致政歸洛又䝉賜御詩二章㤙禮之厚中外榮觀斯心期檢玉不意遂遺弓聲暨要荒外哀纒普率中凄凉石門路惨淡栢城風血淚盈襟隕何由報昊穹宣仁聖烈皇太后挽詞九年四海被清輝瑞彩重輪照殿幃間日視朝勤旰食未明思政事宵衣存心庶務勞千慮决意真㳺厭萬機下土顒顒望霄漢仙輿直指厚陵歸老臣八十慚尸素掛了貂冠歸洛陽芝詔薦臨優眷注蒲輪促起預平章重辭禁幄猶如昨今迓靈輿益自傷勉策衰羸來鞏固臨風洒淚厚陵傍故相國元憲宋公挽詞天聖收羣彦惟公獨出羣兩朝推舊徳一代仰髙文得位才康世逢時道佐君云胡天不憗撫几悼勲勤念昔為寮契周旋一紀餘佐時君望重謀國我才踈霧露常䝉潤陽秋每借噓忽焉傷殄瘁隕淚滿襟裾名遂營身退髙風近古稀台司脱屣去空土掛冠歸仁夀宜難老朝陽歎易晞宸篇學丘禱恩耀賁泉扉故宣徽惠穆公挽詞二首公弼奕世韋平族經時管葛才蒼生方仰望大厦忽傾頺不憗皇情悼如仁士論哀涇山赴真宅應見國僑來蚤預朋從談燕熟晚陪樞筦歳時多心如金石堅無改聲似塤箎久更和丹鳯臨池猶未浴白駒逢隙已先過相門餘慶簮纓盛繼述皆同穀與難故尚書懿敏王公挽詞二首素盛徳三槐舊論交二紀深帝聰聞曵履人望在為霖沒世猶齎志時康未稱心孤懷傷殄瘁清淚滿衣襟上臺三品位非輕祕殿論思職更清頻倚壯猷為屏翰合從僉議秉鈞衡頺然處順君無怛痛矣懷賢我有情不獨九原埋寳玉人琴從此絶遺聲尚書令魏國忠憲韓公挽詞三首三朝光輔致昇平九叙咸熙入頌聲獨運鴻鈞成大業親扶英主繼重明聖賢自昔推同徳忠獻于今重易名清廟已聞從配饗哀榮不獨在佳城勅使䕶𦵏特營石室平生投分比金蘭莫逆論心最歳寒唱第楓宸陪驥尾秉鈞槐府并貂冠潘楊事契常脩睦相魏親隣正講歡冰井臺邉星隕後公薨之前夕大星殞于府第百身何贖但汍瀾時留守魏都韓守相州出入三朝共周旋四紀同論交最知我經世獨推公觀水驚川逰升堂失棟隆悲懷與聲淚逺寄紼謳中中書令魯國宣靖魯公挽詞公亮四首三朝輔翊秉鴻鈞功在旂常澤在民黄石授來為帝傅赤松逰去保天真達生優享髙年福出世輕遺大夢身自古陘山多吉宅國僑裴令繼芳塵二府陪逰垂二紀服公哲範每思齊留心舊典皆馴致從事新書悉順稽言發清風常穆若心停止水更淵兮先朝付囑非無謂必為其仁在放麑龜䝉啟土世傳榮猶倚耆英作政卿及見伯禽親拜後方知遺愛在元成穆穆罷朝嗟不憗衝衝停布歎如仁生芻絮酒難親致薤曲書成淚濕巾王太師挽詞珪二首賢書早入英雄彀冠歳髙馳賈馬聲一紀玉堂司大筆兩朝金鼎主和􅃵天邉遽失騎箕象川上猶思用檝名欲識聖恩優異處宻章重疊賁佳城去春解組遂西征曽辱都門出餞行席上詩成光退跡尊中酒滿叙離情經年方歎音容隔此日俄驚柱石傾羸老不能親引紼臨風洒淚濕襟纓司馬温公挽詞四首莫逆論交司馬丈君心知我我知君同謀同道殊無間一死一生今遂分八十衰翁如槁木一千餘日是殘曛前途若有相逢處尚以英靈解世紛公賫志以歿猶不忘利澤生民心在王室留滯周南十五年成書奏牘過三千東山方起為霖雨大厦俄傾歎逝川宻有忠言如藥石别如優禮賜貂蟬兩宫痛悼皆臨奠秪為臯䕫志未宣昔有鄉賢陽道州亦聞比近有松楸新阡便合開三徑同氣相求好並逰傅巖舊蹟今猶在兼與安平祖廟隣賢相裔孫還卜宅先疇吉土是歸真司馬贈太傅康國韓公挽詞三首綘朝路相從三紀餘更陪國論對鈞樞康時逺術推賢業造膝嘉猷恊帝俞盤結方資庖刅解旱乾猶望傳霖蘇寢門遽有人琴歎老伴凋零道轉孤洛城曽與公相别已為人生老别難今作紼謳成永訣滿襟悲淚轉汍瀾别此三年公赴北都餞于上東門愚嘗有詩云尊前不制淚汍瀾大底人情老别難之句西豪居在許東偏丹旐遥遥過許田欲問相君真宅處髙平吉地是新阡公家始卜𦵏地問于野人此是吉地吉乃野人之名中書侍郎傅公挽詞堯俞三首友㑹朋從二紀餘金蘭投分更無殊鳯池晩接經邦論龍陛晨陪歩武趨起副民瞻方倚頼用為霖雨待昭蘇如何奄忽公先逝自歎靈光老益孤賢業雖長命不融從來此恨古今同為霖作礪君家事未盡舒張數已窮常愛龍潭龜島上移床醉卧緑髯中茂林修竹皆如舊惟歎人琴遂一空昔與欽之飲于濟上泉石之間有小島如龜形令植碧莎如緑髯然致政仲損工部哀詞二首自昔朋逰今五紀斷金連璧附英翹學通經史䝉三益心類松筠見久要白首郎潜甘寂寞清時吏隠甚逍遥年逾九九誠無慊惟歎人亡與道消金蘭取友務端良仲損扵余極久長蚤歳傾懷論管鮑晩年修好結潘陽人琴忽起芝焚歎簫鼓俄隨薤挽傷不到寢門親一慟臨風老淚獨浪浪太尉韓國文忠富公哀詞弼蚤擅才名重天資徳望崇大勲縁定策羙利在和戎一代推人傑三朝倚棟隆音容雖已矣永譽更無窮鼂董經邦策臯䕫濟世賢頻堅挂冠請未及從心年早遂赤松伴晩叅黄蘗禪懸車垂一紀築室冠山川瀟洒心中相優㳺地上仙尊榮兼夀考五福在公全我愧才無取公常問不能白麻曽並命黄閣遂同升調爕彛倫叙將明庶績凝如仁今奄忽昭代失良肱去年春作耆英㑹一坐簮紳仰典刑今日共嗟天不憗惟瞻英範在丹青達觀定知無怛化常情未免愴離魂卭山土厚雖埋玉遺烈餘芬萬古存故太師開府王公挽詞君貺太子太師早歳馳聲猶未冠錦標獨得冠詞林四朝出處身名泰五紀㳺從事契深天聖中予與君貺同應科舉居守北郊依舊徳退休西洛負初心白龍泉畔青烏兆引紼悲謳淚滿襟熙寧中君貺守洛留余㑹飲於雙桂樓親作沁園春曲詞相屬有華髪青雲之句昔年過洛赴三城華髪青雲叙故情今日人琴俱已矣猶傳樂府沁園聲天聖年中始得朋後陪孟洛兩交承此亦君貺歌詞所及之意追思往事渾如夢老淚如傾自不勝後已北都交印前歳公圖歸洛中待君同賞狀元紅人間萬事難如意湏把興亡付壞空君貺久思歸洛余嘗有詩寄之云公乎早歸來莫負花前約同賞狀元紅更看劉師閤楚正議建中挽詩三章元祐五年九月出處交逰五十春洛城晩歳卜親隣東齋錦襻清談處今日重來淚滿襟大抵神存體不留萬安山下宅松楸平生燕集歌懽友伯夀應同泉下㳺正叙新阡與伯夀隣每讀龜書洪範萹人間五福是髙年公年九九雖無慊散盡耆英我屹然潞公文集卷八
