body:
  text: 潞公文集卷二十五宋文彦博撰奏議論西事元豐四年臣聞昨來西師出界中輟而還將下師徒頗有饑凍潰散以礙人衆不行軍法今便欲再舉何以勵衆又運粮逺涉頗被邀截官吏民夫甚有陷沒必恐邉將懼罪不曾依實盡言議臣依違亦不敢明白敷奏老臣荷陛下恩深若又不言乃是負國伏望聖慈深察王師之舉必有邉將謀臣首開端緒不得詳審以悮大計伏乞陛下察之若不深責無以勵後又臣竊聞陜西用兵之後公私蓄積大抵殫耗丁壯運粮從軍夏麥不下種大兵雖還邉備不可輕弛切慮向去軍兵民粮食不充緩急無以計置謂宜謀求漢唐故事水陸轉輸以備乏絶臣守藩當路近聞雍岐間粟麥之價今已騰湧若至春後必多流亡兼聞闗陜人户昨經調發應副軍期不遺餘力死亡之餘疲瘵已甚亦皆覬望徳音儻順青陽一霈恩宥因而有所蠲復或并及河東諸郡兹實陛下盛徳之舉仍願亟詔諸郡申嚴斥堠専為守禦之備養威練卒賑恤傷殘之民在今之宜無以易此臣受恩之深慮有所及不敢自黙又臣近聞西師已還中外但知時暫歇泊而未有分屯解甲之㫖人情憂疑皆慮王師必有再舉之計老臣受國恩深義同休戚齒髮如此無復覬望惟有區區欲報之意不能緘黙輒為陛下言之臣竊觀陛下臨御以來選拔將校訓齊師徒修治器械儲峙糗粮皆衆智所不及近世所未能比者夏人昏亂自致天討陛下赫然命將出師以伐其罪師行以來捷音屢上雖未能搗其巢穴繫其君長而師行有紀所遇輒克羌人逃遁莫敢抗堂堂之鋒天威神武震慴四裔戰功之多近世未有然而數路進軍興動大衆彌厯累月餽輓不貲諸路之民疲於供給將士盡忠竭力為朝廷奮不頋身間闗死亡衝冒寒苦備極勤勞臣以謂國威既已振矣將士之力亦已殫矣百姓供餽亦已竭矣為陛下今日之計正當勞來將士安拊百姓噢咻其疾痛補完其瘡痍使得蘓息按甲養威以全前日之勝如此則外足以懲艾夷狄内足以愛養軍民乃宗社無疆之休也今若師徒暫還而復出士氣已衰而再鼓民力已困而調發復興諸路深入而轉餉益逺如此則師之勝負恐未可知而前功或喪此天下之甚憂也兼臣在洛中津遣陜西軍須不少亦聞陜西事體頗詳皆言百姓亦已流離菽粟之價騰踴今冬二麥多不下種將春農事方興又復調發不已必恐應副不前有悞大計臣而不言孰當言者伏望陛下以天下為度以蒼生為心不以盡敵然後為功亟詔班師分屯諸路使朝廷恩威並行軍民和附以小羌昬亂如此可以坐待其滅亡矣臣不勝大願老臣愚忠憂國之心不能自已僣已冒聞不任隕越伏望聖慈哀察其誠俯賜容納聞陜西河東運粮人夫雖費不貲而逃逸者甚衆至有部夫官亦有逃竄恐無人敢仔細奏陳兵志謂善用兵者役不再籍粮不三載春秋戰國時用兵運粮多在中夏故兵有因粮粮不逺載與今之餽運深入敵人沙漠之地其勢不同易稱高宗伐鬼方三年克之小人勿用以聖帝伐鬼方尚三年而克之理有不可急者又曰師貞丈人吉丈人嚴莊之稱用之則吉小人勿用用則無功無功則有罪伏望陛下慎擇將兵者如輕險而求僥倖之功者當勿用之臣年老眼昏勉力親書此劄子深懼不謹細伏望聖慈矜察兼不敢附逓恐漏洩不達謹遣臣長孫承事郎永世特詣通進司投進答詔自逺相見忽經兩年春暄卿比平安前繼閲所論闗中事宜悉至誠惻怛之意非累朝心膂之臣憂國如家之深曷能惓惓如此寤寐忠嘉不忘於懐朕涉道日淺昧於知人不能圖任將帥以天錫可乗之時上為祖宗殄滅一方世讎深用厚顔爰自六軍還塞將士已殫勞黎民已告病今日之勢豈復可逺舉深入哉惟固境自完而已近特命於涇原制置者苐使之城數亭障制敵衝軼耳非復有前日圖也所以張大其名若入討之為者葢兵法有之用而示之不用不用固有示之用耳庶或其可震之乗威尋盟則朝廷因得復覊縻之也想卿有同體均休戚之誠諒已悉其措置大概今因貽慶行故兹示諭謝答詔元豐五年三月臣去嵗冬輒率愚瞽累奏陳陜西邉事今春䝉差臣男貽慶特賜臣二月二十五日手詔撫諭後䝉聖慈矜寛不責臣狂易恭讀詔㫖曰六軍還塞將士已殫勞黎民已告病今日之勢豈可復逺舉深入哉惟固境自完而已近命涇原制置城數亭障制敵衝軼非有前日圖也臣仰味聖言伏增欣抃有以見陛下推堯舜之心卹生靈之困罄溥率廣被㴠育幸甚幸甚然自今秋已來復有遣戍開疆運河深入此必是邉臣希功規為僥倖開端緒誑惑朝廷料敵不精致有撓敗進此計者陛下不必知此人乞行顯誅以戒今後干賞諂利之輩免致向去更誤朝廷大事望以今年二月二十五日詔書大㫖宻諭邉臣嚴設備預固境自完來則禦之去勿逺逐更年嵗間士氣復振民力復完足食足兵何求不可醜羌聞之自當屈服臣又聞謀攻料敵老將所難不當與新進白面書生惟務高談虚論容易而計畫之今以天下之大士人之衆豈無深識逺慮懐忠守正更事厯試之人願陛下詳求而審用之如祖宗朝所用扞邉守塞宿將名臣見於國史者多矣乞詳審之臣之此言非不知觸犯時怒葢耄耋之年被三朝重任䝉陛下眷奬尤深乃心本朝義均休戚豈當隨例緘黙上負聖明伏望天慈亮其區區自盡之誠又臣伏䝉聖恩以臣奏陳西事特令臣男貽慶特賜手詔一道并傳宣撫問者仰奉聖訓伏增感懼切念臣衰老不才荷陛下恩禮之厚舉朝無比惟知竭盡忠懇粗伸補報昨西夏擾邉王師罰罪雜羌既已退縮大兵尚屯邉徼師之善志允當則歸因是奏陳上干宸聴庶幾狂瞽粗禆萬一豈謂愚臣過計難窺陛下聖謨天機固深睿算黙定基命宥宻逺猷克壯乃生靈莫大之幸實宗社無窮之福加以睿光曲照上徳兼容迂陋蒭言亦被矜采臣無任感戴欣幸之至奏西京災傷事元豐四年六月臣體量得西京畿内諸縣今春以來麥苗極盛有望豐登無何自四月五月中直至收穫之際大雨頻併繼日不止遂至頗損麥苗所存者三四分須至趂時收穫上場所兾收拾殘餘粗捄饑困臣體訪得所收多者僅及三四分日有人户經官被訴苗傷又縁官吏拘文為已收割在塲及有持打了者不以為慿須得存留查苗在地方可驗覆今若不與檢放必至人户逃移况今夏多雨害稼衆所明知難為巧詐伏望朝廷特降指揮下本路轉運司仔細體量實有災傷即早與减放分數所貴人户不致逃移更望朝廷矜察早降指揮取進止奏西京漕河事元豐六年四月本府勘會自會通橋下至白馬寺洛河水路灘磧淺澁難行綱運遂奏乞開淘古漕河舊道稍令深闊抵至白馬寺却合洛河囘避二十餘里灘磧所貴通行綱船不至滯碍今䝉朝㫖依奏施行㸔詳中劄内更帶下白波輦運司奏乞開濬漕河至偃師縣界合洛河通濟舟船雖與本府所奏事狀大抵皆同只是稱至偃師縣界漕口合流必添展地里稍逺須至更差官覷步所碾添開濬故道地步長短及地形高下是與不是有古來河道確實計定功料申上上殿謝劄子元祐元年五月臣老退不才䝉恩詔置左右令議軍國重事况臣官忝三師其職惟當論道臣以涉道至淺不能上禆聖政然以生平舊學素藴及以近時所見所聞當竭愚忠粗禆萬一又不敢同外廷臣僚頻入文字上煩聖聴須至留身口陳仔細熟達聖聴然後簡徑作劄子奏聞乞付外廷衆議公行潞公文集巻二十五
