front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0061_WYG_040-1a, image: WYG1100/WYG1100-0797c.png}
body:
  text: 潞公文集巻四十宋文彦博撰舉官舉胡宗炎臣向于元豐七年内曽奏舉朝散郎將作監丞胡宗炎名臣之後詞學登科乞朝廷特賜陞擢至今未䝉收採本人今已年滿得替向在本監累經朝廷大功役均節材料宣力甚多偹見勞能伏望聖慈特除充省府官任使取進止舉温俊乂元祐二年十一月臣切見朝請郎前監左藏庫温俊乂亷勤公幹昨監國帑不避衆怨舉行積弊但以孤立人鮮知之伏望聖慈令三省檢其履歴特賜陞擢任使舉宋匪躬臣切見承議郎宋匪躬名臣之後能世其家博學多聞習知典故伏望聖慈令三省詳其家世并所履歴特除秘書省校書或檢討之任舉王欽臣元祐元年九月二日臣勘㑹太僕寺近准朝㫖通領外監牧司依舊郡牧司職事本寺少卿高遵惠近日丁憂只有少卿李周一員差往諸路相度見闕長貳管勾寺事切見工部郎中王欽臣曽任郡牧判官并提舉陜西買馬又充駕部郎中練習馬政欲乞差充太僕少卿填高遵惠闕縁本人曽任陜西轉運副使兩任省郎資序已深兼其人素有文學仍乞除一舘閣職名充上件職事官庶目下便有正官修復馬政取進止又九月七日臣近以太僕寺闕官總領内外監牧事奏乞差官填闕直累日明堂大禮齋祠中未奉聖㫖今來本寺即目闕官治事欲乞檢㑹臣前奏早賜處分取進止所有初二日奏劄子恐齋祠中未經聖覽今更别繳進呈舉楚建中等臣昨在西京䝉聖恩差勾當内東門梁惟簡齎賜臣手詔曲有諮詢臣勉竭愚慮上對仍詢及臣之所知賢才亟當論薦用副揀求臣當時粗舉三人應詔以乆在外藩後來新進少所知識容臣博訪續具奏陳臣今早延和殿進對䝉聖㫖更有薦論令進入文字來今有續具在外臣僚皆是已試有効可以因其所能而任之伏乞聖明更賜采察一正議大夫天章閣待制致仕楚建中雖年逾七十精力強明累任重路轉運使及三司判官副使環慶真定路經畧安撫使在京主判劇司皆有風績一中散大夫直龍圖閣知滄州李之純累任轉運使忠厚淳正頗有時譽一河北提㸃刑獄唐義問中正有守恬于進趍頗有學識善議論通時務一知秦州直龍圖范育曽為言事官頗有學識議論不屈一河北轉運判官杜純堅正有守累以公事黜降衆謂理直終不自明縉紳多稱之一知懐州朝散郎黄景學行敦篤有古儒士之風可偹勤講之職右謹具奏聞謹奏又臣于去年六月中曽入劄子應詔續舉官六員今聞多已施行内一員前知懐州黄景未見施行問得中書言未見文字切慮遺墜不達輙敢録元劄子進呈其黄景伏望聖慈采察特賜擢用取進止今早已曽面奏奉聖㫖令别進劄子舉杜訢等元祐二年二月臣伏以近者奨恬退之士抑躁競之風竊見衞尉少卿杜訢賢相之後能世其家乆歴省府之任素有老成之稱太僕少卿李周恬靜有守當官不撓向為監司以直道被黜乆安閑職宣徳郎楊國寳安貧守道恬于仕進器識深逺才力有餘雖近除太常博士未盡其才試太學博士吕太臨強學篤行有古儒之風杜門十年以講學自樂經術通明聞譽夙著雖䝉召寘太學以親嫌未極其用已上四人伏乞特賜擢任取進止舉唐義問元祐二年五月臣切聞就差河東轉運使副唐義問知荆南縁荆南帶湖北一路都兵鈐兼統押近畍蠻夷地望重于河南又聞廣西蠻人潜結荆湖兩路蠻酋作過極要彈壓今來唐義問只以近下散官知荆南慮事體不重兼近有謝麟自知邠州移知潭州帶直秘閣葉均以秘書少監知荆南帶直龍圖閣從來體例甚多伏乞朝廷特與檢㑹諸例令唐義問兼帶舘閣職名知荆南所貴夷夏稱呼有所増重方面事體取進止舉張守約元祐三年五月臣切見東上閣門使鄜延路馬步軍副總管張守約累經陜西任使熟知邊事深曉兵政但以忠勤孤直進身不苟今雖年過七十精力甚強而官止横行使額欲望朝廷察其人材履歴特賜擢充正任以奨乆勞舉邢佐臣臣切見左藏庫副使定州路鈐轄邢佐臣累經河北河東任使深曉邊事熟諳軍政頗以忠義自任不苟求進今年過七十精力強明尚淹諸司副使伏望朝廷察其履歴人材擢充正使兼帶遥郡以奨忠義舉包綬元祐三年十月二十七日臣切見故樞宻副使包拯身偹忠孝秉節清勁直道立朝中外嚴憚先帝以其徳望之重擢為輔臣未盡其才不乆薨謝舉朝痛惜之今其子綬見任宣義郎僉書濠州判官能世其家恬靜自守不苟求進士人稱之臣伏見近奨用劉敦夫吕由誠皆以其父吕誨劉庠之故如包拯之後惟綬一身孤立不倚臣以謂宜䝉奨擢以旌名臣之後取進止舉張雲卿臣切見蔡州真陽縣尉張雲卿素有學行清介自守安貧守道未嘗苟求應進士舉晩霑一命士人惜之兼雲卿通經博古欲望特除一西京學官必能表帥諸生亦可敦勸薄俗取進止舉尹復湊元祐四年臣切見同五經出身尹復湊素有郷行頗深儒學累有公卿薦論及䝉朝廷旌賁前歳科塲本州又以經明行修薦其二人于朝廷去年復湊殿試為第一名其弟復性充第二名今又聞本路監司奏復湊乞充宣聖廟教授闕考其行實極稱其任伏望聖慈特賜依奏充庶使闡揚鄒魯之素風欽承周孔之聖教取進止潞公文集巻四十
