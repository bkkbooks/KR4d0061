body:
  text: 潞公文集巻五宋文彦博撰律詩㳺盧溪記云盧携舊居一徑極幽深清泉響竹隂昔人曽隱霧襄世偶為霖謀國無長䇿論兵肆褊心王師遂不振物議愈難任仰藥身雖殞攻闗盗轉侵傳家絶諸藐携之諸子尋亦死於冦亂遺愛變雙林僧朴俱難問碑昬尚可尋徘徊念陳迹不為歎人禽寒食日早發赴積慶莊拜掃過龍門馬上作赫奕晨霞照萬燈路穿闕口勢如吞橋邉楊栁垂青線林下鞦韆掛綵䋲平地伊流光一抹半天嵩嶽翠千層行行漸入吾疆理竹塢松阡間綺塍秋日登闕塞鞅掌公庭暇登臨闕塞秋清談不廢務逺望略消憂二室檻前見長伊天際流僧歸下樵徑客去上漁舟返照明金刹飛泉響石樓放懷真趣得縱目滯情休像列三龕宻波翻八節稠悵然髙世意不减冶城逰㳺潜溪修竹䕃清溪潺湲闕塞西石床平有蘚沙路潤無泥粉白松圍古有古松皮緑而粉生本草艾納香真廟愛之駐蹕良久藍生草帯齊難留批勅字救旱作雲霓李藩少時隱居溪上登廣化閣寳刹層峯上危欄淨界中登臨近霄漢子細見伊嵩谷逈傳清梵川長沒逺鴻黄昏不忍去月在石樓東宿少林寺六六仙峯繞静居俗塵至此暫消除西來未悟禪師意北去還馳使者車予方被命移守北都五品封槐今尚在九年面壁昔何如心知一宿猶難覺花藏重尋貝葉書逰金星觀鶴髪龎眉二老仙林間老屋十餘間齋粮不畜惟栽菊道眼長明祗㸔山朋侣過從應綺角比隣掩映是嵩轅蹔㳺自愧塵勞跡觧恰臨溪濯膩顔㳺嶽寺寺占嵩顔景最多竒峯列刹共嵳峩依巖寳砌礱清礎出谷飛泉逗素波下瞰長川窮𣺌邈傍觀列岫極陂陁緇林法藥堪隨喜鐘磬聲清唄梵和過穎陽山墅作平生箕穎志未免困名韁頼此營山墅頻年至頴陽相隣紫雲洞不羡白蓮莊却愧耕夫問歸軒作底忙大名府舍創作茅齋因題八句呈太師相公宋太保相公龎公勿謂茅茨陋棲心即有餘非同諸葛卧頗類静名居面壁思禪理向陽觀道書逥頭視華屋韁𤨏宿蘧廬留守端明尚書王君貺逺示贈闍黎漸師詩依韵和成常隨浄侣呌禪闗熟聽潮音丈室間身逐孤雲辭隴首心如皎月照香山儒空兩悟言無滯漸師自儒入於釋覺望雙除性本閑居守意勤當應現不須祗到虎溪還僕射侍中賈榮過潩上小園兼題嘉句謹成五十六言仰謝賁飾上相尋芳駐畫輪華貂玉節耀松筠二南雅麗音盈耳八體遒研妙入神魯壁再傳科斗字稽山長詠永和春小園從此増光價一室熒煌照椉珍小園池上偶作微吟岸幘思悠然近對方塘逺見山思與洛陽均逸地莫言此地是偷閑詩寄龍門寳應寺證大師求改劉几祕監庵作潞公菴山人去作山西將岫幌巖扉掩翠嵐欲問證師求正住慿師改作潞公菴依韵和荅文裕羣牧侍郎張華軒過陋巷良讌集西園雅飲金罍耻髙吟墨客喧初晴水色静早夜木隂繁酷愛君揮麈清言有㑹元晝寢夢歸洛宅位髙才薄困疲癃竹影泉聲夢寐中定去洛城為逸客近來書翰學楊風汝州端明仲儀寄示竹亭詩二十章披玩歎賞不已輒成四十言仰答来意􅌄窱竹間路清虛池上亭髙情愛寂寂終日玩青青汝水環近郭箕山開畵屏知君於此興極目送鴻冥中書宿齋偶作二首齋潔奉祠事深嚴宿禁扄露盤雲表見鈞奏夢中聽慎獨䖍君命清心重禮經顧慙温室樹忽此集鷦螟鳯閣容棲集心無外慮侵夜凉秋氣早人静禁門深大政慚無補微才恐不任歌眠聽宫漏蘭熖照青衾太廟宿齋作孟秋嚴廟享公衮攝祠官達嚮來風逈方諸遡月寒剪茅重屋峻藂􅀢繞墻寛始為磚墻仰念靈臺厚恭思王業難寄題龍門臨伊堂兼呈奉先寺興公山僧知我思歸意為我臨伊創草堂聞説繞階叢巨石更湏當檻植脩篁忩間東望乾元刹門外南趨積慶莊便擬半移生計去不知何似暢師房東樞後軒列植花草隨時競秀種類實繁滋蔓因依未易圖也然昔之造化者為不少矣故錄其名數牓於北垣意欲後之人勿剪勿伐且無忘於封植也因觀其榜偶作小詩三章曰嘲曰觧曰斷云嘲百種閑花草皆非藥籠材如何桃與李曽不與栽培解勿謂閑花草生成各有冝君㸔桃與李未是歳寒姿斷天地育萬物物物遂其生何湏強分别不若兩忘情九月十日西園會范内翰李紫㣲已下諸公惠雅章謹成拙詩仰荅來意今日西園集聨羣蜀國英為君聊置醴念我昔專城䴡句皆新意髙談多故情報章雖拙陋所應在同聲端明尚書仲儀内翰侍郎景仁龍圖侍郎文裕垂訪弊居會於西園兼䝉賦詩賁餙輒成四十字奉呈重陽節始過佳菊色猶新東籬把酒客西園飛盖賔共此林下宴可類商顔人清罇幸未燥無所獻酬頻和副樞呉諌議上元夜從駕至集禧觀順時同樂慰邦民恊氣和風應早春斗運帝車遵大路雲從天歩絶纎塵民瞻玉色欣逰豫岳峙琳宫望省巡囘御端闈張鎬飲蘭燈桂魄耀星津和致政侍郎張文裕二府詩潭潭相府方髙啓岌岌樞闈亦對開棊布司存隣象闕星分位表拱天臺樂成善頌傳嘉句處命叨居媿薄才仰認聖皇優待意先時曽枉翠華來送祕書劉監歸嵩陽隱居昔年寳應茅齋主别後炎凉已屢經暫入城來縁買藥却騎牛去似飄萍緱山重訪吹笙伴祕省長虛畵鶴㕔一任洛陽人白眼且看三十六峯青四明疇昔稱狂客二室於今號散仙子晉料登緱嶺望待君笙鶴共昇天大蓬曉律好音山中時跨牛故皆及之和副樞呉諌議寄題廣化寺東軒淨居髙山四禅天更對伊嵩闢廣軒塔聳千花依鷲嶺舟浮一葉上龍門雲藏古木當危檻風逓踈鐘過逺村我有草堂南澗口即臨伊堂一囘西望一銷魂伏覩致政太傅侍中曽魯公荅樞宻諌議呉留題齋閣詩依韵和呈三朝光輔仰耆年謝政歸來作散仙築室尚依䨇鳯闕放懷何必五湖船清談傾座簮纓盛綵服趨庭子舍賢公伴赤松應念我早教西去老伊川華顛相顧最相親同是三朝二府人曽忝政堂陪大論又叨樞筦繼清塵我慙蒲桞衰殘質公稱䕫龍強徤身把酒觀言兼戀德春暉不覺漸西淪雪中樞宻蔡諌議借示范寛雪景圖梁園深雪裏更㸔范寛山逈出闗荆上如㳺嵩少間雪愁萬木老漁罷一簑還此景堪延客擁爐傾小蠻白樂天云酒榼也和副樞蔡諌議植山芋平䑓山芋傳區種乆餌能令玉壽延欲長深根培客土便期珎味薦賔筵吳蓴頓覺名稱减楚芰湏慚嗜好偏况是丹頭推絶品百金供費亦宜然竊知今日於家園種山芋輙成拙詩奉呈副樞諌議呉聞説家園樂仍携山芋來何煩心助長西㕔所云田而善謔惟喜手親栽若務豊根本應湏薙草萊迎知冬薦味决不减平臺和副樞蔡諌議贈副樞呉諫議謝惠新宅雜花之什百卉千花淑景新主人吟嘯惜芳辰依依緑减隋堤色灼灼紅移洛浦春已愛清香飄宴席更分穠艶與交親鄒陽本是梁園客醉賞猶思濉水濵新醸酴醿酒送呉蔡二副樞此花猶未發此酒已先香獨有甘芹意開罇略為嘗知副樞蔡諌議孟夏旦日右府書事杲日無虧彰睿聖前星有慶耀東朝皇明燭逺群𦍑服火德乗時衆慝消丹扆焦勞猶損膳華顛尺素合歸樵䕫牙共奏康哉闕雅詠和聲徹九宵去春䝉西都致政李少師東之惠詩五首叙舊逰因而招隱某尚覊樞務請退未諧深味來章未知所荅遷延宿留遂渉歳時今䝉聖慈俯從人欲聽解重柄均逸便藩仰西河之上逰瞻仁宅之實邇即當胥㑹彌積欣怡輒成小詩三章代書見意且荅去春之賜新詩五首緣招隱未得西歸未敢酬今許均勞觧樞柄期君同伴赤松逰來詩云莫教獨欠赤松逰伊西古寺茅菴静不到今經八九春巖谷定知雲水冷宫師常作獨游人詩有下客抛官獨自回句斗藪緇塵捋白髭緘書先去問宫師仙舟東下能相訪同上平嵩把酒巵過魯太師廟作墨綬前朝宰桑郊鄭圃東叢祠臨大道遺烈凛清風顧我才尤薄與君時不同歴官無一異得位亦三公屑屑刑名内區區簿領中循良誰復道貪刻自為功哲后方勤治愚臣合盡忠承流奉寛大宣澤務龎鴻此意縁思古何人為發䝉神交儻來鑒潜願啓其𠂻再到積慶墳莊即事偶成不到伊川八九年重來風物盡依然驚囘俗夣鳴臯鶴洗浄塵襟潄玉泉緑篠侵階當蕙帳蒼霞滿目對松阡天憐老懶優深處罷聼晨鷄徹曉眠郊園乍適踈慵意勉強逢迎已不能赤米白鹽充野饌蕉衫芒屫見山僧含風古木遮簷角潄玉清泉㵼石稜田父相過復相勸早歸林下醉騰騰東溪泛舟東溪伊水東溪水碧溶溶兩漿夷猶去䨇鳬上下逢餘波通洛浦倒影浸髙峯荷動聞魚躍沙平見鶴蹤島蒲森劍㦸岸桞亞虬龍並載惟禅客隨觀有牧童風傳櫂謳逺露濕釣蓑濃不是迷津處何煩問老農遊楚諫議園宅呈留守宣徽留䑓端明王君貺司馬君實五里依仁宅西隣數仭墻主人為屏翰楚今帥環慶園吏占風光地勝金甌小林深錦襻長輕煙罩叢桂幽鳥入修篁蘚色沿茶竈松隂覆石牀一區誠可樂三徑莫令荒有木皆交䕃無花不並方相期掛冠後同此事琴觴楚建中正議宅俗呼為錦纒襻遊史舘張大卿致政李少卿史舘傅兵部濟上郊園張靖李章傅堯俞時判河陽祈雪濟源廟作疇昔常聞處士莊林泉勝景甲山陽一渠寒水流清濟千仭濃嵐聳太行枋口雲歸穿古木燕川風過入修篁前賢舊業何人繼分與三賢作醉鄉題龍潭寺古寺依青嶂髙軒俯碧潭山僧如有待先掃侍中菴夏英公之庵謁濟祠作導闕靈源祀典尊湛然凝碧浸雲根逺潮滄海殊無礙横貫洪河自不渾一𣲖平流滋稼穡四時精享薦蘋蘩未嘗輕作風濤險惟有􅆂濡及物恩登平崧閣右崧亭作不較平崧與䂖崧大都亭閣盡穹崇太行太室當前後俱是家山入望中遊碧漣堂偶作寄致政司空相公富聊布所懷公以心如水開軒俯碧漣嘗虛濟川楫却就釣璜淵北倚平崧閣南臨種黍田緣經冶城望到此即懷賢詩寄相州韓魏公侍中並序時判河陽韓判相州並為節使司徒侍中某頃陪髙躅常議攸居營水竹之清虛較相洛之優劣莫如韓樂宛在鄴中近縁幕客之來頗詫府朝之盛陪後車而弗及隨飛盖以無由追惟緒言形於善謔輙成拙詩一章鼎邑從來事足誇氷臺近歳景尤嘉天平峯秀堪圖畵晝錦堂髙可宴衙新表門閭通德里舊栽桃李相君家仍聞降志相希慕林下時乘洛様車公前鎮安陽䝉示諭依洛様作安車詩寄西都致政司空相公富燕居堂北之隙地有紅䔧十數本堅直可愛復以其託根善地遂成美材因躬自削治以為杖輙敢分寄一枝侑公之靈壽物甚㣲陋而亮其意可也燕居堂北虛閒地蔾藿森森欲柱天中有紅䔧最翹秀削成鳩杖佐衰年初同野叟甘芹味始至孟冬葉尚可葅終學狂翁掛酒錢分寄一枝公必訝提携不稱葛陂仙詩寄荅致政司空相公富某䝉寄示二圃小花三十詠捧巻伏讀研味不已真二南之風興也輙成拙詩仰酧來貺衆卉群芳品目竒遍形歌詠殆無遺名過衛國平泉記數恊江淹雜體詩蘓頲祗誇長樂賦元輿惟詫牡丹詞此一色洛人乆貴以公無情於發揚也豈知哲匠風騷美不間鴻纎盡物宜知郡傅學士將赴彭門䝉貺佳什次韵奉荅史局郎曹得俊賢稔聞髙譽已多年山陽松菊抛三徑泗水衣冠戴二天合作商霖光祖構猶持漢節滯英躔河梁欲上難輕别亦望遲遲駐曲旃致政仲損張工部詢及孟醖之味因寄數器副以小詩宗益􅙩綠如渑味似飴沁園之名醖也朝囘何必典春衣序賔留飲觴無筭速父供甘羜更肥不惜郫筒令逺寄惟憂遼豕得深譏小家麴蘖君諳在莫使邯郸枉見圍潞公文集巻五
