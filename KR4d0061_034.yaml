body:
  text: 潞公文集卷三十四宋文彥博撰乞致仕劄子臣以年齒衰耄數年之間纍上章奏乞致官政聖慈存念舊物未賜俞允今春以來尤加昏耗伏望矜其疲薾聽還印綬俾歸田里以保餘年臣無任今年二月終䝉聖恩差入內供奉官馮景賜臣詔書不允所乞及不令更上文字臣尋附馮景口陳誠懇俟過同天節獻祝聖壽以表臣子之誠即當更上奏章乞致政不審馮景曾敢奏否又臣纍乞致仕未䝉允從披露懇誠罄竭辭語惟望聖慈矜允聽還印綬許歸田閭臣無任又臣於五月二十四日再上章及具手劄子陳乞致仕臣至中夏以來頻傷炎暑時若腹疾伏望聖慈閔其羸老聽還印綬許歸田閭天地大恩於臣至幸臣無任又臣纍乞致仕未被俞㫖既緣迫切之誠難避再三之瀆今輒繼陳章奏數冒天聽兼臣自夏以來暑氣所侵腹疾時作雖欲勉強實難支持伏望聖慈俯詳纍奏早賜矜從聽歸田里臣無任又臣以未遂致仕之請乞納使相印綬求領宫觀伏望聖慈憫臣衰老早賜指揮所兾三伏已前赴洛免冒盛暑以保疲羸臣無任又臣犬馬之年七十有五久當致政而章數十上未被俞㫖迫於激切之誠須至再三之瀆臣今乞還使相印綬求領宫觀職名所兾殘年稍遂休息况有成例伏望矜從臣無任又臣纍上表章陳乞致仕伏䝉聖慈屢降詔㫖曲加敦諭未賜俞從乃俾斷章不令復請臣今祗服丁寧之訓勉從夙夜之勞即欲繼上封章實恐頻致煩瀆然臣桑榆景晚犬馬力殫未遂挂冠深虞覆餗仰祈宸造俯察愚𠂻俾諧休退而歸庶全終始之節臣無任又臣纍乞致仕未䝉俞可念臣桑榆景晚犬馬力殫德薄位髙任隆責重非惟忝據已久實亦勉強難任不避嚴誅仰干宸造伏望聖慈憫臣羸老聽還印綬許歸田廬臣今不敢以重復繁詞别具章表深恐頻繁聖覽止於直布危懇手陳至意所兾易聞天聽早遂俞音臣無任又臣伏䝉聖慈以臣纍上奏章陳乞退休特差中使傳宣撫諭矜臣羸老察臣懇誠申以季秋之期當可露章之請此蓋陛下仁深化育道廣生成必以當盛夏炎燠之時非老者行役之際俾及秋抄使遂首塗上戴鴻恩感極以泣臣已附表奏謝别具劄子布區區犬馬之誠無任又臣伏䝉聖慈特遣中使賜詔書丁寧撫諭以臣頻年上章纍求致仕前後敦諭已極重復都不體諒者臣仰被宸㫖俯積兢惶深味聖言復增感涕緣臣年衰位重已極滿盈福過災生日虞顛覆是以頻有干瀆懇祈退間今䝉恩㫖令臣少為逡巡且停來奏俟將來郊祀禮成當有處分重言而天炳若星日臣之所請休致今則有期更不敢繼上奏章喋喋煩瀆甫過嚴禋恭俟俞㫖臣無任劉御藥回附口奏聖㫖以某頻上章求致仕前後敦諭已極重復都不體諒者始初聞命深積兢惶然深味聖㫖復增感涕蓋某年衰位重深懼滿盈之災遂致頻有干冒今䝉聖㫖令某少為逡巡且停來奏俟過郊禮當有處分則某所請休致今遂有期更不敢繼上章煩瀆才過郊禋恭候俞㫖隨表劄子臣元豐中犬馬之年七十八先帝憫其疲老許以退休伏自皇帝陛下太皇太后陛下臨政起臣於林下追赴闕庭仍俾平章重事昏耄非才固辭不獲今已三年有餘力所不支深慙尸素頻年請退意未許從臣今年事比元豐中又益老耄加之多病伏望聖慈意許從懇迫之誠遂其退歸之志又臣以年過耄耋已具表并劄子懇祈休退兹者必望聖慈矜從臣以羸瘠自京至洛六驛難以乘坐檐子逺行切欲及此洛汴未凍間乘舟至洛稍得安穩伏望俞㫖便可促裝臣無任懇切祈天俟命之至又臣近上章并纍上劄子懇乞伏䝉聖恩頻賜詔書敦諭未亮至誠緣臣年將九十固難任職但爵齒之髙謂可表率多士而又德薄望輕不能鎮重風俗以此自度乃知素飱豈宜久處然臣之至懇切在乞身而歸得遂正丘之志其幸甚矣伏望聖慈憫憐其誠早賜俞㫖又臣近纍上表章劄子請休致已竭精誠惟望聖慈矜憫早賜俞從令臣得於洛汴未凍已前乘舟而歸使疲老免陸行之勞臣本欲入對軒陛口陳至懇又以腹臟未寧未敢趍朝俟得請勉力入謝臣無任又䝉降批答不允仍斷來章臣以詞情懇切纍上奏章誠知煩瀆之過然臣衰疲不能任事惟望聖慈深賜軫憐必從其請遂其退間臣無任又元祐元年二月臣懇迫之誠已具纍章上瀆宸聽念臣爵祿年齒皆極盈滿以致災患嬰疾未平伏望聖慈特垂哀察仍乞不候批答臣所上纍表便賜俞㫖蚤得去位庶免疾顛以全衰朽臣不勝激切俟命之至取進止又臣歷觀前代輔相之臣勳德重望為時倚賴者及其老或病乞身以退時君憫勞矜老多遂其請所以全人臣進退之禮敦君父始終之恩如唐之房杜姚宋裴度輩可謂賢相時之倚重而宋璟裴度以老疾求退皆遂其請且謂成人君養老之恩臣以非才不敢比於前賢徒以遭逢聖世忝竊過分又其年過耄耋必望聖慈矜憫許其退歸無任又元祐二年臣自去年秋冬及今年夏秋以年老疲薾纍上章乞退未䝉允許乞候興隆節後必望矜從今已經聖節上壽禮成伏望聖慈察臣懇誠臣乞骸歸老臣不敢别具表章慮頻瀆天聽伏乞早賜矜允臣無任又臣以衰老不任職事不避頻煩聖聽今早已入劄子乞退歸丘園臣之情誠極於迫切緣桑榆之景垂盡鐘漏之期不永安能任重致逺惟望聖慈憫其疲薾乞與骸骨使遂首丘之望臣於私第日俟俞音無任又臣以衰殘久爾尸素纍貢誠懇乞歸林泉私居俟命未被俞音諸司以奉㫖不接臣文字須至乞對口陳至誠必望聖慈濬發德音亟從所請臣無任又元祐二年臣以衰老連年懇求休退近上劄子乞歸䝉聖恩賜詔未獲俞從愚誠迫切啓處不皇念臣新年八十三嵗桑榆晚景固無幾何勉強疲癃誠難支久臣切以唐之裴度一代宗工中外具瞻年未七十曾平章重事尚止留京師裁及百日遂得請而退如臣之虛薄忝冒聖恩至優極厚伏望太皇太后陛下皇帝陛下察臣愚懇許賜退歸臣無任又臣伏䝉聖恩賜詔敦諭以御戎之䇿未有定議京東西河朔薦飢切在圖議臣切以太皇太后陛下臨御以來德澤霑洽人心歡泰廟堂哲輔皆陛下髙選訏謀獻納萬務畢舉而老臣昏拙厠於其間一無禆補但勉強疲駑焉能支久伏望太皇太后陛下天地父母哀而憐之乞與殘骸俾從休退旦暮之人豈伏望丘園之樂臣無任又元祐四年十二月十八日臣載瀝愚誠上干宸聽伏念臣自熙寧元豐間纍乞休致前後凡八九年䝉先帝哀憐許以謝事退居林下曾未三嵗伏遇皇帝陛下太皇太后臨御之始起自田里已逾八十纍䝉召㫖甚嚴敦迫上道俾之平章重事弗獲固辭逮今四年尸素已甚奚自被命而來繼乞退歸前後章數十上未䝉矜允而臣年益篤老智力皆殫念終無補報萬一加之連年多病昏耄弗支近者兩上封章七具劄子再乞致仕天聽未回仍不許收接文字區區愚𠂻無以自達黽勉逾月復遇興龍誕節幸遂稱觴常諧得謝之期懇迫之情輸竭以盡臣今更不敢别具表章上瀆而况陛下眷留老臣前後恩禮已極亦不敢更煩詔諭伏望聖慈哀憫亟降俞音許遂退休激切之甚旦夕俟命今年過明堂大禮纍陳乞休退未䝉矜可尋奏乞候過興龍節上壽伏望聖慈矜憫疲癃早令休退又十二月十八日手劄子將上臣昨過明堂大禮陳乞休致未䝉矜可尋乞候過興龍節上壽今已具劄子奏上伏望聖慈必賜允從又十二月十九日臣已具劄子奏乞解罷重任復致官政具述四年之間章數十上誠懇殫竭年過耄耋力難勉強兼䝉聖恩眷留前後禮意偹至更不敢别具表章只乞亟降俞㫖臣昨日入對面告聖慈激切之誠控陳已盡義無可留必望哀憐老臣曲垂矜允聽遂乞身之請俾全終始之恩臣見今居家日夕俟命伏乞蚤賜處分臣無任又十二月二十日臣近以年齒昏耄久尸重任力不能強義無可留已纍具劄子再伸前請乞遂休退亦嘗面叩聖慈具陳懇欵仰祈哀惻必賜矜從伏望速降俞㫖不敢更煩詔諭臣無任臣纍曾面奏以羸老難以陸行欲於正月乘船歸洛今去歲止是旬日伏望早賜降制處分又十二月二十一日臣以纍具劄子陳乞致仕日夕俟命至今未奏俞㫖念臣誠懇迫切前後所陳固已偹極不避煩瀆聖聽期於得請乃已伏望皇帝太皇太后陛下天地父母哀而憐之亟發德音特垂矜允臣無任又十二月二十二日臣已四具劄子陳乞致仕誠懇罄竭得請是期臣見今家居俟命日夕以覬仰惟聖慈必諒哀懇伏乞早賜俞㫖臣無任又十二月二十三日臣近者纍具懇誠再申前請乞解重任復遂退休并嘗入對仰叩聖慈罄陳悃愊伏䝉皇帝太皇太后察其至誠憫其篤老特降詔書俯垂矜允仰荷終始保全之賜實踰天地父母之恩奉承諭言不勝感涕臣前具奏聞俟至後月汴洛水善乘舟西歸今已恭依詔㫖少留至二月上旬啓行欲望聖慈速賜降制處分臣今家居日夕俟命下入謝以叙感恩荷戴之誠臣授命之後告謝正謝禮畢尚當數次入對方敢朝辭以盡犬馬戀主之誠兼正月假日甚多比謝辭禮偹已及春和伏望旦夕先降制命又二月初五日臣以羸老纍乞退休伏䝉聖慈哀憐特降詔書許至春和當從所請今已春和日候降制伏望聖慈早賜處分臣無任又二月十三日臣纍乞休退已䝉聖慈矜許居家俟命今已纍旬伏望聖慈早降處分況氣候暄和舟行便於羸老臣無任乞早賜付外施行此劄子不降出十五日降麻除兩鎮致仕仍加食邑實封潞公文集卷三十四
